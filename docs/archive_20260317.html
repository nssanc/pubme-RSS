 Safety data were included where available. Potential biomarkers of treatment response were identified.\n\n**Results:** Twelve studies were reviewed. All were prospective phase I/II clinical trials. The overall pathological complete response rate ranged from 25% to 62.5% (50% for deficient mismatch repair/high microsatellite instability; 25%-62.5% for proficient mismatch repair/microsatellite stable). The clinical complete response rate ranged from 10.9% to 100% (56%-100% for deficient mismatch repair/high microsatellite instability; 16.4%-48% for proficient mismatch repair/microsatellite stable). The complete response rate ranged from 44% to 75% (75% for deficient mismatch repair/high microsatellite instability; 44%-56.5% for proficient mismatch repair/microsatellite stable). The R0 resection rate ranged from 94% to 100% and the sphincter preservation rate ranged from 59.4% to 100%. The majority of adverse events were of grades 1 and 2.\n\n**Limitations:** Our review was limited by a small number of mostly single-arm studies with a lack of long-term survival outcomes, as well as marked clinical and methodological heterogeneity among included studies.\n\n**Conclusions:** Combination therapy with immune checkpoint inhibitors in locally advanced rectal cancer appears to improve treatment response, but high-level evidence and long-term data are still lacking.", "abstract_zh": "**背景：** 在过去的几十年里，局部晚期直肠癌的护理标准（包括新辅助放化疗和手术）的病理完全缓解率仅为 10% 至 20%。与免疫检查点抑制剂的联合治疗可能会改善治疗反应。\n\n**目的：** 本系统综述从治疗效果、对手术结果的影响和潜在不良事件方面探讨了有关新辅助免疫检查点抑制剂治疗局部晚期直肠癌的当前证据。\n\n**Data sources：** 使用 Ovid MEDLINE、Embase、Web of Science 和 Cochrane 图书馆数据库进行了从数据库记录开始到 2024 年 10 月 31 日的文献检索。\n\n**Study selection：** 所有报告接受免疫检查点抑制剂作为新辅助治疗一部分的局部晚期直肠癌患者结局的研究均被纳入检查。\n\n**Main outcome measures：** 主要结果是病理完全缓解率。次要结局为主要病理缓解率、临床完全缓解率、完全缓解率、R0切除率和括约肌保留率。如有可用的安全数据也包括在内。确定了治疗反应的潜在生物标志物。\n\n**结果：** 审查了十二项研究。所有均为前瞻性 I/II 期临床试验。总体病理完全缓解率范围为 25% 至 62.5%（错配修复缺陷/微卫星高度不稳定为 50%；错配修复熟练/微卫星稳定为 25%-62.5%）。临床完全缓解率为10.9%至100%（错配修复缺陷/微卫星高度不稳定性为56%-100%；错配修复熟练/微卫星稳定为16.4%-48%）。完全缓解率范围为 44% 至 75%（错配修复缺陷/微卫星不稳定性高为 75%；错配修复熟练/微卫星稳定为 44%-56.5%）。 R0切除率为94%～100%，括约肌保留率为59.4%～100%。大多数不良事件为 1 级和 2 级。\n\n**Limitations：** 我们的综述受到少数主要是单臂研究的限制，缺乏长期生存结果，以及纳入的研究之间存在明显的临床和方法学异质性。\n\n**结论：** 局部晚期直肠癌与免疫检查点抑制剂的联合治疗似乎可以改善治疗反应，但仍缺乏高水平的证据和长期数据。", "keywords_zh": "免疫检查点抑制剂、免疫治疗、病理完全缓解、直肠癌", "keywords_en": "Immune checkpoint inhibitors, Immunotherapy, Pathologic complete response, Rectal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/40788642/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Aug 2025"}, {"id": "40788606", "title_en": "Research Perspective on Role of Neoadjuvant Immune Checkpoint Inhibitors in Locally Advanced Rectal Cancer: A Systematic Review of Currently Available Studies", "title_zh": "新辅助免疫检查点抑制剂在局部晚期直肠癌中作用的研究视角：对现有研究的系统回顾", "authors": "William C Chapman", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40788606/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Aug 2025"}, {"id": "40760310", "title_en": "Correction: Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "纠正：聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Gianpiero Gravante", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40760310/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 05 Aug 2025"}, {"id": "40723194", "title_en": "Quality of Life in Rectal Cancer Treatments: An Updated Systematic Review of Randomized Controlled Trials (2013-2023)", "title_zh": "直肠癌治疗的生活质量：随机对照试验的最新系统评价（2013-2023）", "authors": "Emanuele Damiano Luca Urso", "abstract_en": "**Background:** Rectal cancer management involves surgery, chemotherapy (CT), radiotherapy (RT), and patient care strategies, all of which significantly affect health-related quality of life (HRQoL). Understanding these effects is critical for optimizing treatment protocols. This review aimed to systematically analyze the impact of rectal cancer treatment on HRQoL.\n\n**Methods:** Four databases, Scopus, EMBASE, MEDLINE, and the Cochrane Central Register of Controlled Trials, were searched for randomized controlled trials (RCTs) published between January 2013 and December 2023. RCTs specifically focusing on rectal cancer treatments (surgical interventions, pre- and/or post-CT and/or RT, and patient care strategies) were included. An abstract review, data extraction, and a risk-of-bias assessment were independently conducted by two reviewers.\n\n**Results:** The 41 included studies comprised 9240 patients: 16 evaluated surgical interventions (3507 patients), 15 evaluated pre- and/or post-CT and/or RT protocols (5114 patients), and 10 focused on patient-care strategies (619 patients). Sphincter-sparing procedures were associated with better HRQoL than abdominoperineal resection, and rectal-sparing techniques were associated with better overall HRQoL than rectal resection. RT was associated with a poorer HRQoL. Continuity-of-care interventions improved HRQoL in ostomy patients, whereas transanal irrigation improved HRQoL after ostomy closure.\n\n**Conclusions:** This systematic review of RCTs underscores the importance of organ-sparing strategies, such as rectum-sparing approaches and continuity-of-care packages, in improving HRQoL in patients with rectal cancer. Although RT negatively affects HRQoL, treatment regimens should be individualized. Tailored organ-preservation approaches and structured follow-up care are essential for optimizing HRQoL in patients with rectal cancer.", "abstract_zh": "**背景：** 直肠癌管理涉及手术、化疗 (CT)、放疗 (RT) 和患者护理策略，所有这些都会显着影响健康相关的生活质量 (HRQoL)。了解这些影响对于优化治疗方案至关重要。本综述旨在系统分析直肠癌治疗对 HRQoL 的影响。\n\n**方法：** 检索了 Scopus、EMBASE、MEDLINE 和 Cochrane 对照试验中央注册库这四个数据库，以查找 2013 年 1 月至 2023 年 12 月期间发表的随机对照试验 (RCT)。其中包括专门针对直肠癌治疗（手术干预、CT 和/或 RT 之前和/或之后以及患者护理策略）的 RCT。摘要审查、数据提取和偏倚风险评估由两名审查员独立进行。\n\n**结果：** 这 41 项研究涉及 9240 名患者：16 项评估手术干预（3507 名患者），15 项评估 CT 和/或 RT 方案之前和/或之后（5114 名患者），10 项重点关注患者护理策略（619 名患者）。与腹会阴切除术相比，保留括约肌的手术与更好的 HRQoL 相关，而与直肠切除术相比，直肠保留技术与更好的总体 HRQoL 相关。 RT 与较差的 HRQoL 相关。连续护理干预措施改善了造口患者的 HRQoL，而经肛门冲洗则改善了造口闭合后的 HRQoL。\n\n**结论：** 这项随机对照试验的系统评价强调了器官保留策略（例如保留直肠方法和连续性护理包）在改善直肠癌患者 HRQoL 方面的重要性。尽管放疗会对 HRQoL 产生负面影响，但治疗方案应个体化。定制的器官保存方法和结构化的后续护理对于优化直肠癌患者的 HRQoL 至关重要。", "keywords_zh": "健康相关的生活质量、器官保存策略、放射治疗、直肠癌", "keywords_en": "health-related quality of life, organ-preserving strategies, radiotherapy, rectal cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/40723194/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 29 Jul 2025"}, {"id": "40719429", "title_en": "Mechanical bowel preparation to prevent infective complications after colon and rectal surgery: a systematic review and meta-analysis of randomized controlled trials", "title_zh": "机械肠道准备预防结肠和直肠手术后感染并发症：随机对照试验的系统评价和荟萃分析", "authors": "Eloy Espín-Basany", "abstract_en": "**Introduction:** Surgical site infections (SSI) represent a global health challenge, particularly in colorectal surgery, when rates can reach up to 20%. The role of mechanical bowel preparation (MBP) is still debated. A systematic review is proposed to evaluate MBP effectiveness in reducing SSI and complications after colorectal surgery.\n\n**Evidence Acquisition:** This systematic review and meta-analysis was conducted following the PRISMA guidelines. Only randomized studies comparing two or more methods for preventing infectious complications in patients undergoing colorectal surgery were included. The primary endpoint was the occurrence of SSIs, while secondary endpoints included anastomotic leak (AL) and intra-abdominal septic complications (IASC) other than AL.\n\n**Evidence Synthesis:** Eighteen studies met the inclusion criteria, including a total of 6,302 patients in the analysis. The meta-analysis showed similar SSI rates between the MBP and no-treatment groups (OR 1.015, 95% CI 0.855-1.206, I<sup>2</sup>=22.33%, P=0.863) as well as between the MBP and enema groups (OR 1.100, 95% CI 0.616-1.965, I<sup>2</sup>=35.96%, P=0.748). The risk of anastomotic leak (AL) was also similar when comparing no treatment to MBP (OR 0.904, 95% CI 0.661-1.237, I<sup>2</sup>=0%, P=0.528), and MBP to enema (OR 0.727, 95% CI 0.286-1.845, I<sup>2</sup>=25.98%, P=0.502). IASC rates were lower with MBP compared to no treatment (OR 0.526, 95% CI 0.326-0.848, I<sup>2</sup>=3.50%, P=0.008).\n\n**Conclusions:** This meta-analysis found no significant reduction in SSI or AL rates with MBP alone compared to no preparation or enema use. However, MBP significantly lowered IASC. Further research is warranted to evaluate the effectiveness of MBP combined with antibiotics in reducing postoperative complications.", "abstract_zh": "**介绍：** 手术部位感染 (SSI) 是一项全球健康挑战，特别是在结直肠手术中，感染率高达 20%。机械肠道准备（MBP）的作用仍然存在争议。建议进行系统评价来评估 MBP 在减少结直肠手术后 SSI 和并发症方面的有效性。\n\n**Evidence acquisition：** 本系统评价和荟萃分析是按照 PRISMA 指南进行的。仅纳入比较两种或多种预防结直肠手术患者感染并发症的方法的随机研究。主要终点是 SSI 的发生，次要终点包括 AL 以外的吻合口瘘 (AL) 和腹腔内脓毒症并发症 (IASC)。\n\n**Evidence synthesis：** 18 项研究符合纳入标准，分析中共有 6,302 名患者。荟萃分析显示，MBP 组和未治疗组之间（OR 1.015，95% CI 0.855-1.206，I<sup>2</sup>=22.33%，P=0.863）以及 MBP 和灌肠组之间（OR 1.100，95% CI 0.616-1.965， I<sup>2</sup>=35.96%，P=0.748）。将不治疗与 MBP 进行比较（OR 0.904，95% CI 0.661-1.237，I<sup>2</sup>=0%，P=0.528），以及将 MBP 与灌肠进行比较（OR 0.727，95% CI 0.286-1.845， I<sup>2</sup>=25.98%，P=0.502）。与未治疗相比，MBP 治疗组的 IASC 率较低（OR 0.526，95% CI 0.326-0.848，I<sup>2</sup>=3.50%，P=0.008）。\n\n**结论：** 这项荟萃分析发现，与不使用制剂或灌肠剂相比，单独使用 MBP 的 SSI 或 AL 率没有显着降低。然而，MBP 显着降低了 IASC。需要进一步的研究来评估 MBP 联合抗生素在减少术后并发症方面的有效性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40719429/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 28 Jul 2025"}, {"id": "40714623", "title_en": "Closing the gap: addressing delayed healthcare-seeking and improving quality of life for Ethiopian women with pelvic organ prolapse", "title_zh": "缩小差距：解决患有盆腔器官脱垂的埃塞俄比亚妇女延迟就医的问题并提高生活质量", "authors": "Lencho Kajela", "abstract_en": "**Background:** Pelvic organs prolapse (POP) involves the herniation of pelvic organs, such as the uterus, cervix, vaginal wall, bladder, and rectum, into the vagina. While it is a common gynecologic problem, its impact on quality of life and timely healthcare-seeking remains poorly understood in developing countries. This systematic review and meta-analysis aimed to assess the quality of life, delays in healthcare-seeking, and associated factors among women diagnosed with POP in Ethiopia.\n\n**Methods:** A systematic review and meta-analysis were conducted following PRISMA guidelines. Extensive literature searches were performed in PubMed, CINAHL, Google Scholar, ScienceDirect, and Scopus. A restricted maximum likelihood random-effects model was used to estimate pooled proportions. Heterogeneity among studies was assessed using the Cochrane Q-test and I2 statistics. Publication bias was evaluated using funnel plots and Egger's test. Stata 17 software was used for all analyses.\n\n**Results:** From an initial pool of 421 articles, 10 met the inclusion criteria, encompassing data from 1489 women diagnosed with POP. The pooled proportion of poor quality of life among women with POP in Ethiopia was 52.07 % [95 % C.I.: 48.04 %, 56.09 %]. Moderate heterogeneity was observed across studies. The mean delay between symptom onset and seeking medical care was 50.64 months [95 % C.I: 32.50, 68.79], with an estimated 78.22 % [95 % C.I.: 70.72 %, 85.72 %] of women experiencing delays in seeking healthcare. Postmenopausal status (OR = 2.05, 95 % CI: 1.22-3.45), living with POP for more than 2 years (OR = 4.17, 95 % CI: 1.23-14.10), and having Stage III/IV POP (OR = 4.48, 95 % CI: 1.61-12.44) associated with poor quality of life. In addition, factors associated with delayed healthcare seeking include: fear of disclosure (OR = 4.60, 95 % CI: 4.65-45.71), lack of social support (OR = 4.09, 95 % CI: 1.91-8.74), low income (OR = 4.80, 95 % CI: 2.12-10.86), and experiencing stigma (OR = 5.78, 95 % CI: 1.07-31.36).\n\n**Conclusion:** This review highlights a high prevalence of poor quality of life and significant delays in healthcare-seeking among Ethiopian women with POP, with an average delay of over four years after symptom onset. Stigma, fear of disclosure, low income, and lack of social support were significantly associated with delays in seeking health care. Additionally, longer prolapse duration, menopause, and stage III or IV pelvic organ prolapse (POP) were significantly associated with a reduced quality of life.", "abstract_zh": "**背景：** 盆腔器官脱垂（POP）涉及盆腔器官（如子宫、子宫颈、阴道壁、膀胱和直肠）疝入阴道。虽然这是一个常见的妇科问题，但在发展中国家，它对生活质量和及时就医的影响仍然知之甚少。这项系统回顾和荟萃分析旨在评估埃塞俄比亚诊断患有 POP 的女性的生活质量、就医延迟以及相关因素。\n\n**方法：** 按照 PRISMA 指南进行了系统评价和荟萃分析。在 PubMed、CINAHL、Google Scholar、ScienceDirect 和 Scopus 中进行了广泛的文献检索。使用限制最大似然随机效应模型来估计合并比例。使用 Cochrane Q 检验和 I2 统计来评估研究之间的异质性。使用漏斗图和艾格检验评估发表偏倚。 Stata 17 软件用于所有分析。\n\n**结果：** 从最初的 421 篇文章中，有 10 篇符合纳入标准，涵盖了 1489 名被诊断患有 POP 的女性的数据。埃塞俄比亚 POP 女性中生活质量较差的总体比例为 52.07% [95% C.I.: 48.04%, 56.09%]。各项研究中观察到中等程度的异质性。症状出现和就医之间的平均延迟时间为 50.64 个月 [95% C.I.: 32.50, 68.79]，估计有 78.22% [95% C.I.: 70.72%, 85.72%] 的女性在寻求医疗保健方面出现延迟。绝经后状态（OR = 2.05，95% CI：1.22-3.45）、患有 POP 超过 2 年（OR = 4.17，95% CI：1.23-14.10）以及患有 III/IV 期 POP（OR = 4.48，95% CI：1.61-12.44）与不良质量相关生活。此外，与延迟就医相关的因素包括：害怕披露（OR = 4.60，95% CI：4.65-45.71）、缺乏社会支持（OR = 4.09，95% CI：1.91-8.74）、低收入（OR = 4.80，95% CI：2.12-10.86）和经历耻辱（OR = 5.78，95% CI：1.07-31.36）。\n\n**结论：** 这篇综述强调了患有 POP 的埃塞俄比亚女性普遍存在生活质量差和就医严重延迟的情况，症状出现后平均延迟四年以上。耻辱、害怕披露、低收入和缺乏社会支持与延迟寻求医疗保健密切相关。此外，较长的脱垂持续时间、更年期和 III 期或 IV 期盆腔器官脱垂 (POP) 与生活质量下降显着相关。", "keywords_zh": "埃塞俄比亚, 寻求医疗保健, 盆底功能障碍, 盆腔器官脱垂, 生活质量", "keywords_en": "Ethiopia, Healthcare-seeking, Pelvic floor dysfunction, Pelvic organs prolapse, Quality of life", "link": "https://pubmed.ncbi.nlm.nih.gov/40714623/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sun, 27 Jul 2025"}, {"id": "40703667", "title_en": "Radiotherapy boost to the primary tumour in locally advanced rectal cancer: Systematic review of practices and meta-analysis", "title_zh": "放射治疗对局部晚期直肠癌原发肿瘤的增强作用：实践和荟萃分析的系统回顾", "authors": "Geneviève Van Ooteghem", "abstract_en": "**Introduction:** In locally advanced rectal cancer (LARC), increasing the complete response (CR) rate after total neo-adjuvant treatment may increase the patient eligibility for non-operative management (\"watch and wait\", W&W). Although a radiotherapy (RT) boost to the primary tumour may enhance CR rates, clear guidelines are currently lacking. This systematic review and <i>meta</i>-analysis investigate the technical parameters used for rectal boost RT and assess their impact on oncological outcomes.\n\n**Methods:** Following PRISMA guidelines, the terms \"rectum,\" \"radiotherapy,\" and \"boost\" were searched in PubMed and EMBASE (PROSPERO: CRD42023444685). Studies reporting on external beam RT boost to the primary tumour in LARC and meeting quality criteria were included. Descriptive analyses extracted data on RT technique, preparation, boost delineation, dose, chemotherapy, and follow-up. A mixed-effects <i>meta</i>-analysis model evaluated the impact of selected parameters on CR and local recurrence rate (LRR). Studies were analysed separately based on treatment intent: planned surgery or W&W.\n\n**Results:** Out of 3904 references, 83 were included in the descriptive analysis and 78 in the <i>meta</i>-analysis. Substantial variability in RT parameters was observed across studies. Pathologic CR rates were significantly higher with intensity-modulated/volumetric-modulated arc RT (IMRT/VMAT, p = 0.007), simultaneous boost (p = 0.020), dose escalation (Biological equivalent dose > 74 Gy, p = 0.035), and the combination of induction and consolidation chemotherapy (p = 0.023). No significant associations were found for clinical CR or LRR.\n\n**Conclusion:** While rectal RT boost is already part of real-world practices, the wide heterogeneity in techniques highlights the urgent need for standardisation. Our <i>meta</i>-analysis suggests that IMRT/VMAT, simultaneous boost, and dose escalation are associated with higher pathological CR rates and should be considered in future rectal boost guidelines. These findings, however, warrant careful interpretation due to the absence of adjustments for clinical, tumoral, or patient-related parameters that may also influence response rate and oncological outcomes.", "abstract_zh": "**介绍：** 在局部晚期直肠癌 (LARC) 中，提高新辅助治疗后的完全缓解 (CR) 率可能会增加患者接受非手术治疗的资格（“观察并等待”，W&W）。尽管对原发肿瘤进行放射治疗（RT）可能会提高 CR 率，但目前缺乏明确的指南。这项系统评价和荟萃分析调查了直肠增强放疗所用的技术参数，并评估了它们对肿瘤学结果的影响。\n\n**方法：** 根据 PRISMA 指南，在 PubMed 和 EMBASE 中检索了术语“直肠”、“放射治疗”和“增强”（PROSPERO：CRD42023444685）。报告了外照射放疗对 LARC 原发肿瘤的增强作用并符合质量标准的研究也被纳入其中。描述性分析提取了有关 RT 技术、准备、加强范围、剂量、化疗和随访的数据。混合效应元分析模型评估了所选参数对 CR 和局部复发率 (LRR) 的影响。根据治疗目的分别分析研究：计划手术或 W&W。\n\n**结果：** 在 3904 篇参考文献中，83 篇纳入描述性分析，78 篇纳入元分析。不同研究中观察到 RT 参数存在显着差异。强度调制/体积调制弧形放疗（IMRT/VMAT，p = 0.007）、同时加强化疗（p = 0.020）、剂量递增（生物等效剂量> 74 Gy，p = 0.035）以及诱导和巩固化疗相结合（p = 0.023）的病理 CR 率显着更高。未发现与临床 CR 或 LRR 显着相关。\n\n**结论：** 虽然直肠放疗增强已经成为现实世界实践的一部分，但技术上的广泛异质性凸显了标准化的迫切需要。我们的荟萃分析表明，IMRT/VMAT、同步加强和剂量递增与较高的病理 CR 率相关，应在未来的直肠加强指南中予以考虑。然而，由于没有对也可能影响缓解率和肿瘤学结果的临床、肿瘤或患者相关参数进行调整，这些发现需要仔细解释。", "keywords_zh": "完全缓解、剂量递增、局部晚期直肠癌、荟萃分析、新辅助治疗、直肠加强治疗", "keywords_en": "Complete response, Dose escalation, Locally advanced rectal cancer, Meta-analysis, Neo-adjuvant therapy, Rectal boost", "link": "https://pubmed.ncbi.nlm.nih.gov/40703667/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 24 Jul 2025"}, {"id": "40697442", "title_en": "Early-onset colorectal cancer in patients younger than 50 years: a systematic review of the literature", "title_zh": "50 岁以下患者的早发结直肠癌：文献的系统回顾", "authors": "Konstantinos Vlachos", "abstract_en": "Early-onset colorectal cancer (EO-CRC) refers to CRC diagnosed before the age of 50. Its incidence has risen in recent years, turning researchers' attention to its oncologic behavior and potentially modifiable risk factors. In this review, PubMed/MEDLINE database was searched for all original research articles concerning EO-CRC. The inclusion criteria were CRC patients under 50, without a known predisposing factor for malignancy or an inherited CRC syndrome, presenting oncological characteristics and outcomes. All studies were assessed for bias, based on the ROBINS-E 2022 tool, and were synthesized in a qualitative analysis. Twenty-nine articles, reporting on 64,376 EO-CRC patients, were included in the qualitative synthesis. Results were classified into 3 categories: a) demographics; b) histopathologic characteristics; and c) treatment outcomes. Of these publications, 21 studies agreed that rectum (45%) and left-sided (47.1%) cancers are most common in younger patients, and 5 indicated that the highest prevalence of CRC concerns the 40-49 years age group. Seventeen of 29 studies reported a higher stage (III and IV) on diagnosis, with lymphovascular and perineural invasion. Our review has some limitations: as it was based on a single database, not all studies provided information on the variables; and patients were not categorized in all studies in the same age groups, although all were under 50 years. As EO-CRC is on the rise, the need for closer monitoring and possibly earlier screening becomes apparent. Further research should focus on finding novel screening biomarkers and modifiable risk factors that would decrease mortality and improve patient outcomes.", "abstract_zh": "早发性结直肠癌（EO-CRC）是指50岁之前诊断出的结直肠癌。近年来其发病率有所上升，这使得研究人员开始关注其肿瘤行为和潜在可改变的危险因素。在这篇综述中，检索了 PubMed/MEDLINE 数据库中有关 EO-CRC 的所有原始研究文章。纳入标准是 50 岁以下的 CRC 患者，没有已知的恶性肿瘤诱发因素或遗传性 CRC 综合征，且具有肿瘤学特征和结果。所有研究均根据 ROBINS-E 2022 工具进行偏倚评估，并进行定性分析综合。定性综合中纳入了 29 篇文章，报告了 64,376 名 EO-CRC 患者。结果分为 3 类：a) 人口统计； b) 组织病理学特征； c) 治疗结果。在这些出版物中，21 项研究一致认为直肠癌 (45%) 和左侧癌症 (47.1%) 在年轻患者中最常见，5 项研究表明 CRC 患病率最高的是 40-49 岁年龄组。 29 项研究中有 17 项报告了较高的诊断阶段（III 和 IV），伴有淋巴血管和神经周围侵犯。我们的审查有一些局限性：由于它基于单一数据库，并非所有研究都提供有关变量的信息；尽管所有研究的患者年龄都在 50 岁以下，但并非所有研究中的患者都被归为同一年龄组。随着 EO-CRC 的增加，更密切的监测以及可能更早的筛查的必要性变得显而易见。进一步的研究应集中于寻找新的筛查生物标志物和可改变的风险因素，以降低死亡率并改善患者的治疗结果。", "keywords_zh": "50岁，早发性结直肠癌，指南，年轻人", "keywords_en": "50 years old, Early-onset colorectal cancer, guidelines, young adults", "link": "https://pubmed.ncbi.nlm.nih.gov/40697442/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 23 Jul 2025"}, {"id": "40672439", "title_en": "Diagnosis and treatment for anal fistula: a systematic review of clinical practice guidelines and consensus statements", "title_zh": "肛瘘的诊断和治疗：临床实践指南和共识声明的系统回顾", "authors": "Rong Shi", "abstract_en": "**Background:** Anal fistula constitutes a pathological channel originating either from the anal canal or rectum to the skin surrounding the anus, primarily characterized by recurrent pain, purulent discharge, and pruritus. This study aims to compare and standardize the recommendations for the diagnosis and treatment of anal fistula, drawing on contemporary clinical practice guidelines.\n\n**Methods:** A comprehensive search was conducted across multiple databases including PubMed, EMBASE, China National Knowledge Infrastructure, Wanfang Database, Chinese Science and Technology Periodical Database, and Chinese Biological Medicine Database, from their inception through April 1, 2024. The objective was to collate all published guidelines on anal fistula. The quality of the eligible guidelines was appraised by two reviewers using the Appraisal of Guidelines for Research and Evaluation II instrument.\n\n**Results:** The search yielded fifteen guidance documents -comprising nine guidelines and six consensus statements -each offering specific recommendations. Twelve of these documents address screening and diagnosis of anal fistula, while all fifteen discuss various treatment and management strategies. Document analysis highlighted MRI as the predominant diagnostic recommendation. Treatment and management strategies were categorized into four categories: preoperative management, surgical method selection, pharmacological interventions, and postoperative management. Regarding surgical interventions, all guidelines address incision and drainage of fistulas. Most guidelines offer a low recommendation for cutting setons, mainly attributed to the presence of incontinence. For high-positioned anal fistula, a push-pull flap procedure is recommended, whereas the LIFT procedure is advocated for newly identified, high, and sphincter-penetrating fistulas. Among the 15 guidelines and consensus statements evaluated in this study, more than half demonstrated methodological limitations, with particularly deficient performance in the applicability domain. As a critical determinant of implementation effectiveness, these deficiencies may undermine guidelines' capacity to optimize health outcomes.\n\n**Conclusion:** There is a pressing need for an updated search of potential evidence on the diagnosis and treatment of anal fistula. Effective diagnoses and therapeutic approaches, whether conventional or complementary and alternative medicine, should be thoroughly evaluated and incorporated based on robust evidence.", "abstract_zh": "**背景：** 肛瘘是从肛管或直肠到肛门周围皮肤的病理通道，主要表现为反复疼痛、脓性分泌物和瘙痒。本研究旨在借鉴当代临床实践指南，对肛瘘的诊断和治疗建议进行比较和标准化。\n\n**方法：** 对PubMed、EMBASE、中国国家知识基础设施、万方数据库、中国科技期刊数据库和中国生物医学数据库等多个数据库进行了全面检索，从建库到2024年4月1日。目的是整理所有已发布的肛瘘指南。合格指南的质量由两名评审员使用“研究和评估指南 II 评估”工具进行评估。\n\n**结果：** 搜索产生了十五份指导文件，其中包括九份指南和六份共识声明，每份文件都提供了具体建议。其中十二份文件涉及肛瘘的筛查和诊断，所有十五份文件都讨论了各种治疗和管理策略。文档分析强调 MRI 是主要的诊断建议。治疗和管理策略分为四类：术前管理、手术方法选择、药物干预和术后管理。关于手术干预，所有指南均涉及瘘管切开和引流。大多数指南对切挂线的建议较低，这主要是由于存在失禁。对于高位肛瘘，建议采用推拉皮瓣手术，而对于新发现的高位肛瘘和括约肌穿透性肛瘘则提倡采用 LIFT 手术。在本研究评估的 15 条指南和共识声明中，超过一半表现出方法学局限性，尤其是在适用性领域表现不足。作为实施有效性的关键决定因素，这些缺陷可能会削弱指南优化健康结果的能力。\n\n**结论：** 迫切需要更新有关肛瘘诊断和治疗的潜在证据。有效的诊断和治疗方法，无论是传统医学还是补充和替代医学，都应基于强有力的证据进行彻底评估和整合。", "keywords_zh": "肛瘘, 诊断, 指南, 系统评价, 治疗", "keywords_en": "anal fistula, diagnosis, guidelines, systematic review, therapeutic", "link": "https://pubmed.ncbi.nlm.nih.gov/40672439/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Jul 2025"}, {"id": "40670732", "title_en": "Robotic Beyond Total Mesorectal Excision (bTME) for locally advanced and recurrent anorectal cancer: a systematic review", "title_zh": "机器人超越全直肠系膜切除术（bTME）治疗局部晚期和复发性肛门直肠癌：系统评价", "authors": "Muhammad Rafaih Iqbal", "abstract_en": "Robotic surgery is increasingly utilized for rectal cancer resection, particularly in cases requiring beyond total mesorectal excision (bTME) to achieve oncological clearance. Despite longer operative times, robotic bTME has been associated with reduced morbidity and blood loss, making it an emerging approach in specialized centers. A systematic review following PRISMA guidelines was conducted in Web of Science, PubMed, and Scopus. Studies reporting robotic bTME for recurrent or locally advanced anorectal cancer were included. Outcomes assessed included study characteristics, demographics, operative outcomes, oncological data, and follow-up. Nineteen studies comprising 1027 patients met the inclusion criteria (13 case series-68% and 6 cohort studies-32%). The median patient age ranged from 51 to 68 years with 73.7% males. Most patients had an ASA score of 2 (53.1%), and BMI ranged from 21.1 to 28.6. Tumor locations were predominantly near the anal verge (median: 3-6 cm), and the most common clinical staging was cT3, cN1, and cM0. Surgical complications included urinary issues (22.6%), anastomotic leakage (11.4%), ileus (10.4%), and bleeding (5.3%). Follow-up data indicated a recurrence rate of 24.9%, and the 1-year survival rate was > 90%. These studies reported an overall complication rate of 49.7%, with a median follow-up of 12-36 months. Oncological outcomes were favorable, although there was significant variability in survival data between studies. The heterogenicity of the studies makes it challenging to conclusively establish robotic bTME as a feasible alternative to the gold standard. Further prospective studies, with measurable outcomes and consistent terminology, are needed to ensure homogeneity.", "abstract_zh": "机器人手术越来越多地用于直肠癌切除，特别是在需要完全直肠系膜切除（bTME）之外才能实现肿瘤清除的病例。尽管手术时间较长，但机器人 bTME 与降低发病率和失血量有关，使其成为专业中心的新兴方法。 Web of Science、PubMed 和 Scopus 遵循 PRISMA 指南进行了系统评价。报告机器人 bTME 用于治疗复发性或局部晚期肛门直肠癌的研究也被纳入其中。评估的结果包括研究特征、人口统计、手术结果、肿瘤数据和随访。包含 1027 名患者的 19 项研究符合纳入标准（13 项病例系列研究 - 68% 和 6 项队列研究 - 32%）。患者中位年龄范围为 51 岁至 68 岁，其中 73.7% 为男性。大多数患者的 ASA 评分为 2 分（53.1%），BMI 范围为 21.1 至 28.6。肿瘤位置主要位于肛缘附近（中位：3-6 cm），最常见的临床分期是 cT3、cN1 和 cM0。手术并发症包括泌尿问题（22.6%）、吻合口漏（11.4%）、肠梗阻（10.4%）和出血（5.3%）。随访数据显示复发率为24.9%，1年生存率>90%。这些研究报告的总体并发症率为 49.7%，中位随访时间为 12-36 个月。尽管研究之间的生存数据存在显着差异，但肿瘤学结果良好。研究的异质性使得最终确定机器人 bTME 作为黄金标准的可行替代方案具有挑战性。需要进一步的前瞻性研究，具有可测量的结果和一致的术语，以确保同质性。", "keywords_zh": "肛门直肠癌、全直肠系膜切除之外、微创手术、盆腔廓清术、机器人手术", "keywords_en": "Anorectal cancer, Beyond total mesorectal excision, Minimally invasive surgery, Pelvic exenteration, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40670732/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 16 Jul 2025"}, {"id": "40665575", "title_en": "Haemorrhoidal artery ligation: Is Doppler guidance useful? A systematic review and meta-analysis of randomized controlled trials", "title_zh": "痔动脉结扎：多普勒引导有用吗？随机对照试验的系统回顾和荟萃分析", "authors": "Gaetano Gallo", "abstract_en": "**Aim:** Haemorrhoidal arterial ligation (HAL) with or without mucopexy (recto-anal repair, RAR) is a minimally invasive technique for the treatment of haemorrhoidal disease. It is still debated if it should be performed with Doppler guidance (DG-HAL) or without. The primary aim of this study was to find evidence that the use of Doppler guidance reduces the risk of recurrence. The secondary aim was to evaluate the benefit of Doppler guidance on postoperative complications.\n\n**Methods:** A comprehensive literature search was conducted according to the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines (2020). The population, intervention, comparison, outcomes and study design (PICOS) framework was used for eligibility criteria. Data were extracted independently by two reviewers for initial screening and for eligibility to be included in the meta-analysis of randomized controlled trials. Random effects meta-analysis, leave-one-out meta-analysis and meta-regression were performed to assess the main outcomes.\n\n**Results:** Seven randomized controlled trials, published between 2008 and 2023, were selected. They included 514 patients (mean age 49.13 years, 46% men) with different haemorrhoidal degrees. The HAL technique was performed in 255 patients and DG-HAL in 259 patients. The meta-analysis revealed that the DG-HAL procedure was associated with a significant risk of recurrence (P = 0.007) and similar postoperative pain (P = 0.623) compared to the HAL procedure. In a subgroup analysis of patients treated with a combined RAR procedure, no differences were found between the DG-HAL-RAR and HAL-RAR regarding the risk of recurrence (P = 0.36) and postoperative pain (P = 0.31).\n\n**Conclusion:** In conclusion, this meta-analysis did not find superiority of DG-HAL over HAL with or without RAR in reducing postoperative complications and recurrence.", "abstract_zh": "**Aim：** 痔动脉结扎 (HAL) 联合或不联合粘液固定术（直肠肛门修复术，RAR）是一种治疗痔疮疾病的微创技术。是否应该使用多普勒引导 (DG-HAL) 或不使用多普勒引导进行仍有争议。本研究的主要目的是寻找证据证明使用多普勒引导可降低复发风险。第二个目的是评估多普勒引导对术后并发症的益处。\n\n**方法：** 根据系统评价和荟萃分析的首选报告项目 (PRISMA) 指南 (2020) 进行了全面的文献检索。人口、干预、比较、结果和研究设计（PICOS）框架用于资格标准。数据由两名评审员独立提取，用于初步筛选和纳入随机对照试验荟萃分析的资格。进行随机效应荟萃分析、留一荟萃分析和荟萃回归来评估主要结果。\n\n**结果：** 选择了 2008 年至 2023 年间发表的七项随机对照试验。他们包括 514 名患有不同痔疮程度的患者（平均年龄 49.13 岁，46% 为男性）。 255 名患者接受了 HAL 技术，259 名患者接受了 DG-HAL 技术。荟萃分析显示，与 HAL 手术相比，DG-HAL 手术具有显着的复发风险 (P = 0.007) 和相似的术后疼痛 (P = 0.623)。在对联合 RAR 手术治疗的患者进行的亚组分析中，DG-HAL-RAR 和 HAL-RAR 在复发风险 (P = 0.36) 和术后疼痛 (P = 0.31) 方面没有发现差异。\n\n**结论：** 总之，这项荟萃分析没有发现 DG-HAL 在减少术后并发症和复发方面比有或没有 RAR 的 HAL 具有优越性。", "keywords_zh": "多普勒、痔疮、痔动脉结扎、痔血管化、粘液固定术", "keywords_en": "Doppler, haemorrhoid, haemorrhoidal artery ligation, haemorrhoidal vascularization, mucopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/40665575/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 16 Jul 2025"}, {"id": "40632066", "title_en": "Negative pressure wound therapy for colorectal incisions: a systematic review and meta-analysis of controlled trials", "title_zh": "结直肠切口负压伤口治疗：对照试验的系统评价和荟萃分析", "authors": "Chiehfeng Chen", "abstract_en": "**Objective:** Negative pressure wound therapy (NPWT) has demonstrated promising results in reducing surgical site infection (SSI) rates following orthopaedic, vascular, cardiothoracic, plastic and abdominal surgery. The literature on use of NPWT on colorectal incisions is growing, with several randomised controlled trials (RCTs); however, findings have been inconsistent. This review evaluated the effectiveness and safety of NPWT for colorectal incisions in elective and emergency surgery.\n\n**Method:** The Cochrane Central Register of Controlled Trials, PubMed, EMBASE, Cumulative Index to Nursing and Allied Health Literature, and ClinicalTrials.gov databases were searched for RCTs and non-RCTs comparing NPWT with standard of care.\n\n**Results:** A total of five RCTs and six non-RCTs were included (with a total number of patients 2193). NPWT significantly reduced the rate of infection in colorectal incisions (odds ratio (OR): 0.57; 95% confidence interval (CI): 0.41, 0.78; I<sup>2</sup>=14%; p<0.0005) and wound complications of the colorectal surgical incisions (OR: 0.33; 95% CI: 0.13, 0.88; I<sup>2</sup>=59%; p=0.03). NPWT also shortened the wound healing time by three days (mean difference: -2.98; 95% CI: -4.99, -0.97; I<sup>2</sup>=0%; p=0.004). Subgroup analysis revealed that NPWT conferred greater benefits on wounds resulting from life-threatening emergency surgery, and contaminated or dirty-infected wounds.\n\n**Conclusion:** The findings of this review showed that NPWT is an effective intervention for the closure of wounds in patients following colorectal surgery, and lead to a significant reduction in SSIs, overall wound complications, and mean complete wound healing time. It was particularly effective in emergency cases and in contaminated to dirty-infected wounds. Treatment options should be considered in terms of cost-benefits and adequate patient selection during shared decision-making.", "abstract_zh": "**目的：** 负压伤口治疗 (NPWT) 在降低骨科、血管、心胸、整形和腹部手术后手术部位感染 (SSI) 率方面已显示出良好的效果。关于在结直肠切口上使用 NPWT 的文献越来越多，其中有几项随机对照试验 (RCT)；然而，调查结果并不一致。本综述评估了 NPWT 在择期和急诊手术中结直肠切口的有效性和安全性。\n\n**Method：** 检索了 Cochrane 对照试验中央注册库、PubMed、EMBASE、护理和联合健康文献累积索引以及 ClinicalTrials.gov 数据库，以查找比较 NPWT 与标准护理的随机对照试验和非随机对照试验。\n\n**结果：** 共纳入 5 项随机对照试验和 6 项非随机对照试验（患者总数 2193 例）。 NPWT显着降低结直肠切口感染率（比值比（OR）：0.57；95%置信区间（CI）：0.41，0.78；I<sup>2</sup>=14%；p<0.0005）和结直肠手术切口伤口并发症（OR：0.33；95% CI：0.13，0.88；95% CI：0.13，0.88；p<0.0005）。 I<sup>2</sup>=59%；p=0.03）。 NPWT 还将伤口愈合时间缩短了三天（平均差：-2.98；95% CI：-4.99，-0.97；I<sup>2</sup>=0%；p=0.004）。亚组分析显示，NPWT 对危及生命的紧急手术造成的伤口以及污染或脏感染的伤口具有更大的益处。\n\n**结论：** 本次综述的结果表明，NPWT 是结直肠手术后患者伤口闭合的有效干预措施，可显着减少 SSI、总体伤口并发症和平均伤口完全愈合时间。它在紧急情况和污染到脏感染的伤口中特别有效。在共同决策过程中，应根据成本效益和充分的患者选择来考虑治疗方案。", "keywords_zh": "结直肠手术、荟萃分析、负压伤口治疗、手术切口、手术部位感染、系统评价、伤口、伤口护理、伤口敷料、伤口愈合", "keywords_en": "colorectal surgery, meta-analysis, negative pressure wound therapy, surgical incision, surgical site infection, systematic review, wound, wound care, wound dressing, wound healing", "link": "https://pubmed.ncbi.nlm.nih.gov/40632066/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 09 Jul 2025"}, {"id": "40624403", "title_en": "Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Azka Mustaan", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40624403/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Jul 2025"}, {"id": "40623139", "title_en": "Oral and Maxillofacial Manifestations of Gardner Syndrome: A Literature Analysis", "title_zh": "加德纳综合征的口腔颌面部表现：文献分析", "authors": "Luca Fiorillo", "abstract_en": "**Background And Objective:** Gardner syndrome (GS) is a rare autosomal condition of neoplasms and adenomatous polyps, particularly in the colon and rectum. If left untreated, these polyps develop into colon cancer. Thus, early diagnosis is crucial to improve prognosis among patients. However, the majority of the existing research is limited to single case studies, which lack generalizability. Therefore, this systematic review provides a thorough synthesis of GS-related dental symptoms along with diagnostic and treatment options, and outcomes in the published literature.\n\n**Methods:** A comprehensive literature search was conducted across 2 databases and the Google Scholar search engine. Case reports detailing oral symptoms in GS patients were included. The extracted information was synthesized using descriptive measures (frequencies and percentages) in a tabular format.\n\n**Results:** Of 676 studies, 33 studies were found eligible and evaluated statistically. GS has been investigated in 38 cases, with a larger prevalence among males than females. Mandibular osteomas/odontomas/dermoid cysts were the most frequently reported symptoms (84.21%). Teeth-related symptom was impacted teeth (50%), supernumerary teeth (23.68%), and missing teeth (18.42%). The predominant radiographic findings were osteomas (84.21%), followed by irregular and dense bony regions in the mandible (50%). In 23.68% of cases, osteoma was resected. Teeth extraction was performed in 21.05% of cases. In total, 5.26% had osteoma recurrence.\n\n**Conclusions:** Oral and maxillofacial features can serve as a significant diagnostic indicator for screening and subsequent confirmation of GS in affected patients, allowing for timely referral and care. Dental professionals must be properly trained to identify the dental and maxillofacial manifestations of the disease.", "abstract_zh": "**Background and objective：** 加德纳综合征 (GS) 是一种罕见的常染色体肿瘤和腺瘤性息肉疾病，特别是在结肠和直肠中。如果不及时治疗，这些息肉会发展成结肠癌。因此，早期诊断对于改善患者预后至关重要。然而，现有研究大多仅限于单一案例研究，缺乏普遍性。因此，本系统综述全面综合了 GS 相关的牙科症状、诊断和治疗方案以及已发表文献中的结果。\n\n**方法：** 通过 2 个数据库和 Google Scholar 搜索引擎进行了全面的文献检索。其中包括详细说明 GS 患者口腔症状的病例报告。使用表格格式的描述性措施（频率和百分比）综合提取的信息。\n\n**结果：** 在 676 项研究中，有 33 项研究被认为合格并进行了统计评估。已对 38 例 GS 病例进行了调查，男性患病率高于女性。下颌骨瘤/牙瘤/皮样囊肿是最常报告的症状（84.21%）。牙齿相关症状为阻生牙（50%）、多生牙（23.68%）和缺失牙（18.42%）。主要的影像学表现是骨瘤（84.21%），其次是下颌骨不规则且致密的骨区域（50%）。 23.68%的病例中，骨瘤被切除。 21.05%的病例进行了拔牙。总共有 5.26% 的人出现骨瘤复发。\n\n**结论：** 口腔颌面部特征可以作为筛查和随后确认受影响患者的 GS 的重要诊断指标，以便及时转诊和护理。牙科专业人员必须接受适当的培训，以识别疾病的牙齿和颌面部表现。", "keywords_zh": "加德纳综合征，颌面部异常，口腔病理学，系统评价", "keywords_en": "Gardner syndrome, maxillofacial abnormalities, oral pathology, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40623139/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Jul 2025"}, {"id": "40596934", "title_en": "Comparison of efficacy and safety between surgical and conservative treatments for hemorrhoids: a meta-analysis", "title_zh": "手术治疗和保守治疗痔疮的疗效和安全性比较：一项荟萃分析", "authors": "Xiaoqiang Jia", "abstract_en": "**Objectives:** Hemorrhoids, a common anorectal condition, can be managed through surgical or conservative treatments. The aim of this meta-analysis is to compare the efficacy and safety of surgical and conservative treatments for hemorrhoids.\n\n**Methods:** A systematic search was conducted from of PubMed, Embase, the Cochrane Library, and Web of Science from their inception to September 25, 2024. Eligible studies compared surgical treatments with non-invasive conservative treatments in hemorrhoids. Statistical analyses included pooled odds ratios (ORs) and mean differences (MDs)/standard mean differences (SMDs) with 95% confidence intervals (CIs).\n\n**Results:** Seven studies, including 760 patients, were analyzed. Surgery achieved higher rates of complete symptom resolution than conservative therapy (OR = 2.96, 95% CI: 1.66-5.28, p < 0.001). Overall pain scores favored surgery (SMD = -0.93, 95% CI: 1.73 to -0.13, p = 0.02). Subgroup analysis showed clear superiority within four days (SMD = -1.26, 95% CI -1.84 to -0.68) but parity beyond ten days (SMD = 0.00, 95% CI -0.44 to 0.44; p = 0.99). Comparable patterns were observed in pregnant women with thrombosed external hemorrhoids. Rates of postoperative bleeding (OR: 1.09; 95% CI: 0.42 to 2.82, p = 0.86; I2 = 41%, p = 0.15) and urinary retention (OR: 1.75; 95% CI: 0.30 to 10.31, p = 0.54; I2 = 45%, p = 0.18) did not differ significantly between groups. Surgical-specific adverse events were infrequent (incontinence 3%, persistent pain 5%, watery discharge 6%). Surgery shortened recovery in pregnant thrombosed cases by approximately seven days (MD: -6.80; 95% CI: -7.64 to -5.96, p < 0.001; I2 = 55%, p = 0.14) and reduced overall recurrence (95% CI: 0.10 to 0.37, p < 0.001; I2 = 0%, p = 0.97).\n\n**Conclusion:** Surgical treatments provide superior symptom relief, faster recovery, and lower recurrence but with some specific post-treatment complications, while conservative treatments are safer and less invasive but with provides slower symptom relief and higher recurrence rates. Individualized treatment should consider symptom severity, patient preferences, and risk tolerance.", "abstract_zh": "**Objectives：** 痔疮是一种常见的肛门直肠疾病，可以通过手术或保守治疗来治疗。这项荟萃分析的目的是比较手术治疗和保守治疗痔疮的疗效和安全性。\n\n**方法：** 对 PubMed、Embase、Cochrane 图书馆和 Web of Science 从成立到 2024 年 9 月 25 日期间进行了系统检索。符合条件的研究比较了痔疮的手术治疗与非侵入性保守治疗。统计分析包括合并优势比 (OR) 和平均差 (MD)/标准平均差 (SMD)，置信区间 (CI) 为 95%。\n\n**结果：** 对七项研究（包括 760 名患者）进行了分析。手术的症状完全缓解率高于保守治疗（OR = 2.96，95% CI：1.66-5.28，p < 0.001）。总体疼痛评分倾向于手术（SMD = -0.93，95% CI：1.73 至 -0.13，p = 0.02）。亚组分析显示四天内具有明显优势（SMD = -1.26，95% CI -1.84 至 -0.68），但十天后则具有同等性（SMD = 0.00，95% CI -0.44 至 0.44；p = 0.99）。在患有血栓性外痔的孕妇中观察到了类似的模式。术后出血率（OR：1.09；95% CI：0.42至2.82，p = 0.86；I2 = 41%，p = 0.15）和尿潴留率（OR：1.75；95% CI：0.30至10.31，p = 0.54； I2 = 45%，p = 0.18）组间没有显着差异。手术特异性不良事件并不常见（失禁 3%、持续性疼痛 5%、水样分泌物 6%）。手术使妊娠血栓病例的恢复时间缩短约 7 天（MD：-6.80；95% CI：-7.64 至 -5.96，p< 0.001；I2 = 55%，p = 0.14），并减少总体复发（95% CI：0.10 至 0.37，p< 0.001；I2= 55%，p = 0.14）。 I2 = 0%，p = 0.97)。\n\n**结论：** 手术治疗可显着缓解症状、加快恢复速度并降低复发率，但会出现一些特定的治疗后并发症，而保守治疗更安全且侵入性较小，但症状缓解较慢且复发率较高。个体化治疗应考虑症状严重程度、患者偏好和风险承受能力。", "keywords_zh": "保守治疗、痔疮、荟萃分析、手术治疗", "keywords_en": "Conservative treatment, Hemorrhoids, Meta-Analysis, Surgical treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40596934/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 02 Jul 2025"}, {"id": "40590873", "title_en": "Endoscopic Submucosal Dissection and Transanal Endoscopic Microsurgery in the Treatment of Rectal Neuroendocrine Tumors: Systematic Review and Meta-Analysis of the Observational Studies", "title_zh": "内镜粘膜下剥离术和经肛门内镜显微手术治疗直肠神经内分泌肿瘤：观察性研究的系统回顾和荟萃分析", "authors": "Andrzej Białek", "abstract_en": "**Introduction:** Rectal neuroendocrine tumors (rNETs) are subepithelial lesions with potential of malignancy. Despite the guidelines recommending that rNETs measuring 10-20 mm should be removed either endoscopic submucosal dissection (ESD) or transanal endoscopic microsurgery (TEM), the management with these entities is still a clinical dilemma. We performed a meta-analysis to compare ESD and TEM regarding method effectiveness and safety in the treatment of rNETs.\n\n**Methods:** PubMed/MEDLINE/Embase/EBSCO/CINAHL was searched up for observational studies analyzing the efficacy and safety of both methods in the treatment of rNETs.\n\n**Results:** A total of 59 observational studies with a total of n = 2,804 participants were included. In a subgroup analysis, we demonstrated that the R0 resection rate was significantly ( P = 0.002) lower for ESD (rate: 0.854) than for TEM (0.924). The recurrence rate differed significantly ( P = 0.008); the lowest (event rate [ER] = 0.015) was found for ESD and the highest for TEM (ER = 0.035). The overall bleeding rate was 0.046 and perforation rate was 0.023 and no significant differences ( P = 0.274 for bleeding, P = 0.808 for perforation) were found by intervention type. The rate of other complications (wound dehiscence, soilage, incontinence, rectovaginal fistula, pelvic pain, retroperitoneal emphysema, coagulation syndrome) was significantly ( P = 0.000) higher for TEM (ER = 0.107) than ESD (ER = 0.013). We also included 4 comparative studies with 490 patients. Using random-effects analysis, we found that the risk ratio for R0 resection was approximately 10% lower for ESD. Our analysis showed significantly greater size ( P = 0.01) and follow-up ( P = 0.03) in the group treated with TEM.\n\n**Discussion:** The efficacy of TEM is higher than ESD with a higher risk of complications in this method. Lesions with a greater size are treated with TEM, and recurrence rate is greater for this procedure. Long follow-up is needed after the treatment of rNETs to detect the recurrence early.", "abstract_zh": "**介绍：** 直肠神经内分泌肿瘤（rNET）是具有恶性潜力的上皮下病变。尽管指南建议应通过内镜粘膜下剥离术 (ESD) 或经肛门内镜显微手术 (TEM) 切除 10-20 毫米的 rNET，但这些实体的治疗仍然是一个临床困境。我们进行了一项荟萃分析，以比较 ESD 和 TEM 治疗 rNET 的方法有效性和安全性。\n\n**方法：** 检索了 PubMed/MEDLINE/Embase/EBSCO/CINAHL 的观察性研究，分析这两种方法治疗 rNET 的有效性和安全性。\n\n**结果：** 共纳入 59 项观察性研究，共有 2,804 名参与者。在亚组分析中，我们证明 ESD 的 R0 切除率（比率：0.854）显着低于 TEM（0.924）（P = 0.002）。复发率差异显着（P=0.008）； ESD 最低（事件率 [ER] = 0.015），TEM 最高（ER = 0.035）。总出血率为0.046，穿孔率为0.023，不同干预类型差异无统计学意义（出血P=0.274，穿孔P=0.808）。 TEM (ER = 0.107) 的其他并发症（伤口裂开、污渍、失禁、直肠阴道瘘、骨盆疼痛、腹膜后气肿、凝血综合征）发生率显着高于 ESD (ER = 0.013) (P = 0.000)。我们还纳入了 4 项比较研究，涉及 490 名患者。通过随机效应分析，我们发现 R0 切除的风险比 ESD 大约低 10%。我们的分析显示，TEM 治疗组的体型显着增大 (P = 0.01)，随访时间也明显增大 (P = 0.03)。\n\n**讨论：** TEM 的疗效高于 ESD，但该方法出现并发症的风险较高。病变尺寸越大，则采用 TEM 治疗，复发率越高。 rNET 治疗后需要长期随访，以便及早发现复发情况。", "keywords_zh": "ESD、TEM、rNET、直肠神经内分泌肿瘤、治疗", "keywords_en": "ESD, TEM, rNETs, rectal neuroendocrine tumors, treatment", "link": "https://pubmed.ncbi.nlm.nih.gov/40590873/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 01 Jul 2025"}, {"id": "40576944", "title_en": "Operative versus nonoperative treatment of thrombosed external hemorrhoids: a systematic review and meta-analysis", "title_zh": "血栓性外痔的手术与非手术治疗：系统评价和荟萃分析", "authors": "Rachid Eduardo Noleto da Nobrega Oliveira", "abstract_en": "Thrombosed external hemorrhoids are a complication of hemorrhoids characterized by severe pain, swelling, and lump formation due to acute venous engorgement. Treatment options remain controversial, with limited evidence guiding the choice between surgical and conservative approaches. PubMed, Embase, and Cochrane Library databases were searched from inception to December 2024 to identify clinical trials comparing surgery with conservative treatment in thrombosed external hemorrhoids. Statistical analyses were performed using Review Manager 5.4.1 with a random-effects model. Heterogeneity was assessed using the I<sup>2</sup> test. We included six studies with a total of 851 patients, of whom 390 (45.8%) underwent surgical treatment. Surgical treatment was associated with a lower risk of recurrence compared to conservative management (RR 0.49; 95% CI 0.26-0.91; P < 0.05; I<sup>2</sup> = 54%). However, there were no significant differences in the risk of bleeding between the groups (RR 0.96; 95% CI 0.27-3.44; P = 0.95; I<sup>2</sup> = 60%). Subgroup analyses of the excision surgery group revealed no differences between approaches. Our main findings indicated no significant difference in bleeding between surgery and conservative treatment groups. However, operative management is associated with significantly lower recurrences, which should be the preferred choice.", "abstract_zh": "血栓性外痔是痔疮的一种并发症，其特征是由于急性静脉充血而导致剧烈疼痛、肿胀和肿块形成。治疗选择仍然存在争议，指导手术和保守治疗之间选择的证据有限。对 PubMed、Embase 和 Cochrane 图书馆数据库进行了检索，从最初到 2024 年 12 月，以识别比较手术与保守治疗血栓性外痔的临床试验。使用 Review Manager 5.4.1 和随机效应模型进行统计分析。使用 I<sup>2</sup> 检验评估异质性。我们纳入了 6 项研究，共 851 名患者，其中 390 名 (45.8%) 接受了手术治疗。与保守治疗相比，手术治疗的复发风险较低（RR 0.49；95% CI 0.26-0.91；P < 0.05；I<sup>2</sup> = 54%）。然而，各组之间的出血风险没有显着差异（RR 0.96；95% CI 0.27-3.44；P = 0.95；I<sup>2</sup> = 60%）。切除手术组的亚组分析显示方法之间没有差异。我们的主要发现表明手术治疗组和保守治疗组之间的出血没有显着差异。然而，手术治疗可显着降低复发率，这应该是首选。", "keywords_zh": "痔疮，非手术性，手术性，复发", "keywords_en": "Hemorrhoids, Nonoperative, Operative, Recurrence", "link": "https://pubmed.ncbi.nlm.nih.gov/40576944/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 27 Jun 2025"}, {"id": "40548987", "title_en": "Robotic surgery in anorectal malformations: Where are we? A systematic review", "title_zh": "肛门直肠畸形的机器人手术：我们在哪里？系统回顾", "authors": "Giovanna Riccipetitoni", "abstract_en": "Robotic surgery has emerged as a promising technique in pediatric colorectal surgery, offering enhanced precision, superior ergonomics, and potentially improved outcomes compared to conventional laparoscopic and open approaches. This systematic review aimed to evaluate the current literature on robotic-assisted surgery for anorectal malformations (ARMs) in pediatric patients. A comprehensive search of PubMed, Web of Science, and the Cochrane Library was conducted for studies published between 2000 and 2025, focusing on robotic procedures in infants with ARMs. Eight studies met the inclusion criteria, reporting on a total of 39 patients (male-to-female ratio 15:0.5), with a median age at surgery of 6.9 months. The most frequent ARM types were recto-prostatic, recto-bulbar, and recto-vesical fistulas. Median operative time was 226.3 min, and median length of hospital stay was 5.5 days. No intraoperative or early postoperative complications were observed, while late complications occurred in 18% of cases. Only one study included a comparative analysis with laparoscopic-assisted PSARP, precluding meta-analysis. Robotic-assisted anorectoplasty appears to be a safe and feasible approach, particularly advantageous for nerve-sparing pelvic dissection. However, further high-quality studies are necessary to define indications, evaluate long-term functional outcomes, and compare this technique with conventional surgical approaches.", "abstract_zh": "机器人手术已成为儿科结直肠手术中一项有前景的技术，与传统的腹腔镜和开放手术相比，它具有更高的精确度、卓越的人体工程学设计以及潜在的改善结果。本系统综述旨在评估目前关于儿童患者肛门直肠畸形 (ARM) 机器人辅助手术的文献。对 PubMed、Web of Science 和 Cochrane 图书馆对 2000 年至 2025 年间发表的研究进行了全面检索，重点关注 ARM 婴儿的机器人手术。八项研究符合纳入标准，共报告了 39 名患者（男女比例 15:0.5），手术时的中位年龄为 6.9 个月。最常见的 ARM 类型是直肠前列腺瘘、直肠球瘘和直肠膀胱瘘。中位手术时间为 226.3 分钟，中位住院时间为 5.5 天。未观察到术中或术后早期并发症，而18%的病例出现晚期并发症。只有一项研究包括与腹腔镜辅助 PSARP 的比较分析，排除了荟萃分析。机器人辅助肛门直肠成形术似乎是一种安全可行的方法，特别有利于保留神经的盆腔解剖。然而，需要进一步的高质量研究来定义适应症、评估长期功能结果并将该技术与传统手术方法进行比较。", "keywords_zh": "肛门直肠畸形、肛门直肠成形术、机器人辅助手术", "keywords_en": "Anorectal malformation, Anorectoplasty, Robotic-assisted surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40548987/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 23 Jun 2025"}, {"id": "40508850", "title_en": "Biopsychosocial Strategies for Alleviating Low Back Pain in Late Mothers: A Systematic Review", "title_zh": "缓解已故母亲腰痛的生物心理社会策略：系统评价", "authors": "Mariola Bidzan", "abstract_en": "<b>Background:</b> Low back pain (LBP) in older mothers is a prevalent and multifaceted condition influenced by a range of biopsychosocial factors. As the trend of late motherhood increases globally, it is essential to understand how LBP affects this population from a biopsychosocial perspective. <b>Objective:</b> This systematic review aims to examine the biopsychosocial determinants of LBP in older mothers by synthesizing findings from quantitative studies published between January 2010 and May 2024. Specifically, it explores the biological, psychological, and social factors contributing to LBP in this population and how it affects their daily lives and well-being. <b>Methods:</b> A comprehensive literature search was conducted across PubMed, PsychInfo, Web of Science, EMBASE, DARE, and the Cochrane Library. Studies were screened for eligibility based on predefined criteria. Five quantitative studies with a combined sample of 118,964 participants were included. The methodological quality was assessed, and data were extracted for analysis. <b>Results:</b> All five studies addressed biological aspects of LBP, including pelvic girdle pain, hemorrhoids, and varicose veins. Three studies also explored psychological factors such as depression and stress. Two studies incorporated social dimensions, including inadequate support systems, occupational burdens, and healthcare access barriers. Age and parity were consistently reported as exacerbating physical and psychological symptoms. <b>Conclusions:</b> This review highlights the importance of considering biopsychosocial factors when managing LBP in older mothers. Tailored interventions, such as exercise programs, family support, and workplace accommodations, are essential for improving outcomes. Further research using longitudinal studies is needed to explore these factors in greater depth.", "abstract_zh": "<b>背景：</b>高龄母亲的腰痛 (LBP) 是一种普遍存在的多方面疾病，受一系列生物心理社会因素的影响。随着全球晚孕趋势的增加，有必要从生物心理社会角度了解光体痛如何影响这一人群。 <b>目的：</b>本系统综述旨在通过综合 2010 年 1 月至 2024 年 5 月期间发表的定量研究结果，探讨老年母亲 LBP 的生物心理社会决定因素。具体而言，它探讨了导致该人群 LBP 的生物、心理和社会因素，以及它如何影响她们的日常生活和福祉。 <b>方法：</b>在 PubMed、PsychInfo、Web of Science、EMBASE、DARE 和 Cochrane 图书馆进行了全面的文献检索。根据预先定义的标准筛选研究资格。其中包括五项定量研究，合并样本为 118,964 名参与者。评估方法学质量，并提取数据进行分析。 <b>结果：</b>所有五项研究都涉及 LBP 的生物学方面，包括骨盆带疼痛、痔疮和静脉曲张。三项研究还探讨了抑郁和压力等心理因素。两项研究纳入了社会层面，包括支持系统不足、职业负担和医疗保健获取障碍。据一致报道，年龄和胎次会加剧身体和心理症状。 <b>结论：</b>本综述强调了在管理高龄母亲腰痛时考虑生物心理社会因素的重要性。量身定制的干预措施，例如锻炼计划、家庭支持和工作场所住宿，对于改善结果至关重要。需要使用纵向研究进行进一步研究，以更深入地探讨这些因素。", "keywords_zh": "生物心理社会因素、生物心理社会模型、腰痛、高龄母亲", "keywords_en": "biopsychosocial factors, biopsychosocial model, low back pain, older mothers", "link": "https://pubmed.ncbi.nlm.nih.gov/40508850/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 13 Jun 2025"}, {"id": "40501157", "title_en": "The median sacral artery and its surgical anatomy in pelvic and spinal surgery: a systematic review and meta-analysis", "title_zh": "骶正中动脉及其在盆腔和脊柱手术中的手术解剖：系统评价和荟萃分析", "authors": "Przemysław Pękala", "abstract_en": "**Background:** The median sacral artery (MSA) is a small but clinically significant artery arising from the aortic bifurcation and traveling along the anterior sacrum. It supplies the lumbar and sacral vertebrae and, in some cases, parts of the rectum. Despite its size, the MSA is crucial in regional circulation and is particularly relevant in spinal, pelvic, and vascular surgeries. This meta-analysis aims to provide a comprehensive synthesis of anatomical evidence regarding the MSA's origin, variations, and surgical relevance.\n\n**Materials And Methods:** A systematic search was conducted in major databases (PubMed, Embase, ScienceDirect, Scopus, Web of Science, and SciELO) until January 2025. Studies reporting anatomical data on the MSA, including its origin, variations, and clinical significance, were included. A total of 13 studies (n = 1,007 arteries) met the criteria.\n\n**Results:** The MSA originated directly from the aorta in 89.98% (95% CI: 84.05%-95.92%) of cases. In 8.27% (95% CI: 3.29%-13.25%), it shared a common origin with a lumbar artery, typically the 4th lumbar artery (97.86%). The 5th lumbar artery variation was rare (0.66%). Regarding its position relative to the sacral midline, the MSA was found on the left (48.80%), right (31.32%), or directly along the midline (13.35%). The mean distance from the midline was 3.54 mm.\n\n**Conclusions:** Recognizing MSA variations is essential for surgical planning to prevent vascular injury during spinal and gynecological procedures. Further cadaveric and imaging studies are needed to enhance procedural safety.", "abstract_zh": "**背景：** 骶正中动脉 (MSA) 是一条小但具有临床意义的动脉，起源于主动脉分叉并沿骶前部行进。它供应腰椎和骶椎，在某些情况下，供应部分直肠。尽管 MSA 很大，但它对局部循环至关重要，尤其与脊柱、骨盆和血管手术相关。这项荟萃分析旨在提供有关 MSA 起源、变异和手术相关性的解剖学证据的全面综合。\n\n**材料与方法：** 截至 2025 年 1 月，我们在主要数据库（PubMed、Embase、ScienceDirect、Scopus、Web of Science 和 SciELO）中进行了系统检索。报告了 MSA 解剖数据的研究，包括其起源、变异和临床意义。共有 13 项研究（n = 1,007 条动脉）符合标准。\n\n**结果：** 89.98% (95% CI: 84.05%-95.92%) 的病例中 MSA 直接起源于主动脉。 8.27%（95% CI：3.29%-13.25%）的患者与腰动脉有共同起源，通常是第四腰动脉（97.86%）。第5腰动脉变异罕见（0.66%）。就其相对于骶骨中线的位置而言，MSA位于左侧（48.80%）、右侧（31.32%）或直接沿着中线（13.35%）。距中线的平均距离为 3.54 毫米。\n\n**结论：** 认识 MSA 变化对于手术规划至关重要，以防止脊柱和妇科手术期间发生血管损伤。需要进一步的尸体和成像研究以提高手术安全性。", "keywords_zh": "解剖变异、临床解剖学、骶正中动脉、荟萃分析、盆腔血管化、骶骨", "keywords_en": "anatomic variations, clinical anatomy, median sacral artery, meta-analysis, pelvic vascularization, sacrum", "link": "https://pubmed.ncbi.nlm.nih.gov/40501157/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 12 Jun 2025"}, {"id": "40500490", "title_en": "Indocyanine green and height of anastomosis in colorectal surgery- a network meta-analysis", "title_zh": "吲哚菁绿与结直肠手术吻合高度的网络荟萃分析", "authors": "James Wei-Tatt Toh", "abstract_en": "**Purpose:** Anastomotic leak is a potentially life-threatening complication of colorectal surgery, with perfusion and height of anastomoses considered important risk factors. Indocyanine green (ICG) is commonly used in fluorescence angiography (FA) for perfusion assessment though techniques vary. This is a network meta-analysis comparing use of ICG-FA and height of anastomosis for left sided colorectal anastomoses and rates of anastomotic leak.\n\n**Methods:** A systematic review was performed including all adult clinical studies using ICG-FA in colorectal anastomoses. A network meta-analysis was performed to compare high and low anterior resections and the use of ICG for the outcome of anastomotic leak.\n\n**Results:** Of some 333 studies retrieved during review, 31 studies were included, totalling 6431 patients. In a meta-analysis to compare high and low anterior resection, with and without ICG, odds of anastomotic leak were greater in low compared to high anastomoses, and ICG is protective in both, OR of 0.38 (0.20-0.73) for high and OR of 0.41 (0.30-0.54) in low anastomoses, with ICG compared to without.\n\n**Conclusion:** There is benefit of ICG for both HAR and LAR in reducing anastomotic leak. While there is no consensus on the application, dosage and timing of ICG during anterior resection, pooled results and most studies have shown that the use of ICG to check for tissue perfusion of anastomosis reduces leak. ICG should be considered as part of a surgeon's armamentarium for intraoperative anastomotic check to reduce the risk of postoperative anastomotic leak.", "abstract_zh": "**Purpose：** 吻合口瘘是结直肠手术的一种潜在危及生命的并发症，灌注和吻合口高度被认为是重要的危险因素。尽管技术各异，吲哚菁绿 (ICG) 通常用于荧光血管造影 (FA) 中进行灌注评估。这是一项网络荟萃分析，比较了左侧结直肠吻合术中 ICG-FA 的使用和吻合高度以及吻合口漏率。\n\n**方法：** 进行了系统评价，包括在结直肠吻合术中使用 ICG-FA 的所有成人临床研究。进行了网络荟萃分析来比较高位和低位前切除术以及 ICG 对吻合口瘘结果的使用。\n\n**结果：** 在审查过程中检索到的约 333 项研究中，纳入了 31 项研究，共计 6431 名患者。在一项比较高位和低位前切除术（有和没有 ICG）的荟萃分析中，与高位吻合相比，低位吻合术发生吻合口漏的几率更大，并且 ICG 对两种情况都有保护作用，有 ICG 与无 ICG 相比，高位吻合的 OR 为 0.38（0.20-0.73），低位吻合的 OR 为 0.41（0.30-0.54）。\n\n**结论：** ICG 对于 HAR 和 LAR 都有利于减少吻合口瘘。虽然对于前切除术中 ICG 的应用、剂量和时机尚未达成共识，但汇总结果和大多数研究表明，使用 ICG 检查吻合口的组织灌注可减少渗漏。 ICG 应被视为外科医生术中吻合口检查装备的一部分，以降低术后吻合口瘘的风险。", "keywords_zh": "吻合口漏、结直肠吻合术、高位前切除术、吲哚菁绿、低位前切除术", "keywords_en": "Anastomotic leak, Colorectal anastomosis, High anterior resection, Indocyanine green, Low anterior resection", "link": "https://pubmed.ncbi.nlm.nih.gov/40500490/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 11 Jun 2025"}, {"id": "40493094", "title_en": "Limitations of the Goligher classification in randomized trials for hemorrhoidal disease: a qualitative systematic review of selection criteria", "title_zh": "痔疮疾病随机试验中 Goligher 分类的局限性：选择标准的定性系统评价", "authors": "G Gallo", "abstract_en": "**Background:** The diverse range of therapeutic options for hemorrhoidal disease (HD) highlights the need for precise classification systems to guide treatment. Although the Goligher classification remains the most widely used, it has been criticized for its simplicity and limited ability to capture symptom severity or guide treatment decisions. This study aims to evaluate the patient selection criteria and classification systems employed in randomized controlled trials (RCTs) for HD.\n\n**Methods:** A systematic review was conducted following the 2020 PRISMA guidelines. A comprehensive search of databases identified randomized controlled trials (RCTs) comparing treatments for HD, focusing on classification systems used for patient enrollment. Eligible studies included adult patients and at least one arm involving surgical treatment.\n\n**Results:** Out of 6692 records, 162 studies met the inclusion criteria, with a median cohort size of 84 patients and 55.4% male. Most studies (86.4%) used the Goligher system, though the majority did not fully describe or cite the system. Only 13.6% of studies employed more recent alternative classification systems. The most common outcome measures across studies were postoperative pain (147 studies) and complications (133 studies). Recurrence rates were reported in 42% of studies, yet 70% of these did not provide adequate inclusion criteria or references to Goligher's classification.\n\n**Conclusions:** The inconsistent application of the Goligher classification and the variability in patient selection criteria across RCTs highlight the need for more nuanced and standardized systems. Future research should focus on refining classification methods and incorporating patient-reported outcomes to improve the reliability and relevance of HD trials.\n\n**Prospero Registration:** CRD42023387339.", "abstract_zh": "**背景：** 痔疮疾病 (HD) 的治疗选择多种多样，凸显了需要精确的分类系统来指导治疗。尽管 Goligher 分类仍然是使用最广泛的分类，但它因其简单性和捕捉症状严重程度或指导治疗决策的能力有限而受到批评。本研究旨在评估 HD 随机对照试验 (RCT) 中采用的患者选择标准和分类系统。\n\n**方法：** 根据 2020 年 PRISMA 指南进行了系统审查。对数据库进行全面检索，确定了比较 HD 治疗方法的随机对照试验 (RCT)，重点关注用于患者入组的分类系统。符合条件的研究包括成年患者和至少一只涉及手术治疗的手臂。\n\n**结果：** 在 6692 项记录中，有 162 项研究符合纳入标准，队列规模中位数为 84 名患者，其中 55.4% 为男性。大多数研究 (86.4%) 使用 Goligher 系统，尽管大多数研究没有完全描述或引用该系统。只有 13.6% 的研究采用了更新的替代分类系统。研究中最常见的结果指标是术后疼痛（147 项研究）和并发症（133 项研究）。 42% 的研究报告了复发率，但其中 70% 的研究没有提供足够的纳入标准或对 Goligher 分类的参考。\n\n**结论：** Goligher 分类的应用不一致以及随机对照试验中患者选择标准的可变性突出表明需要更细致和标准化的系统。未来的研究应侧重于完善分类方法并纳入患者报告的结果，以提高 HD 试验的可靠性和相关性。\n\n**Prospero registration：** CRD42023387339。", "keywords_zh": "分类系统、Goligher 分类、痔疮疾病、痔疮、患者选择、随机对照试验", "keywords_en": "Classification systems, Goligher classification, Hemorrhoidal disease, Hemorrhoids, Patient selection, Randomized controlled trials", "link": "https://pubmed.ncbi.nlm.nih.gov/40493094/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 10 Jun 2025"}, {"id": "40481245", "title_en": "Real-world use of polidocanol foam sclerotherapy for hemorrhoidal disease: insights from an international survey and systematic review with clinical practice recommendations", "title_zh": "聚多卡醇泡沫硬化疗法治疗痔疮疾病的真实应用：国际调查和系统评价以及临床实践建议的见解", "authors": "Gianpiero Gravante", "abstract_en": "Polidocanol foam sclerotherapy has gained increasing attention as a minimally invasive treatment for hemorrhoidal disease (HD). However, significant variability exists in its clinical application regarding patient selection, procedural techniques, and postoperative management. This study aimed to assess real-world practice patterns among international experts, summarize existing evidence through a systematic literature review, and develop evidence-based clinical practice recommendations. A systematic review was conducted in MEDLINE, EMBASE, and CENTRAL to identify studies evaluating polidocanol foam sclerotherapy for HD. A total of 20 studies met the inclusion criteria. Additionally, an international survey was distributed to 30 experts in proctology and colorectal surgery to explore variations in indications, perioperative management, technique, and follow-up. Survey responses were analyzed descriptively to identify common trends and areas of divergence. Subsequently, based on both the experts' opinions and the results of the survey, a Delphi method was employed to produce clinical practice recommendations. The questions for the Delphi process were developed by the authors leading the project, followed by a detailed discussion with the whole panel of experts. Most experts (90%) reported using polidocanol foam sclerotherapy primarily for Goligher grade II HD, with 67% extending its use to grade III cases. Preoperative bowel preparation and anesthesia use varied widely. The preferred concentration was 3% polidocanol, with 2 mL injected per hemorrhoidal pile in most cases. Post-procedural care lacked standardization, though stool softeners and flavonoids were commonly recommended. Compared to rubber band ligation, polidocanol foam was perceived as having higher success rates (88.3% vs. 66.7%) and lower recurrence rates (16.1% vs. 41.2%). Adverse events were infrequent. The present article offers a comprehensive suite of clinical practice expert-based recommendations concerning the use of polidocanol foam sclerotherapy for HD. However, there is still significant variation in its application. These findings highlight the need for standardized guidelines and further research to optimize procedural strategies and long-term outcomes.", "abstract_zh": "聚多卡醇泡沫硬化疗法作为痔疮疾病（HD）的微创治疗方法越来越受到关注。然而，其临床应用在患者选择、手术技术和术后管理方面存在显着差异。本研究旨在评估国际专家的真实实践模式，通过系统文献综述总结现有证据，并制定基于证据的临床实践建议。 MEDLINE、EMBASE 和 CENTRAL 进行了系统评价，以确定评估聚多卡醇泡沫硬化疗法治疗 HD 的研究。共有 20 项研究符合纳入标准。此外，还向 30 名直肠病学和结直肠外科专家进行了一项国际调查，以探讨适应症、围手术期管理、技术和随访方面的差异。对调查回复进行描述性分析，以确定共同趋势和分歧领域。随后，根据专家意见和调查结果，采用德尔菲法提出临床实践建议。德尔菲流程的问题是由领导该项目的作者提出的，然后与整个专家小组进行了详细讨论。大多数专家 (90%) 报告主要使用聚多卡醇泡沫硬化疗法治疗 Goligher II 级 HD，其中 67% 将其使用范围扩大到 III 级病例。术前肠道准备和麻醉使用差异很大。首选浓度是 3% 聚多卡醇，大多数情况下每个痔疮注射 2 mL。尽管通常推荐使用大便软化剂和类黄酮，但术后护理缺乏标准化。与橡皮筋结扎相比，聚多卡醇泡沫被认为具有更高的成功率（88.3% vs. 66.7%）和较低的复发率（16.1% vs. 41.2%）。不良事件很少发生。本文提供了一套基于临床实践专家的全面建议，涉及使用聚多卡醇泡沫硬化疗法治疗 HD。然而，其应用仍然存在显着差异。这些发现强调需要标准化指南和进一步研究来优化程序策略和长期结果。", "keywords_zh": "专家调查、痔疮疾病、聚多卡醇泡沫、硬化疗法、系统评价", "keywords_en": "Expert survey, Hemorrhoidal disease, Polidocanol foam, Sclerotherapy, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40481245/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 06 Jun 2025"}, {"id": "40461025", "title_en": "Comparison of endoscopic vacuum therapy with standard care for colorectal anastomotic leakage: a systematic review and meta-analysis", "title_zh": "内镜负压治疗与结直肠吻合口瘘标准护理的比较：系统评价和荟萃分析", "authors": "Yunhong Tian", "abstract_en": "This systematic review and meta-analysis aimed to evaluate the effectiveness of endoscopic vacuum therapy (EVT) compared with standard care in managing colorectal anastomotic leakage, a serious complication following colorectal surgery.We conducted a literature search across PubMed, Embase, and the Cochrane Library for clinical studies published before October 2024 that compared the outcomes of EVT and standard care for anastomotic leakage, including leakage resolution rates, treatment duration, hospital stay duration, or postoperative complications. The pooled estimates of risk ratio (RR) or mean difference were primarily derived using a fixed-effects model, with a random-effects model used when high heterogeneity was detected.The analysis included six observational studies (273 patients). EVT was associated with a significantly higher resolution rate compared with standard care (RR 1.18, 95%CI 1.03 to 1.35; <i>P</i> = 0.02). Treatment duration was significantly shorter in the EVT group (mean difference -30.6 days, 95%CI -43.5 to -17.7; <i>P</i> < 0.001), while hospital stay duration showed no significant difference between EVT and standard care (mean difference 1.7 days, 95%CI -4.2 to 7.7; <i>P</i> = 0.57). No statistically significant difference was found in the rate of treatment-related complications between EVT and standard care (RR 1.17, 95%CI 0.52 to 2.80; <i>P</i> = 0.71).This meta-analysis suggests that EVT has superior effectiveness in terms of leakage resolution rates, as well as a shorter treatment duration compared with standard care for colorectal anastomotic leakage. This study is however constrained by the lack of prospective data, the risk of selection bias, and heterogeneity, requiring cautious interpretation of the findings.PROSPERO registration: CRD 4873455814.", "abstract_zh": "这项系统评价和荟萃分析旨在评估内镜真空治疗 (EVT) 与标准护理相比在处理结直肠吻合口瘘（结直肠手术后的严重并发症）方面的有效性。我们对 PubMed、Embase 和 Cochrane 图书馆进行了文献检索，查找 2024 年 10 月之前发表的临床研究，比较 EVT 和标准护理对吻合口瘘的结果，包括泄漏解决率、治疗持续时间、住院时间或术后并发症。风险比 (RR) 或平均差的汇总估计值主要使用固定效应模型得出，当检测到高度异质性时使用随机效应模型。该分析包括六项观察性研究（273 名患者）。与标准护理相比，EVT 的缓解率明显更高（RR 1.18，95% CI 1.03 至 1.35；<i>P</i> = 0.02）。 EVT 组的治疗时间显着缩短（平均差 -30.6 天，95%CI -43.5 至 -17.7；<i>P</i> < 0.001），而 EVT 和标准治疗之间的住院时间无显着差异（平均差 1.7 天，95%CI -4.2 至 -17.7；<i>P</i> = 0.57）。 EVT 和标准护理之间的治疗相关并发症发生率没有发现统计学上的显着差异（RR 1.17，95%CI 0.52 至 2.80；<i>P</i> = 0.71）。该荟萃分析表明，与结直肠吻合口瘘标准护理相比，EVT 在渗漏解决率方面具有更高的有效性，并且治疗持续时间更短。然而，这项研究受到缺乏前瞻性数据、选择偏倚风险和异质性的限制，需要对研究结果进行谨慎解释。PROSPERO 注册：CRD 4873455814。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40461025/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 03 Jun 2025"}, {"id": "40456210", "title_en": "Transmission of gonorrhea from the oral cavity to the rectal tract: A systematic review", "title_zh": "淋病从口腔传播到直肠：系统评价", "authors": "Mabel Miluska Suca Salas", "abstract_en": "BackgroundThe antimicrobial resistance of Neisseria gonorrhoeae and the high prevalence of asymptomatic extragenital infections are a worldwide concern. This research investigated whether gonorrhea can be transmitted from the oral cavity to the anorectal tract among men who have sex with men.<b>Purpose</b>The aim of this research is to find plausible relationships regarding the probability of gonococcal transmission from the oral cavity to the anorectal tract among MSM.<b>Research Design</b>A research question was defined using the P.I.C.O. strategy (population, intervention or exposure, comparison and outcome), where the target population is MSM, the intervention is exposure to contaminated oral cavity/saliva, the control is the absence of exposure, and the outcome is the acquisition of GC. The eligibility criteria included observational studies involving men who have sex with men, regardless of sexual orientation, aged 16 or older, screened for oropharyngeal and rectal gonorrhea, and examining the role of oral fluids in transmission. Studies involving partners previously diagnosed with urogenital gonorrhea or reporting consistent condom use during receptive penoanal sex were excluded to avoid urethral-to-anorectal transmission bias.<b>Study Sample</b>The databases employed were PubMed, Scopus, Web of Science, EBSCO, SciELO, and the Virtual Health Library (VHL). A total of 383 studies were identified, however, only 6 were included.<b>Data Collection and/or Analysis</b>According to the Newcastle-Ottawa Scale (NOS), two studies were \"very good,\" two \"good,\" and two \"satisfactory\". Most studies described a complete methodology according to Strengthening the Reporting of Observational studies in Epidemiology (STROBE).<b>Results</b>Differences in diagnostic methods, methodologies, and variables limited the findings. While the results do not confirm transmission from the oral cavity to the anorectal tract, they suggest its possibility. Further research is needed to better understand this transmission route.<b>Conclusions</b>Transmissibility of gonorrhea from oropharyngeal via to the anorectal tract cannot be totally establish. However, evidence suggested the existence of this gonorrhea transmission. The fact that men with rectal gonorrhea continue to appear, even in contexts of condom use or the absence of receptive penoanal sex, brings the importance of cases monitoring and the establishment of preventive strategies.", "abstract_zh": "背景淋病奈瑟菌的抗菌药物耐药性和无症状生殖器外感染的高患病率是全世界关注的问题。本研究调查了男男性行为者中淋病是否可以从口腔传播到肛门直肠。<b>目的</b>本研究的目的是寻找 MSM 中淋球菌从口腔传播到肛门直肠的概率之间的合理关系。<b>研究设计</b>使用 P.I.C.O. 定义了一个研究问题。策略（人群、干预或暴露、比较和结果），其中目标人群是 MSM，干预是暴露于受污染的口腔/唾液，对照是不存在暴露，结果是 GC 的获得。资格标准包括对年龄在 16 岁或以上的男男性行为者（无论性取向如何）进行观察性研究，筛查口咽和直肠淋病，并检查口腔液体在传播中的作用。涉及先前诊断为泌尿生殖淋病或报告在接受性肛交期间持续使用安全套的研究被排除，以避免尿道到肛门直肠传播偏差。<b>研究样本</b>使用的数据库包括 PubMed、Scopus、Web of Science、EBSCO、SciELO 和虚拟健康图书馆 (VHL)。总共确定了 383 项研究，但仅纳入 6 项。<b>数据收集和/或分析</b>根据纽卡斯尔-渥太华量表 (NOS)，两项研究为“非常好”，两项为“良好”，两项为“令人满意”。大多数研究根据加强流行病学观察研究报告 (STROBE) 描述了完整的方法。<b>结果</b>诊断方法、方法和变量的差异限制了研究结果。虽然结果并未证实从口腔传播到肛门直肠，但表明了其可能性。需要进一步研究以更好地了解这种传播途径。<b>结论</b>淋病从口咽到肛门直肠的传播能力尚不能完全确定。然而，有证据表明存在这种淋病传播。即使在使用安全套或缺乏接受性交的情况下，患有直肠淋病的男性仍然不断出现，这一事实凸显了病例监测和制定预防策略的重要性。", "keywords_zh": "口腔、淋病、直肠、性少数和性别少数、性传播疾病", "keywords_en": "Mouth, gonorrhoea, rectum, sexual and gender minorities, sexually transmitted diseases", "link": "https://pubmed.ncbi.nlm.nih.gov/40456210/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 02 Jun 2025"}, {"id": "40434549", "title_en": "A rare combination of hypogonadotropic hypogonadism, GH deficiency and rectal atresia in a female with an FGFR1 variant: a case report and systematic review of the literature", "title_zh": "FGFR1 变异女性罕见性腺激素减退症、生长激素缺乏症和直肠闭锁的组合：病例报告和文献系统回顾", "authors": "George Mastorakos", "abstract_en": "**Purpose:** To report a case with combined pituitary hormone deficiency (CPHD) and Fibroblast growth factor receptor 1 (FGFR1) gene defect, and summarize the clinical characteristics of similar cases by reviewing the current reports from the literature.\n\n**Methods:** A 24-year-old woman was admitted to the outpatient endocrinology unit with a diagnosis of primary amenorrhea, history of Growth Hormone deficiency and multiple congenital anomalies including rectal atresia. The subsequent hormonal investigation led to the diagnosis of hypogonadotropic hypogonadism and persistent GH deficiency. Abdominal and pelvic ultrasounds were normal whereas the brain MRI revealed a hypoplastic sella turcica with a hypoplastic anterior pituitary lobe, an ectopic posterior pituitary lobe and a thin pituitary stalk. The genetic analysis revealed a novel pathogenic missense heterozygous variant (c.1958G > A, p.Agr635Gln) in exon 15 of FGFR1 gene. PubMed, Scopus, and Web of Science were searched for the identification of studies reporting cases of CPHD with FGFR1 gene defects.\n\n**Results:** Of the 648 records retrieved, 10 were included in this review. A comprehensive overview of the cases was summarized, and their clinical and genetic characteristics were presented.\n\n**Conclusion:** Although FGFR1 variants have been associated with Kallmann syndrome and isolated hypogonadotropic hypogonadism and recently with CPHD, the patient's phenotype includes phenotypic alterations not previously described, to the best of our knowledge, within the spectrum of non-reproductive features of either of these entities. Isolated GH deficiency combined with other non-common abnormalities exerts a great possibility for subsequent CPHD manifestation.", "abstract_zh": "**Purpose：** 报告1例合并垂体激素缺乏症（CPHD）和成纤维细胞生长因子受体1（FGFR1）基因缺陷的病例，通过回顾现有文献报道，总结同类病例的临床特点。\n\n**方法：** 一名 24 岁女性被送往内分泌科门诊，诊断为原发性闭经、生长激素缺乏病史以及包括直肠闭锁在内的多种先天性异常。随后的激素检查诊断为低促性腺激素性性腺功能减退症和持续性 GH 缺乏。腹部和盆腔超声检查正常，而脑部 MRI 显示蝶鞍发育不良，垂体前叶发育不良、异位垂体后叶和细垂体柄。遗传分析揭示了 FGFR1 基因第 15 号外显子中存在一种新的致病性错义杂合变异体（c.1958G > A，p.Agr635Gln）。对 PubMed、Scopus 和 Web of Science 进行了搜索，以确定报告 FGFR1 基因缺陷的 CPHD 病例的研究。\n\n**结果：** 在检索到的 648 条记录中，本次审查纳入了 10 条记录。对病例进行了全面的概述，并介绍了它们的临床和遗传特征。\n\n**结论：** 尽管 FGFR1 变异与卡尔曼综合征和孤立性低促性腺激素性性腺功能减退症以及最近的 CPHD 相关，但据我们所知，患者的表型包括以前未描述过的表型改变，属于这些实体的非生殖特征范围。孤立的 GH 缺乏合并其他不常见的异常很可能导致随后的 CPHD 表现。", "keywords_zh": "CPHD、FGFR1、GHD、垂体功能减退症、评论", "keywords_en": "CPHD, FGFR1, GHD, Hypopituitarism, Review", "link": "https://pubmed.ncbi.nlm.nih.gov/40434549/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 28 May 2025"}, {"id": "40413456", "title_en": "MicroRNAs involved in colorectal cancer, a rapid mini-systematic review", "title_zh": "与结直肠癌有关的 MicroRNA，快速小型系统评价", "authors": "Mahdi Barazesh", "abstract_en": "**Introduction:** Colorectal cancer (CRC) involves the uncontrolled proliferation of glandular epithelial cells in the colon or rectum. The high mortality rate associated with CRC has driven extensive research into innovative diagnostic and therapeutic strategies. Among these, microRNAs (miRNA) have gained attention for their crucial role in regulating various cellular processes that contribute to the initiation, progression, and metastasis of CRC.\n\n**Method:** This systematic review aimed to assess the roles of various miRNAs in CRC by analyzing multiple studies. The PICO framework was followed to structure the study regarding miRNA involved in CRC development and progression compared to normal cases. The outcomes were measured according miRNAs impact on CRC progression, survival rates, and treatment response. Systematic review of studies published from 2000 to November 2023 were included. Data were collected from prominent databases, including Google Scholar, PubMed, ScienceDirect, Irandoc, SID, and Magiran, covering studies from 2000 to November 2023. Studies were managed using EndNote for citation management, and duplicates were removed. The remaining studies were evaluated based on predefined inclusion and exclusion criteria.\n\n**Results:** In our review, we categorized 28 miRNAs based on their potential tumor suppressor or oncogenic effects in CRC progression. Among them, 14 miRNAs were highlighted as important based on the assessment using TCGA data, with miR-200a also showing a significant effect on patient survival.\n\n**Conclusion:** This study compiled and analyzed validated miRNAs associated with CRC progression. The findings suggest the potential of these miRNAs as non-invasive biomarkers, which may be used alone or in combination with traditional tumor markers for improved diagnostic and prognostic applications in CRC. This review contributes novel insights by updating the current understanding and offering a comprehensive evaluation of miRNAs in CRC.", "abstract_zh": "**介绍：** 结直肠癌 (CRC) 涉及结肠或直肠中腺上皮细胞不受控制的增殖。结直肠癌相关的高死亡率推动了对创新诊断和治疗策略的广泛研究。其中，microRNA (miRNA) 因其在调节各种细胞过程中的关键作用而受到关注，这些细胞过程有助于 CRC 的起始、进展和转移。\n\n**Method：** 本系统综述旨在通过分析多项研究来评估各种 miRNA 在 CRC 中的作用。遵循 PICO 框架来构建与正常病例相比参与 CRC 发生和进展的 miRNA 的研究。结果是根据 miRNA 对 CRC 进展、生存率和治疗反应的影响来衡量的。对 2000 年至 2023 年 11 月发表的研究进行了系统回顾。数据收集自著名数据库，包括 Google Scholar、PubMed、ScienceDirect、Irandoc、SID 和 Magiran，涵盖 2000 年至 2023 年 11 月的研究。研究使用 EndNote 进行引文管理，并删除重复项。其余研究根据预先确定的纳入和排除标准进行评估。\n\n**结果：** 在我们的综述中，我们根据 28 种 miRNA 在 CRC 进展中的潜在抑癌或致癌作用对它们进行了分类。其中，根据 TCGA 数据的评估，14 个 miRNA 被强调为重要，其中 miR-200a 也显示出对患者生存的显着影响。\n\n**结论：** 本研究编译并分析了与 CRC 进展相关的经过验证的 miRNA。这些发现表明这些 miRNA 作为非侵入性生物标志物的潜力，可以单独使用或与传统肿瘤标志物结合使用，以改善 CRC 的诊断和预后应用。这篇综述通过更新当前的理解并对 CRC 中的 miRNA 进行全面评估，提供了新颖的见解。", "keywords_zh": "生物标志物、结直肠癌、MicroRNA", "keywords_en": "Biomarker, Colorectal cancer, MicroRNAs", "link": "https://pubmed.ncbi.nlm.nih.gov/40413456/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk
