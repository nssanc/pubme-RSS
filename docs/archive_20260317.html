6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 24 May 2025"}, {"id": "40410673", "title_en": "The efficacy of retrograde and antegrade enemas in the management of low anterior resection syndrome in patients undergoing rectal resection: a systematic review and meta-analysis", "title_zh": "逆行和顺行灌肠治疗直肠切除术患者低位前切除综合征的疗效：系统评价和荟萃分析", "authors": "Hui Yang", "abstract_en": "**Background:** Rectal resection could potentially cause low anterior resection syndrome (LARS). Although recent studies have reported the efficacy of enema against LARS, no systematic review and meta-analysis has been conducted.\n\n**Methods:** A systematic search was conducted in PubMed, EMBASE, MEDLINE, CINAHL Complete, Cochrane library and Web of Science. Eligible studies that quantified the effect of enema vs. other approaches on LARS following rectal resection were selected. Meta-analysis was conducted by using RevMan 5.4 software and StataMP 17. Where meta-analysis was not possible, vote counting was performed.\n\n**Results:** This study comprised five RCTs with 159 participants and meta-analysis was performed in 4 studies. Compared with the control group, enema reduced LARS score with mean differences of -10.84 (95% CI: -16.71 to -4.98, P = 0.0003). Subgroup analysis based on the type of enema were performed, with three European studies using retrograde enema and one Asian study using antegrade enema, with mean differences of -13.77 (95% CI: -17.97 to -9.57, P < 0.00001) and -4.86 (95% CI: -9.26 to -0.46, P = 0.03), respectively. According to follow-up period, two trials reported short-term effects and the other two investigated medium/long-term effects with mean differences of -14.22 (95% CI: -20.05 to -8.38, P = 0.23) and -7.59 (95% CI: -14.47 to -0.71, P = 0.13), respectively. One study that used antegrade enema was key contributor to the substantial interstudy heterogeneity by the leave-one-out sensitivity analysis. After exclusion of this study, no heterogeneity was found (t<sup>2</sup> = 0.00; χ<sup>2</sup> = 1.63, df = 2, p = 0.44; I<sup>2</sup> = 0%). Vote counting also showed positive effects of enema on LARS.\n\n**Conclusions:** Enema, particularly retrograde enema, is effective in managing LARS. However, the effectiveness of antegrade enema deserves further investigation. The short-term effects of enema are more pronounced compared to long-term outcomes. Due to the limited number of included studies, these findings should be taken cautiously. More RCTs on other continents are needed to validate the impact of enema on LARS, as well as to develop standardised protocols to facilitate clinical practice.\n\n**Prospero Registration:** CRD42024539973.", "abstract_zh": "**背景：** 直肠切除术可能会导致低位前切除综合征（LARS）。尽管最近的研究报告了灌肠对 LARS 的功效，但尚未进行系统评价和荟萃分析。\n\n**方法：** 在 PubMed、EMBASE、MEDLINE、CINAHL Complete、Cochrane 图书馆和 Web of Science 中进行了系统检索。选择了量化灌肠与其他方法对直肠切除术后 LARS 效果的合格研究。使用 RevMan 5.4 软件和 StataMP 17 进行荟萃分析。在无法进行荟萃分析的情况下，进行计票。\n\n**结果：** 这项研究包括 5 项随机对照试验，共有 159 名参与者，并对 4 项研究进行了荟萃分析。与对照组相比，灌肠降低LARS评分，平均差异为-10.84（95% CI：-16.71至-4.98，P = 0.0003）。根据灌肠类型进行亚组分析，其中三项欧洲研究使用逆行灌肠，一项亚洲研究使用顺行灌肠，平均差异为-13.77（95％CI：-17.97至-9.57，P < 0.00001）和-4.86（95％CI：-9.26至-0.46，P = 0.03），分别。根据随访时间，两项试验报告了短期效应，另外两项研究了中/长期效应，平均差异分别为-14.22（95% CI：-20.05至-8.38，P = 0.23）和-7.59（95% CI：-14.47至-0.71，P = 0.13）。一项使用顺行灌肠的研究是留一敏感性分析导致研究间显着异质性的关键因素。排除本研究后，未发现异质性（t<sup>2</sup> = 0.00；χ<sup>2</sup> = 1.63，df = 2，p = 0.44；I<sup>2</sup> = 0%）。计票也显示灌肠对 LARS 具有积极作用。\n\n**结论：** 灌肠，特别是逆行灌肠，对于治疗 LARS 是有效的。然而，顺行灌肠的有效性值得进一步研究。与长期结果相比，灌肠的短期效果更为明显。由于纳入的研究数量有限，这些研究结果应谨慎对待。需要在其他大陆进行更多随机对照试验来验证灌肠对 LARS 的影响，并制定标准化方案以促进临床实践。\n\n**Prospero registration：** CRD42024539973。", "keywords_zh": "灌肠，低位前切除综合征，荟萃分析，直肠切除术", "keywords_en": "Enema, Low anterior resection syndrome, Meta-analysis, Rectal resection", "link": "https://pubmed.ncbi.nlm.nih.gov/40410673/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 23 May 2025"}, {"id": "40407946", "title_en": "Simultaneous robotic-assisted prostatectomy and rectal resection: a systematic review", "title_zh": "机器人辅助前列腺切除术和直肠切除术同时进行：系统评价", "authors": "Matthew J Roberts", "abstract_en": "Prostate cancer (PC) and rectal cancer (RC) are common and can require complex management, especially when presenting synchronously or with invasive characteristics. Robotic surgery has emerged as a viable option for managing these challenging cases; however, the outcomes are yet to be summarised or compared to traditional approaches. This systematic review aims to evaluate the feasibility, oncological outcomes, and functional results of simultaneous robotic-assisted resections of the prostate and rectum. Following prior protocol registration (PROSPERO: CRD42023449872) and according to the Preferred Reporting Items for Systematic Reviews and Meta-analysis (PRISMA) guidelines, we conducted a systematic search across multiple databases, selecting studies that involved simultaneous bladder-sparing robotic-assisted prostatectomy and rectal resection. The Joanna Briggs Institute tool was used for risk of bias assessment. Data on patient demographics, treatment details, post-operative course, and functional and oncological outcomes were extracted and analysed. From 1357 identified records, 25 studies met our inclusion criteria resulting in 45 cases/patients. The median patient age was 62 years. Diverse treatment backgrounds and outcome definitions were recorded. Median operative time was 548 min and median estimated blood loss was 450 mL. The overall complication rate was 44.4%, with major complications (Clavien-Dindo III) occurring in 17.8% of cases. Surgical margins were negative in 92.6% of cases. Continence recovery occurred for most (78.6%) of the cases reporting on urinary function. Simultaneous robotic-assisted prostatectomy and rectal resection appears to be a feasible, safe and oncologically effective approach with satisfactory oncological and functional outcomes for managing patients with synchronous or invasive PC and RC.", "abstract_zh": "前列腺癌 (PC) 和直肠癌 (RC) 很常见，可能需要复杂的治疗，特别是在同时出现或具有侵袭性特征时。机器人手术已成为处理这些具有挑战性的病例的可行选择；然而，结果尚未总结或与传统方法进行比较。本系统综述旨在评估机器人辅助同步前列腺和直肠切除术的可行性、肿瘤学结果和功能结果。在先前的方案注册（PROSPERO：CRD42023449872）之后并根据系统评价和荟萃分析的首选报告项目（PRISMA）指南，我们在多个数据库中进行了系统搜索，选择涉及同时保留膀胱的机器人辅助前列腺切除术和直肠切除术的研究。乔安娜·布里格斯研究所工具用于评估偏差风险。提取并分析了患者人口统计、治疗细节、术后病程以及功能和肿瘤结果的数据。从 1357 份已确定的记录中，有 25 项研究符合我们的纳入标准，共 45 例/患者。患者年龄中位数为 62 岁。记录了不同的治疗背景和结果定义。中位手术时间为 548 分钟，中位估计失血量为 450 mL。总体并发症发生率为44.4%，其中主要并发症（Clavien-Dindo III）发生率为17.8%。 92.6% 的病例手术切缘呈阴性。大多数（78.6%）报告泌尿功能的病例均恢复了失禁。同步机器人辅助前列腺切除术和直肠切除术似乎是一种可行、安全且肿瘤学有效的方法，对于治疗同步或侵入性 PC 和 RC 患者具有令人满意的肿瘤学和功能结果。", "keywords_zh": "腹会阴切除术（APR）、前切除术（AR）、前列腺癌、前列腺切除术、直肠癌、机器人手术", "keywords_en": "Abdominoperineal resection (APR), Anterior resection (AR), Prostate cancer, Prostatectomy, Rectal cancer, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40407946/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 23 May 2025"}, {"id": "40371426", "title_en": "Prostate biopsy in patients without rectal access: a systematic review and proportional meta-analysis", "title_zh": "无直肠入路患者的前列腺活检：系统评价和比例荟萃分析", "authors": "Dionysios Mitropoulos", "abstract_en": "**Introduction:** Historically, the anal canal plays a substantial role in both screening and diagnosis of pro-state cancer with digital rectal examination (DRE) and transrectal ultrasound (TRUS) guided biopsy, respectively. However, in patients with a prior history of abdominoperineal resection the transrectal route towards the prostate capsule cannot be utilized and thus alternative approaches have to be employed. The aim of this systematic review and proportional meta-analysis is to evaluate the available alternative prostate biopsy techniques in patients without rectal access.\n\n**Material And Methods:** The systematic literature review was performed using MEDLINE, Scopus, EMBASE, and the CENTRAL register for randomized controlled trials (RCTs). The following search algorithm was used: \"resection of rectum\" OR \"abdominoperineal resection\" OR \"without rectal access\" AND \"prostate biopsy\" (PROSPERO 2023 CRD42023459080).\n\n**Results:** A total of 21 studies and 203 patients were included in this systematic review and meta-analysis, while 6 different prostate biopsy techniques were detected in the current literature. The transperineal approach under transperineal US (TPUS) and the transgluteal approach guided by computed tomography (CT) were associated with 0.74 [0.48; 0.94] and 0.70 [0.49; 0.89] pooled diagnostic yield estimates as well as 0.01 [0.00; 0.01] and 0 [0.00; 0.01] pooled complication rate estimates. The performance of multiparametric magnetic resonance imaging (mpMRI) prior to transgluteal CT-guided prostate biopsy seemed to significantly affect the biopsy result (p = 0.0002).\n\n**Conclusions:** Based on current data, the TPUS-guided prostate biopsy has the highest pooled diagnostic yield estimate. However, this conclusion is based on poor evidence and more reliable and well-organized studies are needed to thoroughly explore this problem.", "abstract_zh": "**介绍：** 从历史上看，肛管分别在直肠指检（DRE）和经直肠超声（TRUS）引导活检的前列腺癌筛查和诊断中发挥着重要作用。然而，对于既往有腹会阴切除史的患者，无法利用经直肠途径到达前列腺囊，因此必须采用替代方法。本系统评价和比例荟萃分析的目的是评估对于没有直肠通路的患者可用的替代前列腺活检技术。\n\n**Material and methods：** 使用 MEDLINE、Scopus、EMBASE 和 CENTRAL 注册库进行系统文献综述以进行随机对照试验 (RCT)。使用以下搜索算法：“直肠切除术”或“腹会阴切除术”或“无直肠通路”和“前列腺活检”(PROSPERO 2023 CRD42023459080)。\n\n**结果：** 本次系统评价和荟萃分析共纳入 21 项研究和 203 名患者，同时在当前文献中检测到 6 种不同的前列腺活检技术。经会阴超声 (TPUS) 下的经会阴入路和计算机断层扫描 (CT) 引导下的经臀入路与 0.74 [0.48；0.74] 相关。 0.94]和0.70[0.49； 0.89] 汇总诊断产量估计值以及 0.01 [0.00；0.00； 0.01] 和 0 [0.00； 0.01]合并并发症发生率估计值。经臀 CT 引导的前列腺活检之前的多参数磁共振成像 (mpMRI) 的表现似乎显着影响活检结果 (p = 0.0002)。\n\n**结论：** 根据当前数据，TPUS 引导的前列腺活检具有最高的汇总诊断率估计。然而，这一结论的证据不足，需要更可靠和组织良好的研究来彻底探讨这个问题。", "keywords_zh": "活检, 前列腺, 前列腺癌, 经会阴, 超声波", "keywords_en": "biopsy, prostate, prostate cancer, transperineal, ultrasound", "link": "https://pubmed.ncbi.nlm.nih.gov/40371426/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 15 May 2025"}, {"id": "40347378", "title_en": "Effects of low anterior resection syndrome after colorectal cancer resections on health-related quality of life: a systematic review and meta-analysis", "title_zh": "结直肠癌切除术后低位前切除综合征对健康相关生活质量的影响：系统评价和荟萃分析", "authors": "S V Hosseini", "abstract_en": "**Background:** Low anterior resection syndrome (LARS) is a term that encompasses multidimensional bowel dysfunction that typically occurs following resections of rectum and distal parts of the colon. We aimed to systematically assess the available literature on the effects of bowel dysfunction after colorectal cancer (CRC) surgeries on health-related quality of life (HRQOL) and conduct a meta-analysis.\n\n**Methods:** Studies were included if they assessed patients who had undergone sphincter-preservation surgeries for CRC. Studies were eligible if they assessed bowel dysfunction using the LARS score and HRQOL using the European Organization for Research and Treatment Core Quality-of-Life Questionnaire (EORTC QLQ-C30).\n\n**Results:** Of 1410 reports, 28 studies were included. According to the analyses, patients with major LARS had lower global health status [weighted mean differences (WMD) = - 10.98; 95% confidence interval (CI) - 13.18, - 8.79], physical functioning (WMD = - 5.96; 95% CI - 7.40, - 4.52), role functioning (WMD = - 10.59; 95% CI - 12.54, - 8.63), emotional functioning (WMD = - 11.09; 95% CI - 14.34, 7.84), cognitive functioning (WMD = - 9.27; 95% CI - 12.22, - 6.32), and social functioning (WMD = - 15.73; 95% CI - 18.82, - 12.63) and higher scores of symptoms compared to patients with minor/no LARS.\n\n**Conclusions:** The study findings suggest that patients with major LARS experience worse HRQOL compared to those with minor/no LARS.\n\n**Registration:** PROSPERO, CRD42023479657.", "abstract_zh": "**背景：** 低位前切除综合征（LARS）是一个涵盖多维肠功能障碍的术语，通常发生在直肠和结肠远端切除术后。我们的目的是系统评估关于结直肠癌（CRC）手术后肠功能障碍对健康相关生活质量（HRQOL）影响的现有文献，并进行荟萃分析。\n\n**方法：** 如果他们评估因结直肠癌接受括约肌保留手术的患者，则纳入研究。如果研究使用 LARS 评分和 HRQOL 使用欧洲研究和治疗组织核心生活质量问卷 (EORTC QLQ-C30) 评估肠道功能障碍，则研究合格。\n\n**结果：** 1410 份报告中纳入了 28 项研究。根据分析，重度 LARS 患者的整体健康状况较低[加权平均差 (WMD) = - 10.98； 95% 置信区间 (CI) - 13.18, - 8.79]、身体功能 (WMD = - 5.96; 95% CI - 7.40, - 4.52)、角色功能 (WMD = - 10.59; 95% CI - 12.54, - 8.63)、情绪功能(WMD = - 11.09; 95% CI - 14.34, 7.84)、认知功能 (WMD = - 9.27; 95% CI - 12.22, - 6.32) 和社交功能 (WMD = - 15.73; 95% CI - 18.82, - 12.63），与轻微/无 LARS 的患者相比，症状得分更高。\n\n**结论：** 研究结果表明，与患有轻微/无 LARS 的患者相比，患有严重 LARS 的患者的 HRQOL 较差。\n\n**Registration：** 普洛斯彼罗，CRD42023479657。", "keywords_zh": "结直肠肿瘤, 低位前切除综合征, 荟萃分析, 生活质量, 系统评价", "keywords_en": "Colorectal neoplasms, Low anterior resection syndrome, Meta-analysis, Quality of life, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40347378/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 10 May 2025"}, {"id": "40330445", "title_en": "Perirectal spacers in radiotherapy for prostate cancer - a systematic review and meta-analysis", "title_zh": "直肠周围间隔物在前列腺癌放射治疗中的应用——系统评价和荟萃分析", "authors": "Shahrokh F Shariat", "abstract_en": "**Introduction:** Perirectal spacers reduce the radiotherapy (RT) dose delivered to the rectum, but their impact on treatment toxicity remains debated. We conducted a systematic review and meta-analysis to synthesise emerging data (PROSPERO: CRD42024506380).\n\n**Material And Methods:** MEDLINE, Embase, Scopus, and Google Scholar were searched through 2024/08/18 for prospective randomised (RCT) and non-randomised trials evaluating the clinical outcomes of perirectal spacing in prostate cancer (PCa) patients. Random effects generalised linear mixed models were used to pool odds ratios (OR) for rectal adverse events (AEs) from RCTs. Non-randomised trials were summarised qualitatively. The risk of bias was assessed using the RoB2 and ROBINS-I tools.\n\n**Results:** Three RCTs (<i>n</i> = 645) were identified. The rates of grade ≥ 2 (G ≥ 2) rectal AEs in control groups were low, ranging 4.2-13.8% for early AEs and 0-1.4% for late AEs. Perirectal spacers were associated with decreased incidence of early G ≥ 2 rectal AEs (OR: 0.43; 95% CI: 0.19-0.96), but not of late G ≥ 2 rectal AEs (OR: 0.26; 95% CI: 0.02-2.91). Assuming a comparator risk of 7.1% and 1%, this corresponded to a number needed to treat of 26 patients to avoid one early AE, and 135 pa- tients to avoid one late G ≥ 2 AE, respectively. Randomised clinical trial were at moderate risk of bias due to concerns regarding the concealment of allocation.\n\n**Conclusions:** There is evidence that perirectal spacers result in a small decrease in acute rectal toxicity. However, modern RT for clinically localised PCa is generally well-tolerated, and severe AEs are rare. Greater scrutiny of the risks and benefits associated with perirectal spacers is necessary.", "abstract_zh": "**介绍：** 直肠周围间隔器可减少直肠的放射治疗 (RT) 剂量，但其对治疗毒性的影响仍存在争议。我们进行了系统回顾和荟萃分析来综合新兴数据（PROSPERO：CRD42024506380）。\n\n**Material and methods：** 截至 2024 年 8 月 18 日，MEDLINE、Embase、Scopus 和 Google Scholar 均搜索了评估前列腺癌 (PCa) 患者直肠周围间隔临床结果的前瞻性随机 (RCT) 和非随机试验。使用随机效应广义线性混合模型来汇总随机对照试验中直肠不良事件 (AE) 的比值比 (OR)。对非随机试验进行了定性总结。使用 RoB2 和 ROBINS-I 工具评估偏倚风险。\n\n**结果：** 确定了三项随机对照试验 (<i>n</i> = 645)。对照组中 ≥ 2 级 (G ≥ 2) 直肠 AE 发生率较低，早期 AE 为 4.2-13.8%，晚期 AE 为 0-1.4%。直肠周围间隔物与早期 G ≥ 2 直肠 AE 发生率降低相关（OR：0.43；95% CI：0.19-0.96），但与晚期 G ≥ 2 直肠 AE 发生率降低无关（OR：0.26；95% CI：0.02-2.91）。假设比较风险为 7.1% 和 1%，这分别相当于需要治疗 26 名患者以避免一种早期 AE 和 135 名患者以避免一种晚期 G ≥ 2 AE。由于担心分配的隐藏，随机临床试验存在中等偏倚风险。\n\n**结论：** 有证据表明，直肠周围垫片可使急性直肠毒性小幅降低。然而，现代放疗治疗临床局限性前列腺癌通常耐受性良好，严重的 AE 很少见。有必要对直肠周围间隔物相关的风险和益处进行更严格的审查。", "keywords_zh": "Barrigel、ProSpace、SpaceOAR、急性毒性、慢性毒性、胃肠道毒性", "keywords_en": "Barrigel, ProSpace, SpaceOAR, acute toxicity, chronic toxicity, gastrointestinal toxicity", "link": "https://pubmed.ncbi.nlm.nih.gov/40330445/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 07 May 2025"}, {"id": "40327435", "title_en": "Research Perspective on \"Social Determinants of Health in Diverticulitis: A Systematic Review\"", "title_zh": "“憩室炎健康的社会决定因素：系统回顾”的研究视角", "authors": "Ira L Leeds", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40327435/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 06 May 2025"}, {"id": "40269754", "title_en": "Risk factors for unplanned 31-day readmission after surgery for colorectal cancer patients: a meta-analysis", "title_zh": "结直肠癌患者术后 31 天非计划再入院的危险因素：一项荟萃分析", "authors": "Liping Cui", "abstract_en": "**Background:** The high incidence of unplanned readmissions within 31 days after colorectal cancer surgery remains a significant challenge. However, the identified risk factors for these readmissions are inconsistent across the literature. This study aims to perform a comprehensive meta-analysis to estimate the incidence of unplanned readmissions and systematically identify the factors associated with this risk, providing robust evidence for targeted interventions to reduce readmission rates.\n\n**Methods:** This study was conducted in accordance with the PRISMA guidelines. All study steps, including study selection, data extraction, and quality assessment, were independently performed by two authors, with any disagreements resolved through consultation with a third author. A comprehensive search for published studies was conducted across the following databases up to January 2025: VIP Journal Database, Wanfang Data, CNKI, SinoMed, PubMed, Embase, Web of Science, and the Cochrane Library. Statistical analyses were performed using RevMan 5.4 and Stata 17.0, with a p-value of less than 0.05 considered statistically significant.\n\n**Results:** This meta-analysis identified several significant risk factors associated with unplanned readmission during this period (P < 0.05), including age (OR = 1.13), postoperative complications (OR = 1.87), tumor stage (TNM ≥ III) (OR = 2.01), tumor site in the rectum (OR = 1.64), stoma creation (OR = 1.70), Complicated diabetes (OR = 1.56), Charlson Comorbidity Index (CCI) (OR = 1.27), blood transfusion (BT) (OR = 1.24), Length of hospital stay (LOS) (OR = 1.65), and surgical approach (OR = 1.22). Notably, female (OR = 0.85) was identified as a protective factor against unplanned readmission.\n\n**Conclusion:** The unplanned readmission rate within 31 days after colorectal cancer surgery was 11.73%. Current evidence suggests that age, postoperative complications, TNM ≥ III, tumor site in the rectum, stoma creation, complicated diabetes, Charlson Comorbidity Index (CCI), blood transfusion (BT), length of hospital stay (LOS), and surgical approach are significant risk factors for unplanned readmission. Conversely, female has been identified as a protective factor. To mitigate these risks and reduce readmission rates, healthcare professionals should implement targeted educational and clinical interventions.", "abstract_zh": "**背景：** 结直肠癌手术后 31 天内意外再入院的高发生率仍然是一个重大挑战。然而，文献中确定的这些再入院的风险因素并不一致。本研究旨在进行全面的荟萃分析，以估计非计划再入院的发生率，并系统地识别与该风险相关的因素，为降低再入院率的针对性干预措施提供有力的证据。\n\n**方法：** 本研究是根据 PRISMA 指南进行的。所有研究步骤，包括研究选择、数据提取和质量评估，均由两位作者独立执行，任何分歧均通过与第三位作者协商解决。对截至 2025 年 1 月的以下数据库中已发表的研究进行了全面检索：VIP 期刊数据库、万方数据、CNKI、SinoMed、PubMed、Embase、Web of Science 和 Cochrane 图书馆。使用 RevMan 5.4 和 Stata 17.0 进行统计分析，p 值小于 0.05 被认为具有统计显着性。\n\n**结果：** 这项荟萃分析确定了在此期间与非计划再入院相关的几个重要危险因素（P < 0.05），包括年龄（OR = 1.13）、术后并发症（OR = 1.87）、肿瘤分期（TNM ≥ III）（OR = 2.01）、直肠肿瘤部位(OR = 1.64)、造口术 (OR = 1.70)、复杂性糖尿病 (OR = 1.56)、查尔森合并症指数 (CCI) (OR = 1.27)、输血 (BT) (OR = 1.24)、住院时间 (LOS) （OR = 1.65）和手术方法（OR = 1.22）。值得注意的是，女性（OR = 0.85）被认为是防止意外再入院的保护因素。\n\n**结论：** 结直肠癌术后31天内非计划再入院率为11.73%。目前的证据表明，年龄、术后并发症、TNM ≥ III、直肠肿瘤部位、造口创建、并发糖尿病、查尔森合并症指数（CCI）、输血（BT）、住院时间（LOS）和手术方式是非计划再入院的重要危险因素。相反，女性被认为是一个保护因素。为了减轻这些风险并降低再入院率，医疗保健专业人员应实施有针对性的教育和临床干预措施。", "keywords_zh": "结直肠癌、荟萃分析、危险因素、非计划再入院", "keywords_en": "Colorectal cancer, Meta-analysis, Risk factors, Unplanned readmission", "link": "https://pubmed.ncbi.nlm.nih.gov/40269754/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 24 Apr 2025"}, {"id": "40260850", "title_en": "Delivery of intravenous anti-cancer therapy at home versus in hospital or community settings for adults with cancer", "title_zh": "在家中与在医院或社区环境中为成人癌症患者提供静脉抗癌治疗", "authors": "Rachelle Buchbinder", "abstract_en": "**Background:** Intravenous (IV) chemotherapy and immunotherapy are administered at frequent, regular intervals (weekly to four-weekly) for 4 to 24 months, with treatment sessions lasting between 20 minutes and several hours for adults with cancer. These treatments are usually given in chemotherapy day units in hospitals as same-day treatments. However, less complex anti-cancer therapy regimens may be administered in the participant's home.\n\n**Objectives:** To assess the safety, patient preference for, and cost of IV (including subcutaneous) anti-cancer therapy (chemotherapy or immunotherapy) delivered at home as an alternative to the same IV anti-cancer therapy regimen delivered in a hospital or community setting in adults with cancer.\n\n**Search Methods:** We searched CENTRAL, Cochrane Database of Systematic Reviews, MEDLINE, Embase, CINAHL, NHS Economic Evaluation Database, Cost-Effectiveness Analysis Registry and trial registries (ClinicalTrials.gov and WHO-ICTRP) from inception until 16 October 2024. We also searched PDQ Evidence and Epistemonikos for related systematic reviews. We screened reference lists of included studies and relevant systematic reviews.\n\n**Selection Criteria:** We included randomised parallel and cross-over trials, conducted in adults (aged 18 years and over) diagnosed with any type and stage of cancer requiring IV anti-cancer chemotherapy or immunotherapy. Eligible studies compared delivery of IV anti-cancer therapy at home with delivery of the same therapy in a hospital setting (as an inpatient or outpatient), or in the community setting (e.g. GP practice, community clinic). We included economic evaluation studies (i.e. cost-effectiveness analyses, cost-utility analyses, cost-benefit analyses) conducted alongside eligible effectiveness studies. Primary outcomes were adverse events, hospital inpatient admission and additional hospital attendance (e.g. emergency department visit) within 48 hours of administration of anti-cancer therapy, IV line complications, participant preference, and cost of delivering IV anti-cancer therapy from a healthcare system perspective.\n\n**Data Collection And Analysis:** Two review authors selected studies for inclusion, extracted trial characteristics and numerical data, assessed risk of bias, and judged the certainty of evidence using the GRADE approach. The main comparison was delivery of IV anti-cancer therapy at home versus in a hospital outpatient clinic. The primary time points of interest for outcomes related to serious adverse events, complications and cost were those collected at the longest follow-up postintervention. For outcomes such as participant preference, participant quality of life, participant and caregiver satisfaction, and non-adherence to the treatment regimen, data collected at time points as soon as possible after the intervention were of primary interest.\n\n**Main Results:** We identified seven eligible trials (three parallel RCTs, four randomised cross-over trials; 401 randomised participants, with 272 participants included in the final analyses) and five ongoing trials. Five included trials were performed prior to the 2000s and two were performed between 2007 and 2011. Trial participants' mean age ranged from 60 to 70 years. Four trials recruited a mix of cancer patients, including breast, colon, rectum, pancreatic, pancreaticobiliary, non-Hodgkin's lymphoma, lung, and head and neck cancer. Three trials focused on specific cancers (i.e. colorectal cancer, breast cancer, colon cancer). Seven trials compared delivery of IV anti-cancer therapy at home versus in a hospital outpatient clinic. One trial compared delivery of IV anti-cancer therapy in the participant's home, in the hospital outpatient clinic, and in local general practice surgery. All participants were assessed either by a physician or trained chemotherapy nurse prior to receiving each treatment cycle, and trained chemotherapy nurses administered the therapy, as per standard clinical practice, in all settings in all trials. We judged three trials as having low overall risk of bias. In four trials, the overall risk of bias was unclear due to poorly reported study methods, failing to report assessed data points and inaccessible study protocols. Due to the very low certainty of the evidence, we are uncertain of the effect of delivering IV anti-cancer therapy at home versus in the hospital outpatient clinic on the response to and management of adverse events, on both hospital inpatient admission and additional hospital attendance within 48 hours of administration of anti-cancer therapy, and on IV line complications (including infection and thrombosis). Based on low-certainty evidence, participants receiving therapy at home may be more likely to prefer future treatments at home, after receiving treatment in this setting (35 more per 100, 10 to 70 more; data from 1 RCT with 65 participants). Based on low-certainty evidence, delivering IV anti-cancer therapy at home may make little or no difference to the cost of the treatment from the healthcare system perspective in comparison to delivering it in the hospital outpatient clinic (mean cost (in 2022 Australian dollars (AUD)) per treatment at home: 126 AUD less; 1798 AUD less to 1546 AUD more; data from 2 RCTs with 80 participants). We are uncertain of the effect of delivering IV anti-cancer therapy at home, versus a local GP surgery, on the response to and management of adverse events. No studies reported on hospital inpatient admission. Evidence on additional hospital attendance within 48 hours of administration of anti-cancer therapy is of very low certainty. Low-certainty evidence suggests that compared to receiving treatment in a local GP surgery, participants may or may not be more likely to prefer future treatments at home, and delivering anti-cancer therapy at home may make little or no difference to the cost of the treatment.\n\n**Authors' Conclusions:** Evidence on the safety and cost-effectiveness of IV anti-cancer therapy at home is scarce and outdated. IV anti-cancer regimens have evolved; the findings of studies performed more than a decade ago may lack applicability to current practice. However, key considerations when considering suitability for home treatment remain unchanged: safety, duration of treatment and geographic catchment area. The finding that patients may prefer future treatments at home after receiving treatment in this setting, albeit based upon low-certainty evidence, is consistent with the widespread current practice of delivering IV anti-cancer therapy, including immunotherapies, at home when judged safe and preferred by the patient. Appropriate selection of patients and regimens is a key consideration for ensuring the safety of delivering IV anti-cancer therapy at home.", "abstract_zh": "**背景：** 静脉 (IV) 化疗和免疫疗法以频繁、有规律的间隔（每周至每四周）进行，持续 4 至 24 个月，对于成人癌症患者，治疗持续 20 分钟至几个小时。这些治疗通常在医院的化疗日间单位作为当天治疗进行。然而，不太复杂的抗癌治疗方案可以在参与者的家中进行。\n\n**Objectives：** 评估在家中进行的静脉注射（包括皮下）抗癌治疗（化疗或免疫治疗）的安全性、患者偏好和费用，作为成人癌症患者在医院或社区环境中进行的相同静脉注射抗癌治疗方案的替代方案。\n\n**Search methods：** 我们检索了 CENTRAL、Cochrane 系统评价数据库、MEDLINE、Embase、CINAHL、NHS 经济评估数据库、成本效益分析注册中心和试验注册中心（ClinicalTrials.gov 和 WHO-ICTRP），从开始到 2024 年 10 月 16 日。我们还检索了 PDQ Evidence 和 Epistemonikos 以获取相关的系统评价。我们筛选了纳入研究的参考文献列表和相关的系统评价。\n\n**Selection criteria：** 我们纳入了随机平行和交叉试验，这些试验在诊断为任何类型和阶段的癌症且需要静脉注射抗癌化疗或免疫治疗的成人（18 岁及以上）中进行。符合条件的研究将在家中进行静脉注射抗癌治疗与在医院环境（住院患者或门诊患者）或社区环境（例如全科医生诊所、社区诊所）中进行相同的治疗进行了比较。我们纳入了与合格的有效性研究一起进行的经济评估研究（即成本效益分析、成本效用分析、成本效益分析）。主要结局是抗癌治疗后 48 小时内的不良事件、住院患者入院和额外就诊（例如急诊科就诊）、IV 线并发症、参与者偏好以及从医疗保健系统角度提供 IV 抗癌治疗的成本。\n\n**Data collection and analysis：** 两位综述作者选择纳入研究，提取试验特征和数值数据，评估偏倚风险，并使用 GRADE 方法判断证据的确定性。主要比较是在家中与在医院门诊诊所进行静脉注射抗癌治疗。与严重不良事件、并发症和费用相关的结果的主要关注时间点是在干预后最长的随访中收集的时间点。对于参与者偏好、参与者生活质量、参与者和护理人员满意度以及不遵守治疗方案等结果，干预后尽快在时间点收集的数据是主要关注点。\n\n**Main results：** 我们确定了 7 项符合条件的试验（3 项平行随机对照试验、4 项随机交叉试验；401 名随机受试者，其中 272 名受试者纳入最终分析）和 5 项正在进行的试验。其中五项试验是在 2000 年代之前进行的，两项试验是在 2007 年至 2011 年之间进行的。试验参与者的平均年龄为 60 岁至 70 岁。四项试验招募了多种癌症患者，包括乳腺癌、结肠癌、直肠癌、胰腺癌、胰胆癌、非霍奇金淋巴瘤、肺癌和头颈癌。三项试验侧重于特定癌症（即结直肠癌、乳腺癌、结肠癌）。七项试验比较了在家和医院门诊进行静脉注射抗癌治疗。一项试验比较了在参与者家中、医院门诊诊所和当地全科手术中进行静脉注射抗癌治疗的情况。在接受每个治疗周期之前，所有参与者均由医生或经过培训的化疗护士进行评估，并由经过培训的化疗护士按照标准临床实践在所有试验的所有环境中进行治疗。我们判断三项试验总体偏倚风险较低。在四项试验中，由于研究方法报告不充分、未能报告评估的数据点以及无法获取的研究方案，总体偏倚风险尚不清楚。由于证据的质量非常低，我们不确定在家进行静脉注射抗癌治疗与在医院门诊进行治疗相比，对不良事件的反应和管理、抗癌治疗后 48 小时内住院患者入院和额外就诊以及静脉注射并发症（包括感染和血栓形成）的影响。根据低确定性证据，在家接受治疗的参与者在这种环境下接受治疗后，可能更喜欢未来在家接受治疗（每 100 人中多出 35 人，多出 10 到 70 人；数据来自 1 项包含 65 名参与者的随机对照试验）。根据低确定性证据，从医疗保健系统的角度来看，与在医院门诊进行治疗相比，在家进行静脉注射抗癌治疗可能对治疗成本几乎没有影响或没有影响（在家每次治疗的平均成本（以 2022 年澳元 (AUD) 计算）：少 126 澳元；少 1798 澳元至多 1546 澳元；数据来自 80 名受试者的 2 项随机对照试验）。我们不确定在家进行静脉注射抗癌治疗与当地全科医生手术相比，对不良事件的反应和管理的影响。没有研究报告住院患者的入院情况。抗癌治疗后 48 小时内额外住院的证据的确定性非常低。低质量证据表明，与在当地全科医生手术中接受治疗相比，参与者可能会或可能不会更喜欢未来在家中的治疗，并且在家提供抗癌治疗可能对患者来说几乎没有影响或没有影响。\n\n**Authors' conclusions：** 关于家庭静脉注射抗癌治疗的安全性和成本效益的证据很少且已经过时。静脉注射抗癌疗法已经发展；十多年前进行的研究结果可能不适用于当前的实践。然而，在考虑是否适合家庭治疗时，关键考虑因素保持不变：安全性、治疗持续时间和地理覆盖区域。尽管基于低确定性证据，但患者在这种情况下接受治疗后可能更喜欢未来在家接受治疗的发现与当前广泛的在家中进行静脉注射抗癌治疗（包括免疫治疗）的做法是一致的，当患者认为安全且首选时，在家中进行静脉注射抗癌治疗（包括免疫治疗）。适当选择患者和方案是确保在家进行静脉抗癌治疗安全的关键考虑因素。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40260850/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 22 Apr 2025"}, {"id": "40246613", "title_en": "Carbon Ion Radiotherapy Reirradiation for Recurrent Malignancy: A Systematic Assessment", "title_zh": "碳离子放射治疗再照射治疗复发性恶性肿瘤：系统评估", "authors": "S Chen", "abstract_en": "Reirradiation presents a significant challenge despite recent advances in modern radiation therapy. Carbon ion radiotherapy has garnered increasing attention among radiation oncologists due to its potentially superior physical dosimetric distribution and radiobiological advantages. This systematic review comprehensively evaluated clinical outcomes from 27 original studies on the use of carbon ion reirradiation for locoregional recurrent malignancies, including those affecting the central nervous system, lung, head and neck, pancreas, liver, rectum, and gynecological sites. The findings suggest that carbon ion reirradiation for locoregional recurrent malignancies yields favorable clinical outcomes with a relatively low incidence of high-grade toxicities. For recurrent nasopharyngeal carcinoma, the reported 2-year overall survival, local control, regional control, and metastasis-free survival rates were 83.7%, 58.0%, 87.3%, and 94.7%, respectively. Grade ≥3 late nasopharyngeal necrosis occurred in 16% (33/206) of cases. In the case of recurrent glioblastoma, median overall survival and local control survival were reported at 13 and 7 months, respectively, with minimal high-grade complications; observed low-grade toxicities included acute involuntary movements, incomplete hemiparesis, and late-onset dysphasia. For recurrent lung cancer, 2-year local control and overall survival rates were reported as 54.0% and 61.9%, respectively. Grade ≥3 toxicities included two cases of radiation pneumonitis and one case of bronchopleural fistula. In recurrent pancreatic cancer, 1-year local control, progression-free survival, and overall survival rates were 53.5%, 24.5%, and 48.7%, respectively. A high-grade complication of Grade 3 acute duodenal stenosis was observed in one patient. Additionally, concurrent chemotherapy with carbon ion reirradiation was associated with minimal high-grade additive toxicities. Overall, carbon ion reirradiation appears to be a potentially safe and effective reirradiation modality for treating locoregional recurrent malignancies, though data remains limited.", "abstract_zh": "尽管现代放射治疗取得了最新进展，但再放射仍然是一个重大挑战。碳离子放射治疗由于其潜在的优越的物理剂量分布和放射生物学优势而越来越受到放射肿瘤学家的关注。本系统综述全面评估了 27 项关于使用碳离子再照射治疗局部复发性恶性肿瘤的原始研究的临床结果，包括影响中枢神经系统、肺、头颈、胰腺、肝脏、直肠和妇科部位的恶性肿瘤。研究结果表明，碳离子再照射治疗局部复发性恶性肿瘤可产生良好的临床结果，且高级别毒性的发生率相对较低。对于复发鼻咽癌，报告的2年总生存率、局部控制率、区域控制率和无转移生存率分别为83.7%、58.0%、87.3%和94.7%。 16%（33/206）的病例发生≥3级晚期鼻咽坏死。对于复发性胶质母细胞瘤，中位总生存期和局部对照生存期分别报告为 13 个月和 7 个月，且高度并发症极少；观察到的低度毒性包括急性不自主运动、不完全性偏瘫和迟发性语言障碍。对于复发性肺癌，2 年局部控制率和总生存率分别为 54.0% 和 61.9%。 ≥3级毒性包括2例放射性肺炎和1例支气管胸膜瘘。在复发性胰腺癌中，1 年局部控制率、无进展生存率和总生存率分别为 53.5%、24.5% 和 48.7%。在一名患者中观察到 3 级急性十二指肠狭窄的高级并发症。此外，同步化疗与碳离子再照射与最小的高级附加毒性相关。总体而言，碳离子再照射似乎是治疗局部复发性恶性肿瘤的一种潜在安全有效的再照射方式，尽管数据仍然有限。", "keywords_zh": "碳离子、临床结果、局部复发、恶性肿瘤、再照射、毒性", "keywords_en": "Carbon ion, Clinical outcomes, Locoregional recurrence, Malignancy, Reirradiation, Toxicities", "link": "https://pubmed.ncbi.nlm.nih.gov/40246613/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Apr 2025"}, {"id": "40246071", "title_en": "Implantable Rectal Spacers in Prostate Cancer Radiation Therapy: A Systematic Review", "title_zh": "前列腺癌放射治疗中植入式直肠间隔器：系统评价", "authors": "Ben G L Vanneste", "abstract_en": "**Purpose:** This systematic review provides an overview of the available literature regarding the efficacy and safety of implantable rectal spacers (IRSs) in reducing rectal dose and gastrointestinal toxicity during prostate cancer radiation therapy.\n\n**Methods And Materials:** A comprehensive literature search was conducted in December 2024. Results included prospective research in humans and were limited to the English language. The 30 included studies, all published between 2007 and 2024, were randomized controlled trials or clinical trials that focused on adverse events, rectal dose reduction, gastrointestinal toxicity, or bowel quality of life. Next, IRS implantation technique, safety, and spacing distance were assessed.\n\n**Results:** Randomized controlled trial data were available for hydrogel, hyaluronic acid, and rectal balloon implant spacers, whereas only one pilot study is available for human collagen. Prospective clinical research on IRS in brachytherapy is limited. One centimeter of spacing between the rectum and prostate sufficed to spare the rectum, the primary dose-limiting organ. Findings indicate a favorable safety profile, with an overall complication rate of 0,96% when using hydrogel spacers. There was no grade 4 to 5 gastrointestinal toxicity reported in clinical trials. The use of an IRS was associated with improved long-term bowel quality of life.\n\n**Conclusions:** The integration of IRS into clinical practice offers the potential to enhance the therapeutic landscape for patients with prostate cancer. However, its use should be guided by careful consideration of individual patient needs to determine those who benefit most from the IRS because not all patients may benefit equally.", "abstract_zh": "**Purpose：** 本系统综述概述了有关植入式直肠间隔器 (IRS) 在减少前列腺癌放射治疗期间直肠剂量和胃肠道毒性方面的功效和安全性的现有文献。\n\n**Methods and materials：** 2024 年 12 月进行了全面的文献检索。结果包括针对人类的前瞻性研究，且仅限于英语。这 30 项纳入研究均于 2007 年至 2024 年期间发表，均为随机对照试验或临床试验，重点关注不良事件、直肠剂量减少、胃肠道毒性或肠道生活质量。接下来，评估了 IRS 植入技术、安全性和间距。\n\n**结果：** 水凝胶、透明质酸和直肠球囊植入垫片有随机对照试验数据，而人类胶原蛋白只有一项初步研究。 IRS 在近距离放射治疗中的前瞻性临床研究有限。直肠和前列腺之间一厘米的间距足以保护直肠，即主要的剂量限制器官。研究结果表明，使用水凝胶垫片时的总体并发症率为 0.96%，具有良好的安全性。临床试验中未报告4至5级胃肠道毒性。 IRS 的使用与长期肠道生活质量的改善相关。\n\n**结论：** IRS 融入临床实践有可能改善前列腺癌患者的治疗前景。然而，其使用应仔细考虑个体患者的需求，以确定哪些人从 IRS 中受益最大，因为并非所有患者都可以平等受益。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40246071/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 17 Apr 2025"}, {"id": "40234278", "title_en": "Inflammatory myofibroblastic tumors of the colon in pediatrics: clinical presentation, management, and outcomes-A case report and systematic review of literature", "title_zh": "儿科结肠炎性肌纤维母细胞肿瘤：临床表现、治疗和结果——病例报告和文献系统回顾", "authors": "Essam Elhalaby", "abstract_en": "**Purpose:** Inflammatory myofibroblastic tumors (IMTs) of the colon represent an exceptionally rare entity in the pediatric population. This systematic review aims to comprehensively analyze the clinical presentation, diagnostic workup, management strategies, and outcomes of colorectal IMTs in children.\n\n**Methods:** A systematic literature review was conducted across multiple electronic databases (inception to January 2025), including MEDLINE (via PubMed), Embase, Cochrane, Web of Science, and Google Scholar. Two independent reviewers screened abstracts, reviewed studies, and extracted data on all reported cases of colorectal IMTs in the pediatric population, including one previously unreported case from our institution.\n\n**Results:** Including our case, 53 pediatric patients with colorectal IMTs were identified from 39 studies. The mean age at diagnosis was 7 years (range: 5 months-17 years) with a slight female preponderance. The IMTs comprised a wide range of anatomic locations with rectum (27%) and ascending colon (24%) being the most common. Abdominal pain (54%), gastrointestinal bleeding (29%), and fever (21%) were the predominant symptoms. Anemia was the most common laboratory abnormality (62%). Surgical resection was the primary treatment modality in 98% of cases. After a mean follow-up of 38 months ( range: 3-181 months), the local recurrence rate was 11%, with no distant metastases reported.\n\n**Conclusion:** Colorectal IMTs in children present diagnostic and therapeutic challenges. While complete surgical resection remains the gold standard treatment, emerging therapies such as ALK inhibitors and NSAIDs warrant further investigation. The potential for late recurrence mandates long term follow-up.", "abstract_zh": "**Purpose：** 结肠炎性肌纤维母细胞肿瘤 (IMT) 在儿科人群中是一种极其罕见的实体。本系统综述旨在全面分析儿童结直肠 IMT 的临床表现、诊断检查、管理策略和结果。\n\n**方法：** 对多个电子数据库（成立至 2025 年 1 月）进行了系统文献综述，包括 MEDLINE（通过 PubMed）、Embase、Cochrane、Web of Science 和 Google Scholar。两名独立评审员筛选了摘要、评审了研究并提取了儿科人群中所有报告的结直肠 IMT 病例的数据，其中包括我们机构以前未报告的一例病例。\n\n**结果：** 包括我们的病例在内，我们从 39 项研究中鉴定出 53 名患有结直肠 IMT 的儿童患者。诊断时的平均年龄为 7 岁（范围：5 个月至 17 岁），其中女性略多。 IMT 包括广泛的解剖位置，其中最常见的是直肠 (27%) 和升结肠 (24%)。腹痛（54%）、胃肠道出血（29%）和发烧（21%）是主要症状。贫血是最常见的实验室异常（62%）。手术切除是 98% 病例的主要治疗方式。平均随访38个月（范围：3-181个月）后，局部复发率为11%，无远处转移报道。\n\n**结论：** 儿童结直肠 IMT 提出了诊断和治疗挑战。虽然完全手术切除仍然是金标准治疗，但 ALK 抑制剂和 NSAID 等新兴疗法值得进一步研究。晚期复发的可能性需要长期随访。", "keywords_zh": "病例报告、结直肠、IMT、炎性肌纤维母细胞肿瘤、肿瘤、儿科", "keywords_en": "Case report, Colorectal, IMT, Inflammatory myofibroblastic tumor, Neoplasm, Pediatric", "link": "https://pubmed.ncbi.nlm.nih.gov/40234278/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 15 Apr 2025"}, {"id": "40229635", "title_en": "Microbiome landscapes of the bladder, intestine, and vagina in bladder cancer: a systematic review", "title_zh": "膀胱癌中膀胱、肠道和阴道的微生物组景观：系统评价", "authors": "Uwe Bieri", "abstract_en": "**Background:** Microbiomes have been linked to oncogenesis, e.g. the intestinal microbiome and colon cancer or HPV-associated cervical cancer. A connection between microbiomes of different body cavities and tumor oncogenesis was shown. The gut microbiome's influence on bladder cancer was established, raising the question whether nearby microbiomes (rectum, vagina) also influence bladder cancer due to their proximity.\n\n**Objective:** Considering the influence of various body cavities and the broader microbial components, this systematic review aims to investigate differences in the bladder, vaginal, and intestinal microbiota-including bacterial, viral, fungal and archaea-between patients with bladder cancer and healthy controls.\n\n**Methods:** Databases (PubMed, Scopus, Embase) were searched until April 2022. Three types of studies were included: \"(1) studies using bladder cancer and control groups (case-controlled studies) (2) studies that provided information on the presence or abundance of microbial taxa (3) studies that provided information on increased or decreased taxa in bladder cancer and/or control groups.\". Risk of bias was assessed using the Newcastle Ottawa Scale.\n\n**Results:** Fourteen studies (695 samples: 403 bladder cancer, 292 controls) were analyzed. Bacterial taxa that have been detected in at least two studies, the genera Geobacillus and Rubrobacter were more frequently in bladder cancer patients; while Streptococcus and Roseomonas were more prevalent in controls. No consistent taxa were identified across stool or bladder tissue samples.\n\n**Conclusion:** The microbiota in bladder cancer patients show significant variation across studies. Standardized methods and expanded investigations into viral and fungal components are needed to clarify the role of microbiota in bladder cancer.", "abstract_zh": "**背景：** 微生物组与肿瘤发生有关，例如肠道微生物群与结肠癌或 HPV 相关宫颈癌。显示了不同体腔的微生物组与肿瘤发生之间的联系。肠道微生物组对膀胱癌的影响已经确定，这就提出了一个问题：附近的微生物组（直肠、阴道）是否也会因为距离较近而影响膀胱癌。\n\n**目的：** 考虑到各种体腔和更广泛的微生物成分的影响，本系统综述旨在研究膀胱癌患者和健康对照者之间膀胱、阴道和肠道微生物群（包括细菌、病毒、真菌和古细菌）的差异。\n\n**方法：** 检索数据库（PubMed、Scopus、Embase）直至 2022 年 4 月。其中包括三种类型的研究：“(1) 使用膀胱癌和对照组的研究（病例对照研究）(2) 提供有关微生物类群存在或丰度的信息的研究 (3) 提供有关膀胱癌和/或对照组中类群增加或减少的信息的研究。”。使用纽卡斯尔渥太华量表评估偏倚风险。\n\n**结果：** 分析了 14 项研究（695 个样本：403 个膀胱癌，292 个对照）。至少在两项研究中检测到的细菌类群，土芽孢杆菌属和红杆菌属在膀胱癌患者中更为常见；而链球菌和玫瑰单胞菌在对照组中更为普遍。在粪便或膀胱组织样本中没有发现一致的分类单元。\n\n**结论：** 膀胱癌患者的微生物群在不同研究中显​​示出显着差异。需要标准化方法和对病毒和真菌成分的扩展研究来阐明微生物群在膀胱癌中的作用。", "keywords_zh": "细菌、膀胱癌、膀胱微生物群、真菌、肠道微生物群、微生物群、阴道微生物群、病毒", "keywords_en": "Bacteria, Bladder cancer, Bladder microbiota, Fungi, Intestinal microbiota, Microbiome, Vaginal microbiota, Viruses", "link": "https://pubmed.ncbi.nlm.nih.gov/40229635/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 14 Apr 2025"}, {"id": "40225020", "title_en": "Gastrointestinal Tract Perineuriomas and Benign Fibroblastic Polyps: Case Report and Comprehensive Systematic Review", "title_zh": "胃肠道神经束膜瘤和良性纤维母细胞息肉：病例报告和综合系统评价", "authors": "Talat Bessissow", "abstract_en": "<b>Background:</b> Perineurioma is a rare benign peripheral nerve sheath tumor that can arise in various body locations. In the gastrointestinal (GI) tract, perineuriomas are uncommon and have only been reported in case reports and case series. In addition, a new classification suggests reclassifying benign fibroblastic polyps as perineurioma when they show positive markers of perineurial differentiation. <b>Objective:</b> This study aims to enhance understanding of GI tract perineuriomas by presenting a new case and conducting a systematic literature review. <b>Methods:</b> We described a new case of colonic perineurioma and systematically reviewed all case reports and case series on GI perineuriomas and benign fibroblastic polyps with perineurial markers. We searched ScienceDirect, PubMed/MEDLINE, and Web of Science up to May 2024. <b>Results:</b> A total of 148 cases were analyzed, and most of the cases were published in the last decade (2014-2024). The majority were females (59.46%), with a mean age of 51 years (standard deviation [SD] ±14.87). Most GI perineuriomas (87.5%) were in the distal colon, predominantly in the sigmoid/rectosigmoid (56%) and rectum (14%). Outside the colon, the stomach was the most affected site (7 of 10 cases), with fewer cases in the small intestine and esophagus. The two most commonly performed stains were for epithelial membrane antigen (EMA) and glucose transporter 1 (GLUT-1), at 75% and 56% of cases, respectively. Noncolonic perineuriomas were generally larger and more symptomatic than colonic ones. Submucosal polyps were more likely symptomatic than mucosal polyps. <b>Conclusion:</b> Perineurioma in the GI tract is a rare benign polyp mainly identified in the distal colon. Its rarity and limited follow-up data restrict our understanding of recurrence rates. We recommend reporting uncommon polyp locations, detailing polyp morphologies, and using at least two markers for classification.", "abstract_zh": "<b>背景：</b>神经束膜瘤是一种罕见的良性周围神经鞘肿瘤，可发生在身体的各个部位。在胃肠道（GI）中，神经束膜瘤并不常见，仅在病例报告和病例系列中报道过。此外，一种新的分类建议，当良性成纤维细胞息肉显示出神经束膜分化的阳性标记时，将其重新分类为神经束膜瘤。 <b>目的：</b>本研究旨在通过提出新病例并进行系统文献综述来增强对胃肠道神经束膜瘤的了解。 <b>方法：</b>我们描述了一个新的结肠神经束膜病例，并系统地回顾了有关胃肠道神经束膜瘤和具有神经束膜标记的良性成纤维细胞息肉的所有病例报告和病例系列。我们检索了截至 2024 年 5 月的 ScienceDirect、PubMed/MEDLINE 和 Web of Science。<b>结果：</b>共分析了 148 个病例，大多数病例发表于过去十年（2014-2024 年）。大多数为女性 (59.46%)，平均年龄为 51 岁（标准差 [SD] ±14.87）。大多数胃肠道神经束膜瘤（87.5%）位于远端结肠，主要位于乙状结肠/直肠乙状结肠（56%）和直肠（14%）。在结肠以外，胃是受影响最严重的部位（10例中有7例），小肠和食道的病例较少。最常进行的两种染色是上皮膜抗原 (EMA) 和葡萄糖转运蛋白 1 (GLUT-1)，分别占 75% 和 56% 的病例。非结肠神经束膜瘤通常比结肠神经束膜瘤更大且症状更严重。粘膜下息肉比粘膜息肉更有可能出现症状。 <b>结论：</b> 胃肠道神经束膜瘤是一种罕见的良性息肉，主要发生在远端结肠。它的稀有性和有限的随访数据限制了我们对复发率的理解。我们建议报告不常见的息肉位置，详细说明息肉形态，并使用至少两个标记进行分类。", "keywords_zh": "良性成纤维细胞息肉, 病例报告, 病例系列, 胃肠道, 神经束膜瘤, 系统评价", "keywords_en": "benign fibroblastic polyps, case report, case series, gastrointestinal tract, perineurioma, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40225020/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 14 Apr 2025"}, {"id": "40192825", "title_en": "Botulinum toxin injection for management of post-haemorrhoidectomy pain: an updated systematic review and meta-analysis of randomised clinical trials", "title_zh": "肉毒毒素注射治疗痔疮切除术后疼痛：随机临床试验的最新系统评价和荟萃分析", "authors": "S Albayati", "abstract_en": "**Introduction:** Excisional haemorrhoidectomy remains the gold-standard treatment for grade III-IV haemorrhoids owing to the high success rate. However, post-operative pain management is an ongoing challenge. Botulinum toxin injection is thought to improve pain by targeting the internal anal sphincter spasm which occurs following haemorrhoidectomy. This systematic review and meta-analysis examines the effects of concurrent botulinum toxin injection on post-haemorrhoidectomy pain.\n\n**Methods:** A search of MEDLINE, EMBASE and Cochrane Databases for randomised controlled trials (RCTs) of botulinum toxin injection compared with placebo for management of post-haemorrhoidectomy pain was conducted following Preferred Reporting Items for Systematic Reviews and Meta-analyses (PRISMA) guidelines. Outcomes assessed included daily post-operative pain scores assessed using an analogue scale (0-10), pain at first defecation, analgesia use, complication rates and time to return to work.\n\n**Results:** A total of seven RCTs assessing 340 patients who underwent an excisional haemorrhoidectomy were included. In total, seven studies (n = 340) found significant reduction in pain post-procedure with botulinum toxin use on day 1 (mean difference, MD -1.53; 95% confidence intervals, CI -2.12, -0.94; p < 0.00001), with similar findings on day 2 and 4 (MD -1.84, 95% CI -3.28, -0.41; p = 0.01 and MD -1.63, 95% CI -2.15, -1.09; p < 0.00001, respectively). However, the analgesic effects were not seen on subsequent analyses up to day 14. Botulinum toxin was seen to be safe, with no significant difference in faecal incontinence (MD 1.05, 95% CI 0.40, 2.75; p = 0.93) or urinary retention (MD 0.37, 95% CI 0.09, 1.53; p = 0.17).\n\n**Conclusions:** Botulinum toxin use for pain relief post-excisional haemorrhoidectomy is safe and effective in the initial peri-operative period; however, the results were short-lived. Further, more robust randomised controlled trials are needed to strengthen these findings and determine the utility of botulinum toxin in this setting.\n\n**Trial Registration:** PROSPERO Register for Systematic Reviews Registration Number - CRD42024541351 on April 29 2024.", "abstract_zh": "**介绍：** 由于成功率高，痔切除术仍然是治疗 III-IV 级痔疮的金标准。然而，术后疼痛管理是一个持续的挑战。肉毒杆菌毒素注射被认为可以通过针对痔疮切除术后发生的肛门内括约肌痉挛来改善疼痛。这项系统评价和荟萃分析研究了同时注射肉毒毒素对痔疮切除术后疼痛的影响。\n\n**方法：** 根据系统评价和荟萃分析的首选报告项目 (PRISMA) 指南，在 MEDLINE、EMBASE 和 Cochrane 数据库中检索了肉毒毒素注射与安慰剂治疗痔疮切除术后疼痛的随机对照试验 (RCT)。评估的结果包括使用模拟量表（0-10）评估的每日术后疼痛评分、第一次排便时的疼痛、镇痛剂的使用、并发症发生率和重返工作岗位的时间。\n\n**结果：** 总共纳入了 7 项随机对照试验，评估了 340 名接受痔切除术的患者。总共有七项研究 (n = 340) 发现，在第 1 天使用肉毒杆菌毒素可显着减轻术后疼痛（平均差，MD -1.53；95% 置信区间，CI -2.12, -0.94；p< 0.00001），第 2 天和第 4 天也有类似的结果（MD -1.84，95% CI -3.28， -0.41；p = 0.01，MD -1.63，95% CI -2.15，-1.09；p < 0.00001）。然而，在随后的第 14 天分析中并未发现镇痛作用。肉毒杆菌毒素被认为是安全的，在大便失禁（MD 1.05，95% CI 0.40，2.75；p = 0.93）或尿潴留（MD 0.37，95% CI 0.09，1.53；p = 0.93）方面没有显着差异。 p = 0.17）。\n\n**结论：** 在围手术期初期，使用肉毒杆菌毒素缓解痔疮切除术后的疼痛是安全有效的；然而，结果是短暂的。此外，需要更强有力的随机对照试验来加强这些发现并确定肉毒杆菌毒素在这种情况下的效用。\n\n**Trial registration：** PROSPERO 于 2024 年 4 月 29 日注册系统评价注册号 - CRD42024541351。", "keywords_zh": "镇痛、肉毒杆菌毒素、痔疮切除术、疼痛、术后", "keywords_en": "Analgesia, Botulinum Toxins, Hemorrhoidectomy, Pain, Post-operative", "link": "https://pubmed.ncbi.nlm.nih.gov/40192825/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 07 Apr 2025"}, {"id": "40186734", "title_en": "A systematic review of preoperative radiological factors associated with the development of low anterior resection syndrome (LARS)", "title_zh": "与低位前切除综合征（LARS）发生相关的术前放射学因素的系统评价", "authors": "Giuseppe Currò", "abstract_en": "The aim of this systematic review is to summarise the available evidence for radiological changes associated with postoperative low anterior resection syndrome (LARS). A literature search was undertaken for all studies focusing on preoperative radiological predictors of postoperative LARS. Articles were selected from MEDLINE, EMBASE and the Cochrane Central Register of Controlled Trials (CENTRAL) databases up to October 2024. Eighty-four articles were screened: eighty-one were excluded and three were included in the analysis. All included studies focused on preoperative Magnetic Resonance Imaging (MRI) already performed as part of the oncological assessments, no study examined ultrasound or defecography. Authors retrospectively selected patients that underwent LAR, screened them with the LARS score, and reviewed preoperative MRI images with specific softwares in order to find radiological characteristics associated with LARS. Results showed that particular anatomical characteristics were present in patients that subsequently developed major LARS: the volume of the pubococcygeal + iliococcygeus muscles in 27 LARS patients out of 46 LAR (odds ratio-OR 14.7, 95% CI 1.7-128.3; p = 0.02), the thickness of the anorectal joint in 136 LARS out of 255 LAR preceded by neoadjuvant chemoradiotherapy (OR 0.653, 95% CI 0.565-0.756; p = 0.001) and the mesorectal/pelvic volumes in 135 LARS out of 236 LAR (Cox Regression analysis, p = 0.0017 and p = 0.0001 respectively). Pelvic floor musculature is a factor, among the others, that contributes to LARS. Future prospective studies need to validate these retrospective results, further delineate its influence, and investigate the potential contribution of other radiologic investigations (ultrasound and defecography) in this setting.", "abstract_zh": "本系统评价的目的是总结与术后低位前切除综合征（LARS）相关的放射学变化的现有证据。对所有关注术后 LARS 术前放射学预测因素的研究进行了文献检索。截至 2024 年 10 月，文章选自 MEDLINE、EMBASE 和 Cochrane 对照试验中央注册库 (CENTRAL) 数据库。筛选了 84 篇文章：81 篇被排除，3 篇纳入分析。所有纳入的研究都集中在作为肿瘤学评估一部分进行的术前磁共振成像 (MRI)，没有研究检查超声或排粪造影。作者回顾性选择接受 LAR 的患者，通过 LARS 评分对其进行筛查，并使用特定软件查看术前 MRI 图像，以发现与 LARS 相关的放射学特征。结果显示，随后发生严重 LARS 的患者存在特定的解剖学特征：46 例 LAR 患者中，27 例患者的耻骨尾骨 + 髂尾骨肌肉体积（比值比 OR 14.7，95% CI 1.7-128.3；p = 0.02），136 例 LARS 中肛门直肠关节的厚度255 例 LAR 中先行新辅助放化疗（OR 0.653，95% CI 0.565-0.756；p = 0.001），236 例 LAR 中 135 例 LARS 的直肠系膜/盆腔体积（Cox 回归分析，p = 0.0017 和p = 0.0001）。盆底肌肉组织是导致 LARS 的一个因素。未来的前瞻性研究需要验证这些回顾性结果，进一步描述其影响，并调查其他放射学检查（超声和排粪造影）在此情况下的潜在贡献。", "keywords_zh": "低位前切除综合征、磁共振成像、盆底疾病、放射学、超声", "keywords_en": "Low anterior resection syndrome, Magnetic resonance imaging, Pelvic floor diseases, Radiology, Ultrasound", "link": "https://pubmed.ncbi.nlm.nih.gov/40186734/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 05 Apr 2025"}, {"id": "40171091", "title_en": "Treatment of Hemorrhoidal Disease in Patients with Liver Cirrhosis: A Systematic Review", "title_zh": "肝硬化患者痔疮的治疗：系统评价", "authors": "Paulo Salgueiro", "abstract_en": "**Introduction:** The incidence of hemorrhoidal disease (HD) in cirrhotic patients is similar to that of general population, varying between 21% and 79%. Managing this clinical condition in these patients is challenging, due to the need to differentiate between bleeding originating from hemorrhoids or anorectal varices, and the unique hemostatic balance of each patient, which can lead to a decompensation of liver function and subsequently increase the anesthetic risk. To date, there are no systematic reviews specifically addressing this topic.\n\n**Methods:** This was a systematic review following the Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines. Studies were retrieved from three electronic databases. Efficacy (symptomatic improvement, patient satisfaction, quality of life improvement, disease recurrence/need for surgery and/or hemorrhoidal prolapse reduction in anoscopy) and safety (reported adverse events) outcomes were evaluated. Data from each study were initially described individually, followed by a comparative analysis for procedures applied in multiple studies.\n\n**Results:** Six studies were included - 1 randomized clinical trial (RCT), 2 prospective cohort studies, 1 retrospective cohort study, and 2 case series. The considered techniques encompassed rubber band ligation (RBL), injection sclerotherapy (IS) using 3 agents - aluminum potassium sulfate and tannic acid (ALTA), ethanolamine oleate 5% (EAO), or N-butyl-cyanoacrylate, hemorrhoidopexy, and emborrhoid technique. RBL showed great symptomatic improvement and patient satisfaction in 63% and 73% of patients, respectively, and in 90% was associated with one-grade prolapse reduction after only one session. The most frequently reported adverse events included pain (16%) and ulceration/fissure (1-17%). Concerning IS, symptomatic improvement was observed in all patients. Recurrence rates varied with the agent used (EAO: 13% at 12 months; N-butyl-cyanoacrylate: 40% at 12 months; ALTA: 18% at 5 years), and 86.7% of patients exhibited more than one-grade reduction after the initial session. The most frequent adverse event was pain (EAO: 63%; N-butyl-cyanoacrylate: 60%). Stapled hemorrhoidopexy resulted in symptomatic improvement in all patients, although associated with a recurrence rate of 25% within 4 months. With an emborrhoid technique, 80% of the patients showed clinical improvement at a 3-month follow-up, without significant adverse events, at the cost of a 40% recurrence rate.\n\n**Conclusions:** All the treatment methods assessed in the included studies appear to be effective and safe in cirrhotic patients. This assumption challenges previous concerns regarding significant bleeding after office-based procedures like RBL in this population. Future research should prioritize RCT to thoroughly assess the management of HD in these patients, particularly addressing polidocanol foam sclerotherapy, a minimally invasive technique that has previously been shown to be more effective than RBL in the general population and in patients with bleeding disorders.", "abstract_zh": "**介绍：** 肝硬化患者中痔疮疾病 (HD) 的发病率与一般人群相似，在 21% 至 79% 之间变化。处理这些患者的这种临床状况具有挑战性，因为需要区分源自痔疮或肛门直肠静脉曲张的出血，以及每个患者独特的止血平衡，这可能导致肝功能失代偿，从而增加麻醉风险。迄今为止，还没有专门针对该主题的系统综述。\n\n**方法：** 这是遵循系统评价和荟萃分析首选报告项目 (PRISMA) 指南的系统评价。研究是从三个电子数据库中检索的。评估疗效（症状改善、患者满意度、生活质量改善、疾病复发/手术需要和/或肛门镜检查中痔脱垂减少）和安全性（报告的不良事件）结果。每项研究的数据最初都是单独描述的，然后对多项研究中应用的程序进行比较分析。\n\n**结果：** 纳入六项研究 - 1 项随机临床试验 (RCT)、2 项前瞻性队列研究、1 项回顾性队列研究和 2 项病例系列研究。考虑的技术包括橡皮筋结扎 (RBL)、使用 3 种药物的注射硬化疗法 (IS) - 硫酸铝钾和单宁酸 (ALTA)、油酸乙醇胺 5% (EAO) 或氰基丙烯酸正丁酯、痔疮固定术和痔疮技术。 RBL 分别在 63% 和 73% 的患者中显示出极大的症状改善和患者满意度，并且 90% 的患者仅在一次疗程后就实现了一级脱垂减少。最常报告的不良事件包括疼痛（16%）和溃疡/裂隙（1-17%）。关于 IS，所有患者均观察到症状改善。复发率随所用药物的不同而变化（EAO：12 个月时为 13%；氰基丙烯酸正丁酯：12 个月时为 40%；ALTA：5 年时为 18%），86.7% 的患者在初次治疗后表现出超过一级的复发率。最常见的不良事件是疼痛（EAO：63%；氰基丙烯酸正丁酯：60%）。吻合器痔疮固定术使所有患者的症状得到改善，但 4 个月内复发率高达 25%。使用痔疮技术，80% 的患者在 3 个月的随访中表现出临床改善，没有明显的不良事件，但代价是 40% 的复发率。\n\n**结论：** 纳入研究中评估的所有治疗方法似乎对肝硬化患者有效且安全。这一假设挑战了之前对该人群进行 RBL 等办公室手术后出现大量出血的担忧。未来的研究应优先考虑随机对照试验，以彻底评估这些患者的 HD 治疗，特别是解决聚多卡醇泡沫硬化疗法，这是一种微创技术，此前已被证明在普通人群和出血性疾病患者中比 RBL 更有效。", "keywords_zh": "痔疮疾病，肝硬化，系统评价", "keywords_en": "Hemorrhoidal disease, Liver cirrhosis, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40171091/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 02 Apr 2025"}, {"id": "40161159", "title_en": "Hemorrhoidal Artery Ligation (HAL) vs. Rubber Band Ligation (RBL) for Second- and Third-Degree Hemorrhoids: A Systematic Review and Meta-Analysis", "title_zh": "二度和三度痔疮的痔动脉结扎 (HAL) 与橡皮筋结扎 (RBL)：系统评价和荟萃分析", "authors": "Ali Yasen Mohamedahmed", "abstract_en": "This systematic review investigates the outcomes of rubber band ligation (RBL) vs. hemorrhoidal artery ligation (HAL) for second and third-degree hemorrhoids. This review was designed, performed, and reported as per the recommendations of the Cochrane Handbook for Systematic Reviews of Interventions and Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) guidelines. Literature databases, including PubMed, Cochrane, Science Direct, and Google Scholar, were searched for studies comparing rubber band ligation vs. hemorrhoidal artery ligation for second- and third-degree hemorrhoids. The primary outcome was the recurrence of hemorrhoids, while post-operative bleeding, post-operative pain, surgical site infection, and success rate were the secondary outcomes. The literature search and inclusion criteria identified five studies (n=953) comparing HAL (n=548) vs. RBL (n=405). The recurrence rate was higher in the RBL group (28.4%) compared to the HAL group (19.3%) (odds ratio {OR}: 0.57, p=0.001). The two groups showed comparable results regarding post-operative pain (OR: 0.77, p=0.77), post-operative bleeding (OR: 1.48, p=0.44), and surgical site infection (risk difference: 0.00, p=0.67). Moreover, the short-term success rate was 85% in HAL compared to 86% in RBL (p=0.71). Rubber band ligation and hemorrhoidal artery ligation showed comparable short-term outcomes regarding symptom treatment, post-operative bleeding, and pain. However, HAL was superior in terms of recurrence rate.", "abstract_zh": "本系统综述研究了橡皮筋结扎 (RBL) 与痔动脉结扎 (HAL) 对于二度和三度痔疮的疗效。本次评价是根据干预系统评价 Cochrane 手册以及系统评价和荟萃分析首选报告项目 (PRISMA) 指南的建议进行设计、执行和报告的。检索了包括 PubMed、Cochrane、Science Direct 和 Google Scholar 在内的文献数据库，查找比较橡皮筋结扎与痔动脉结扎治疗二度和三度痔疮的研究。主要结局是痔疮复发，次要结局是术后出血、术后疼痛、手术部位感染和成功率。文献检索和纳入标准确定了五项研究 (n=953)，比较 HAL (n=548) 与 RBL (n=405)。 RBL 组的复发率 (28.4%) 高于 HAL 组 (19.3%)（比值比 {OR}：0.57，p=0.001）。两组在术后疼痛（OR：0.77，p=0.77）、术后出血（OR：1.48，p=0.44）和手术部位感染（风险差异：0.00，p=0.67）方面显示出可比的结果。此外，HAL 的短期成功率为 85%，而 RBL 的短期成功率为 86% (p=0.71)。橡皮筋结扎和痔动脉结扎在症状治疗、术后出血和疼痛方面显示出相当的短期结果。然而，HAL 在复发率方面更胜一筹。", "keywords_zh": "二度、三度痔疮，二度，三度痔疮，痔动脉结扎手术（晕），痔疮手术，直肠科，橡皮筋结扎手术", "keywords_en": "2nd and 3rd degree hemorrhoids, 2nd degree and 3rd degree haemorrhoids, hemorrhoidal artery ligation operation (halo), hemorrhoids surgery, proctology, rubber band ligation procedure", "link": "https://pubmed.ncbi.nlm.nih.gov/40161159/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 31 Mar 2025"}, {"id": "40148836", "title_en": "Rectal prolapse as an initial presentation of colorectal cancer: a systematic review", "title_zh": "直肠脱垂作为结直肠癌的首发表现：系统评价", "authors": "Esmat Davoudi-Monfared", "abstract_en": "**Background:** Colorectal cancer rising incidence still pose a public health challenge. In the present systematic review, we aimed to study the colorectal cancer patients with initial presentation of rectal prolapse.\n\n**Method:** The study protocol was developed (PROSPERO CRD42017060473). We searched Web of Science, PubMed and Scopus to identify case reports of rectal Prolapse as a chief compliant of colorectal cancer. The Preferred Reporting Items for Systematic Reviews and Meta- Analysis (PRISMA) guidelines were used for screening and data extraction.\n\n**Results:** Thirty-one case reports were included in this review. More than half of the patients were females over 65 years old and mean ± SD age of the cases were 64 ± 17.9 years and, the female gender were mentioned in 17 (56%) case reports. The majority (64.5%) of the identified cancer belong to rectum and recto-sigmoid origin's location. In the history retained from the cases, rectal bleeding and constipation were the most frequent reported accompanied symptoms in colorectal cancer cases with initial presentation of rectal prolapse. 67.7% of all identified cases in this review published at 2015 and later.\n\n**Conclusion:** Rectal prolapse can be an initial presentation of colorectal cancer, which is more prevalent in female more than 65 years old. The most common symptoms accompanied rectal prolapse were rectal bleeding and constipation. According to rising published case reports on colorectal cancer patients with initial presentation of rectal prolapse in recent years, further work-up is recommended for patients without predisposing factors for a concomitant tumor.", "abstract_zh": "**背景：** 结直肠癌发病率上升仍然构成公共卫生挑战。在本系统评价中，我们旨在研究以直肠脱垂为首发症状的结直肠癌患者。\n\n**Method：** 制定了研究方案（PROSPERO CRD42017060473）。我们搜索了 Web of Science、PubMed 和 Scopus，以确定直肠脱垂作为结直肠癌主要症状的病例报告。系统评价和荟萃分析的首选报告项目 (PRISMA) 指南用于筛选和数据提取。\n\n**结果：** 本次审查纳入了 31 份病例报告。超过一半的患者为65岁以上的女性，病例的平均±SD年龄为64±17.9岁，17例（56%）病例报告中提到了女性。大多数（64.5%）已发现的癌症属于直肠和直肠乙状结肠起源位置。在病例保留的病史中，直肠出血和便秘是最初表现为直肠脱垂的结直肠癌病例中最常见的伴随症状。本次审查中发现的所有案例中，67.7% 是在 2015 年及之后发布的。\n\n**结论：** 直肠脱垂可能是结直肠癌的首发表现，结直肠癌在 65 岁以上的女性中更为常见。直肠脱垂最常见的症状是直肠出血和便秘。近年来，关于初次出现直肠脱垂的结直肠癌患者的病例报告不断增加，建议对没有伴随肿瘤诱发因素的患者进行进一步检查。", "keywords_zh": "结直肠癌, 初次表现, 直肠脱垂, 系统评价", "keywords_en": "Colorectal cancer, Initial presentation, Rectal prolapse, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40148836/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 28 Mar 2025"}, {"id": "40148672", "title_en": "Does biodegradable peri-rectal spacer mitigate treatment toxicities in radiation therapy for localised prostate cancer-a systematic review and meta-analysis", "title_zh": "可生物降解的直肠周围间隔物是否可以减轻局限性前列腺癌放射治疗的治疗毒性——系统评价和荟萃分析", "authors": "Jeremy Yuen-Chun Teoh", "abstract_en": "**Introduction:** There is an increasing use of biodegradable peri-rectal spacer prior to radiation therapy for prostate cancer to reduce treatment-associated rectal toxicity. While data from individual trials and cohorts is maturing, there is a lack of an updated quantitative analysis that includes outcomes following peri-rectal spacer. We aim to delineate the clinical impact of peri-rectal spacer in localised prostate cancer patients treated with radiotherapy.\n\n**Methods:** In March 2024, a systematic search was performed on MEDLINE, Embase, and Cochrane Central Register of controlled trials for publications since the year 2010. Prospective and retrospective studies reporting comparative outcomes of patients with and without peri-rectal spacer prior to radiotherapy were considered. Outcomes are reported in binary fashion. Random effect meta-analysis with the use of weighted mean difference was adopted. Early (≤3 months) and late rectal toxicity stratified according to the Common Terminology Criteria for Adverse Events (CTCAE) criteria, early and late genitourinary toxicity, quality of life in bowel, sexual and urinary domains (in terms of minimal clinically important difference) were assessed.\n\n**Results:** The systematic review included 17 studies. There are 3 RCTs, 3 prospective cohorts, and 11 retrospective cohorts. Three thousand two hundred patients were included, with 1471 patients who received peri-rectal spacer and 1729 without. The use of spacer is associated with lower likelihood of late (1.62% vs. 9.35%, RR = 0.25, 95% CI = 0.15-0.42, P < 0.001) and early grade 2 or above late rectal toxicity (3.07% vs. 6.05%, RR = 0.53, 95% CI = 0.33-0.86, P < 0.001). No difference is observed in significant grade 3 or above GI (acute or late) events. There is no statistical difference in bowel-related bowel QoL (risk difference = -0.16, 95% CI = -0.38-0.06, P = 0.15). The perirectal spacer is not associated with negative impact to urinary or sexual domains of QoL either.\n\n**Conclusion:** In localised prostate cancer patients treated with radiation therapy, the use of peri-rectal spacer is associated with reduced rectal toxicities.", "abstract_zh": "**介绍：** 在前列腺癌放射治疗之前，越来越多地使用可生物降解的直肠周围间隔物，以减少治疗相关的直肠毒性。虽然来自个别试验和队列的数据正在成熟，但缺乏包括直肠周围间隔器后结果的更新的定量分析。我们的目的是描述直肠周围间隔物对接受放射治疗的局限性前列腺癌患者的临床影响。\n\n**方法：** 2024 年 3 月，对 MEDLINE、Embase 和 Cochrane Central Register 上自 2010 年以来发表的对照试验进行了系统检索。考虑了报告放疗前使用和不使用直肠周围间隔物的患者的比较结果的前瞻性和回顾性研究。结果以二进制方式报告。采用加权平均差的随机效应荟萃分析。根据不良事件通用术语标准 (CTCAE) 标准分层的早期（≤3 个月）和晚期直肠毒性、早期和晚期泌尿生殖毒性、肠道、性和泌尿领域的生活质量（就最小临床重要差异而言）进行了评估。\n\n**结果：** 系统评价包括 17 项研究。有 3 个随机对照试验、3 个前瞻性队列和 11 个回顾性队列。研究纳入了 3200 名患者，其中 1471 名患者接受了直肠周围间隔器，1729 名患者未接受直肠周围间隔器。使用垫片与晚期（1.62% vs. 9.35%，RR = 0.25，95% CI = 0.15-0.42，P < 0.001）和早期2级或以上晚期直肠毒性的可能性较低（3.07% vs. 6.05%，RR = 0.53， 95% CI = 0.33-0.86，P < 0.001）。在显着的 3 级或以上 GI（急性或晚期）事件中没有观察到差异。肠道相关的肠道QoL没有统计学差异（风险差 = -0.16，95% CI = -0.38-0.06，P = 0.15）。直肠周围间隔物也不会对泌尿或性领域的生活质量产生负面影响。\n\n**结论：** 在接受放射治疗的局限性前列腺癌患者中，使用直肠周围间隔物可减少直肠毒性。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40148672/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 28 Mar 2025"}, {"id": "40135757", "title_en": "Author's Reply to Letter About: How to Write a Systematic Review and Meta-Analysis", "title_zh": "作者对关于以下内容的信的回复：如何撰写系统评价和荟萃分析", "authors": "Richard L Nelson", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40135757/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 26 Mar 2025"}, {"id": "40135742", "title_en": "Striking A Balance: The Risks of Oversimplifying Systematic Review Methodology", "title_zh": "取得平衡：过度简化系统审查方法的风险", "authors": "Rachel Riera", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40135742/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 26 Mar 2025"}, {"id": "40102483", "title_en": "Comparative pregnancy rate after colorectal resection versus other surgical procedures for deep infiltrating rectal endometriosis: a systematic review and meta-analysis", "title_zh": "结直肠切除术与其他深部浸润直肠子宫内膜异位症手术后妊娠率的比较：系统评价和荟萃分析", "authors": "Jean-Marc Ayoubi", "abstract_en": "The debate around colorectal surgery for endometriosis has been ongoing, but to date no meta-analysis has investigated the impact of the different surgical approaches on the pregnancy rate. The aim of this meta-analysis study was to determine in women with deep infiltrating rectal endometriosis, how does colorectal resection surgery compare to other surgical techniques (e.g., rectal shaving, disc excision) in terms of pregnancy rates. We searched PubMed, Web of Science, Cochrane library and Clinical Trials for relevant studies published from inception to December 2024. We performed a systematic review and meta-analysis of all English language full-text articles addressing colorectal resection compared with other management of deep infiltrating rectal endometriosis and presenting pregnancy outcomes. We included a study when it (i) provided data on surgical management (shaving, disc excision, and/or colorectal resection) and (ii) detailed the pregnancy outcomes in each subgroup. Four authors independently performed the initial search to evaluate the eligibility criteria. Four authors extracted the data and a fifth author checked this extraction. Of the 113 full-text articles assessed for eligibility, we included 13 in the meta-analysis. These studies represented a total of 3,248 patients. Pregnancy information was available for 2,131 patients: 1073 colorectal resection, 502 shaving, 172 disc excisions, and 384 other practices (expectant management). Colorectal resection was associated with a lower pregnancy rate compared with the other techniques (N = 2,131, odds ratio [OR] = 0.64 [95% confidence interval 0.52-0.79], p < 0.001, I2 = 35%). There were similar results when comparing colorectal resection with rectal shaving (N = 952, OR = 0.51 [95% confidence interval 0.36-0.73], p < 0.001, I2 = 0%), but not when comparing colorectal resection with disc excision (N = 432, OR = 0.65 [95% confidence interval 0.37-1.13], p = 0.13). Conclusions Rectal resection for endometriosis is associated with a lower pregnancy rate compared with other type of surgery, such as shaving. Trial registration: PROSPERO registration number CRD42024512328.", "abstract_zh": "关于子宫内膜异位症的结直肠手术的争论一直在持续，但迄今为止还没有荟萃分析调查不同手术方法对妊娠率的影响。这项荟萃分析研究的目的是确定对于患有深部浸润直肠子宫内膜异位症的女性，结直肠切除手术与其他手术技术（例如直肠剃除术、椎间盘切除术）相比，其妊娠率如何。我们检索了 PubMed、Web of Science、Cochrane 图书馆和临床试验，查找从开始到 2024 年 12 月发表的相关研究。我们对所有涉及结直肠切除术与深部浸润直肠子宫内膜异位症的其他治疗方法和妊娠结局的英文全文文章进行了系统回顾和荟萃分析。我们纳入了一项研究，它（i）提供了手术治疗（剃毛、椎间盘切除和/或结直肠切除）的数据，并且（ii）详细说明了每个亚组的妊娠结局。四位作者独立进行了初步检索以评估资格标准。四位作者提取了数据，第五位作者检查了此提取。在评估资格的 113 篇全文文章中，我们将 13 篇纳入荟萃分析。这些研究总共涉及 3,248 名患者。提供了 2,131 名患者的怀孕信息：1073 例结直肠切除术、502 例剃毛术、172 例椎间盘切除术和 384 例其他手术（期待治疗）。与其他技术相比，结直肠切除术与较低的妊娠率相关（N = 2,131，比值比[OR] = 0.64 [95%置信区间0.52-0.79]，p < 0.001，I2 = 35%）。比较结直肠切除术与直肠剃除术时有相似的结果（N = 952，OR = 0.51 [95%置信区间0.36-0.73]，p < 0.001，I2 = 0%），但比较结直肠切除术与椎间盘切除术时则不然（N = 432， OR = 0.65 [95% 置信区间 0.37-1.13]，p = 0.13）。结论 与其他类型的手术（例如剃毛）相比，直肠切除术治疗子宫内膜异位症的妊娠率较低。试用注册：PROSPERO注册号CRD42024512328。", "keywords_zh": "结直肠切除术、椎间盘切除术、子宫内膜异位症、怀孕、剃毛", "keywords_en": "Colorectal resection, Disc excision, Endometriosis, Pregnancy, Shaving", "link": "https://pubmed.ncbi.nlm.nih.gov/40102483/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 19 Mar 2025"}, {"id": "40072118", "title_en": "Key Factors to Consider for Candida auris Screening in Healthcare Settings: A Systematic Review", "title_zh": "医疗机构中耳念珠菌筛查要考虑的关键因素：系统评价", "authors": "Mari Molvik", "abstract_en": "**Background:** Candida auris is an emerging fungal pathogen that is often multidrug-resistant. It can persist on skin and in hospital environments, leading to outbreaks and severe infections for patients at risk. Several countries and institutions are working on establishing guidelines and recommendations for prevention. This review aims to assess the evidence on factors associated with C. auris colonisation or infection, the duration of such colonisation, possible colonisation sites, and the risk of secondary cases to inform screening recommendations.\n\n**Methods:** We systematically searched five databases for primary studies and systematic reviews of our four outcomes. We excluded studies on treatment, management, laboratory methods, drug resistance, and environmental screening. From each paper, we extracted relevant data and summarised them in tables. Main findings were described narratively.\n\n**Findings:** We selected 117 studies for inclusion. Most of the studies were observational studies. Without taking the method of testing into account, the duration of C. auris colonisation varied, with up to and beyond a year being common. The predominant sites of colonisation were the axillae and groin, with the nares and rectum being less common sites. The risk of secondary cases saw considerable variation across the studies, and the secondary cases primarily involved patients and not healthcare workers. Critical care settings, invasive medical devices, recent antimicrobial use, and comorbidities were often associated with C. auris colonisation and infection.\n\n**Conclusion:** Our review highlights that, despite relevant findings on factors influencing C. auris colonisation and infection, substantial gaps remain in the evidence supporting screening practices. Most studies were conducted reactively, in outbreak settings, and lack systematic protocols. Given these limitations, screening guidelines are likely to be more successful if grounded in medical theory and yeast microbiology rather than relying solely on current studies. Rigorous, well-designed research is urgently needed to inform future C. auris screening and control efforts.", "abstract_zh": "**背景：** 耳念珠菌是一种新兴的真菌病原体，通常具有多重耐药性。它可以持续存在于皮肤和医院环境中，导致高危患者爆发和严重感染。一些国家和机构正在努力制定预防指南和建议。本综述旨在评估与耳念珠菌定植或感染相关的因素、定植持续时间、可能的定植位点以及继发病例的风险的证据，以提供筛查建议。\n\n**方法：** 我们系统地检索了五个数据库进行初步研究并对我们的四个结果进行系统评价。我们排除了有关治疗、管理、实验室方法、耐药性和环境筛查的研究。我们从每篇论文中提取了相关数据并将其总结在表格中。对主要发现进行了叙述性描述。\n\n**Findings：** 我们选择了 117 项研究纳入其中。大多数研究都是观察性研究。如果不考虑测试方法，耳念珠菌定殖的持续时间各不相同，最长或超过一年的情况很常见。定植的主要部位是腋窝和腹股沟，鼻孔和直肠是不太常见的部位。各个研究中继发病例的风险存在很大差异，并且继发病例主要涉及患者而不是医护人员。重症监护环境、侵入性医疗设备、近期抗菌药物的使用以及合并症通常与耳念珠菌定植和感染有关。\n\n**结论：** 我们的综述强调，尽管对影响耳念珠菌定植和感染的因素有相关发现，但支持筛查实践的证据仍然存在很大差距。大多数研究都是在疫情爆发的情况下被动进行的，缺乏系统的方案。鉴于这些限制，如果基于医学理论和酵母微生物学而不是仅仅依赖当前的研究，筛查指南可能会更成功。迫切需要严谨、精心设计的研究来为未来的耳念珠菌筛查和控制工作提供信息。", "keywords_zh": "耳念珠菌、真菌感染、医疗保健相关感染、感染控制、筛查", "keywords_en": "Candida auris, fungal infections, healthcare‐associated infections, infection control, screening", "link": "https://pubmed.ncbi.nlm.nih.gov/40072118/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 12 Mar 2025"}, {"id": "40063683", "title_en": "Evaluating the Impact of Induction and Consolidation Total Neoadjuvant Therapies Compared to Conventional Chemoradiotherapy for Locally Advanced Rectal Cancer: A Systematic Review and Network Meta-analysis", "title_zh": "评估诱导和巩固总体新辅助治疗与传统放化疗对局部晚期直肠癌的影响：系统评价和网络荟萃分析", "authors": "Jeonghyun Kang", "abstract_en": "**Background:** Total neoadjuvant therapy has been introduced to enhance oncological outcomes and minimize toxicity in locally advanced rectal cancer, but the superiority between the induction and consolidation of therapy remain unclear.\n\n**Objective:** To evaluate oncological and postoperative outcomes by comparing induction chemotherapy and consolidation chemotherapy with conventional chemoradiotherapy in patients with locally advanced rectal cancer.\n\n**Data Sources:** Systematic searches of PubMed, Embase, and Cochrane databases wereperformed for studies published from the database's inception until June 2023.\n\n**Study Selection:** The inclusion criteria were patients diagnosed with rectal cancer. Interventions included induction chemotherapy and consolidation chemotherapy, and comparisons were specified as conventional neoadjuvant chemoradiotherapy.\n\n**Main Outcome Measures:** Primary outcomes were the rates of pathologic or clinical complete response, postoperative results, chemoradiotherapy-related toxicity, and survival outcomes.\n\n**Results:** Thirty-three studies, encompassing patients from 1991 to 2021, were eligible for analysis. In network meta-analysis, a significantly increased OR for a pathologic complete response was observed in both the induction therapy group at 1.65 (95% credible interval, 1.18-2.30) and the consolidation therapy group at 1.87 (95% credible interval, 1.40-2.47) compared to conventional chemoradiotherapy. However, no difference was observed in complete response rates, postoperative results, or chemoradiotherapy-related toxicity grade 3 or higher between the groups. There were no differences among the groups in local recurrence, distant metastasis, or disease-free survival, whereas the induction group showed a nonsignificant improvement in overall survival.\n\n**Limitations:** There was significant heterogeneity among the studies, and the short follow-up period in most studies limited the assessment of long-term survival outcomes.\n\n**Conclusions:** Both induction and consolidation total neoadjuvant therapy increase the pathologic complete response rate in locally advanced rectal cancer without compromising safety or postoperative outcomes. However, total neoadjuvant therapy was not associated with a significant improvement in survival outcomes. Although total neoadjuvant therapy strategies for locally advanced rectal cancer are considered safe, additional long-term studies are needed.\n\n**Trial Registration No:** CRD42023445348.", "abstract_zh": "**背景：** 已引入全新辅助治疗来增强局部晚期直肠癌的肿瘤学结果并最大程度地减少毒性，但诱导治疗和巩固治疗之间的优越性仍不清楚。\n\n**目的：** 通过比较局部晚期直肠癌患者的诱导化疗和巩固化疗与常规放化疗，评估肿瘤学和术后结果。\n\n**Data sources：** 对 PubMed、Embase 和 Cochrane 数据库进行了系统检索，查找从数据库成立到 2023 年 6 月期间发表的研究。\n\n**Study selection：** 纳入标准是诊断患有直肠癌的患者。干预措施包括诱导化疗和巩固化疗，比较指定为常规新辅助放化疗。\n\n**Main outcome measures：** 主要结局是病理或临床完全缓解率、术后结果、放化疗相关毒性和生存结局。\n\n**结果：** 涵盖 1991 年至 2021 年患者的 33 项研究符合分析条件。在网络荟萃分析中，与传统放化疗相比，诱导治疗组的病理完全缓解 OR 显着增加为 1.65（95% 可信区间，1.18-2.30），巩固治疗组为 1.87（95% 可信区间，1.40-2.47）。然而，两组间在完全缓解率、术后结果或放化疗相关毒性 3 级或以上方面没有观察到差异。各组之间的局部复发、远处转移或无病生存率没​​有差异，而诱导组的总生存率没有显着改善。\n\n**Limitations：** 研究之间存在显着的异质性，并且大多数研究的短期随访限制了长期生存结果的评估。\n\n**结论：** 诱导和巩固全新辅助治疗均可提高局部晚期直肠癌的病理完全缓解率，且不影响安全性或术后结果。然而，总体新辅助治疗与生存结果的显着改善无关。尽管局部晚期直肠癌的总体新辅助治疗策略被认为是安全的，但仍需要额外的长期研究。\n\n**Trial registration no：** CRD42023445348。", "keywords_zh": "巩固化疗、诱导化疗、直肠癌、全面新辅助治疗", "keywords_en": "Consolidation chemotherapy, Induction chemotherapy, Rectal cancer, Total neoadjuvant therapy", "link": "https://pubmed.ncbi.nlm.nih.gov/40063683/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 10 Mar 2025"}]}, currentFeed: '', currentPapers: [], currentPaper: null,
                    init() { const ks = Object.keys(this.feeds); if(ks.length > 0) { this.currentFeed = ks[0]; this.selectFeed(); } },
                    selectFeed() { this.currentPapers = this.feeds[this.currentFeed]; this.currentPaper = this.currentPapers.length > 0 ? this.currentPapers[0] : null; document.querySelector('aside').scrollTop = 0; }
                }
            }
