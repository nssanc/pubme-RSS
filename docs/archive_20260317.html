was conducted using odds ratios (OR) and 95% confidence intervals (CI) for categorical outcomes. The primary endpoints were cancer detection rate and postbiopsy infection rate. Secondary outcomes included urinary retention, bleeding, pain, and complications stratified by the Clavien-Dindo system. Study quality and certainty of evidence were assessed using the Cochrane ROB2 and GRADE tools. Four RCTs encompassing 2682 patients (TP: 1323; TR: 1359) were included. No significant differences were observed in overall prostate cancer detection rates (OR 1.03, 95% CI, 0.79-1.36) or detection of anterior lesions (OR 1.01, 95% CI, 0.41-2.45). Similarly, no differences were found in bleeding (OR 1.14, 95% CI, 0.66-1.95), urinary retention (OR 1.01, 95% CI, 0.50-2.04), total infections (OR 1.02, 95% CI, 0.77-1.35), or severe infections (OR 2.17, 95% CI, 0.97-4.88). Mild pain was more frequent in the TP group (OR 1.56, 95% CI, 1.20-2.03), while moderate to severe pain did not differ significantly (OR 0.65, 95% CI, 0.39-1.07). Transperineal and transrectal MRI-fusion-guided biopsy approaches demonstrated equivalent diagnostic accuracy and safety profiles. While the transperineal route was associated with slightly greater mild discomfort, cancer detection and complication rates were comparable. The selection of approach should be guided by principles of antimicrobial stewardship, patient preference, and institutional expertise.", "abstract_zh": "仅使用随机对照试验 (RCT) 的数据来比较经会阴 (TP) 与经直肠 (TR) 超声引导前列腺活检的安全性和诊断性能。截至 2025 年 5 月，我们在多个数据库中进行了系统性检索。我们仅纳入了比较 TP 和 TR 方法在接受 MRI 靶向前列腺活检的男性中的随机对照试验。使用优势比 (OR) 和 95% 置信区间 (CI) 进行分类结果的荟萃分析。主要终点是癌症检出率和活检后感染率。次要结局包括按 Clavien-Dindo 系统分层的尿潴留、出血、疼痛和并发症。使用 Cochrane ROB2 和 GRADE 工具评估研究质量和证据的确定性。纳入了四项随机对照试验，涉及 2682 名患者（TP：1323；TR：1359）。总体前列腺癌检出率（OR 1.03，95% CI，0.79-1.36）或前部病变检出率（OR 1.01，95% CI，0.41-2.45）没有观察到显着差异。同样，出血（OR 1.14，95% CI，0.66-1.95）、尿潴留（OR 1.01，95% CI，0.50-2.04）、总感染（OR 1.02，95% CI，0.77-1.35）或严重感染（OR 2.17，95% CI， 0.97-4.88）。 TP 组轻度疼痛更为常见（OR 1.56，95% CI，1.20-2.03），而中度至重度疼痛没有显着差异（OR 0.65，95% CI，0.39-1.07）。经会阴和经直肠 MRI 融合引导活检方法表现出相同的诊断准确性和安全性。虽然经会阴途径会带来稍大的轻微不适，但癌症检出率和并发症发生率相当。方法的选择应遵循抗菌药物管理、患者偏好和机构专业知识的原则。", "keywords_zh": "诊断, 前列腺癌, 随机试验, 经会阴活检, 经会阴前列腺活检", "keywords_en": "Diagnosis, Prostate cancer, Randomized trial, Transperineal Biopsy, Transperineal prostate biopsy", "link": "https://pubmed.ncbi.nlm.nih.gov/41385931/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 12 Dec 2025"}, {"id": "41372917", "title_en": "The impact of primary tumor location of colorectal cancer on the survival outcome of patients with brain metastasis: a systematic review and meta-analysis", "title_zh": "结直肠癌原发肿瘤部位对脑转移患者生存结局的影响：系统评价和荟萃分析", "authors": "Abhishek Kumar", "abstract_en": "**Objectives:** Several prior studies have shown that in metastasized colorectal cancer, the primary cancer's location influences patients' survival rates, with left-sided colorectal cancer being associated with longer survival than right-sided colorectal cancer. This study aimed to explore the influence of the primary location of colorectal cancer on survival following brain metastasis.\n\n**Methods:** To address this clinical question, we conducted a systematic review and meta-analysis. We included studies focused on patients diagnosed with brain metastasis from colorectal cancer. These studies reported survival outcomes based on different primary tumor sites (right versus left and colon versus rectum). The primary outcome was to aggregate the hazard ratio (HR) of left-sided colorectal cancer when metastasized to the brain compared with right-sided colorectal cancer. The secondary outcome was to aggregate the HR of rectal cancer when it metastasized to the brain compared with colon cancer.\n\n**Results:** Ten studies with a total of 1792 patients were included in the meta-analysis, and combined HR was calculated. Left-sided colon cancer showed higher overall survival compared with right-sided colon cancer when metastasized to the brain (HR: 0.71, 95% CI: 0.54-0.94, I<sup>2</sup> = 0%). Rectal cancer did not show a statistically significant difference in overall survival compared with colon cancer (HR: 0.75, 95% CI: 0.40-1.41, I<sup>2</sup> = 81%).\n\n**Conclusions:** Concordant with lung and liver metastases, the primary location of colorectal cancer influenced overall survival when metastasized to the brain. Left-sided colon cancer demonstrated higher overall survival than right-sided colon cancer.", "abstract_zh": "**Objectives：** 先前的几项研究表明，在转移性结直肠癌中，原发癌症的位置影响患者的生存率，左侧结直肠癌比右侧结直肠癌的生存期更长。本研究旨在探讨结直肠癌的原发部位对脑转移后生存的影响。\n\n**方法：** 为了解决这个临床问题，我们进行了系统回顾和荟萃分析。我们纳入的研究重点是诊断为结直肠癌脑转移的患者。这些研究报告了基于不同原发肿瘤部位（右与左、结肠与直肠）的生存结果。主要结果是汇总左侧结直肠癌与右侧结直肠癌转移至大脑时的风险比（HR）。次要结果是与结肠癌相比，汇总直肠癌转移至大脑时的 HR。\n\n**结果：** 荟萃分析纳入 10 项研究，共 1792 名患者，并计算了合并 HR。当转移至脑部时，左侧结肠癌比右侧结肠癌表现出更高的总生存率（HR：0.71，95% CI：0.54-0.94，I<sup>2</sup> = 0%）。与结肠癌相比，直肠癌的总生存率没有表现出统计学上的显着差异（HR：0.75，95% CI：0.40-1.41，I<sup>2</sup> = 81%）。\n\n**结论：** 与肺和肝转移一致，结直肠癌转移到大脑时的主要位置会影响总体生存率。左侧结肠癌的总体生存率高于右侧结肠癌。", "keywords_zh": "脑转移、结直肠癌、左结肠癌、直肠癌、右结肠癌", "keywords_en": "Brain metastasis, Colorectal cancer, Left colon cancer, Rectal cancer, Right colon cancer", "link": "https://pubmed.ncbi.nlm.nih.gov/41372917/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 10 Dec 2025"}, {"id": "41359190", "title_en": "Anatomical and functional outcomes of combined ventral rectopexy and sacrocolpo/hysteropexy for multicompartment pelvic organ prolapse: a systematic review and meta-analysis", "title_zh": "腹侧直肠固定术和骶阴道/子宫固定术联合治疗多室盆腔器官脱垂的解剖和功能结果：系统评价和荟萃分析", "authors": "Marine Lallemant", "abstract_en": "**Introduction:** Limited data exists in literature regarding concomitant ventral rectopexy (VRP) and sacrocolpo/hysteropexy (SCP/SHP), with existing studies being predominantly retrospective. The aim of this meta-analysis is to assess the anatomical and functional outcomes of combined VRP and SCP/SHP for the treatment of multicompartmental pelvic organ prolapse (POP).\n\n**Methods:** We performed systematic research and meta-analysis from PubMed/MEDLINE and EMBASE, according to Preferred Reporting Items for Systematic Reviews and Meta-Analyses (PRISMA) 2020 guidelines, until 15 January 2025. Women submitted to VRP with SCP/SHP were included. Improvement of anorectal symptoms were evaluated. Postoperative anatomical relapse was reported. Re-operation rates were evaluated.\n\n**Results:** Six articles were included. Constipation/obstructed defecation syndrome (ODS) [odds ratio (OR) 0.26, 95% CI 0.10-0.68; p = 0.006 (I<sup>2</sup> test 81%, p = 0.56)] and of anal/fecal incontinence (AI/FI) rates [OR 0.09, 95% CI 0.03-0.30; p < 0.0001 (I<sup>2</sup> test 70%, p = 0.04)] significantly improved after combined VRP and SCP/SHP. The proportion metanalysis of four included studies reported a subjective POP recurrence rate of 7% (95% CI 1-13%; I<sup>2</sup> test 82.9%, p < 0.001). The proportion metanalysis of five included studies for objective POP recurrence was 5% (95% CI 1-9%; I<sup>2</sup> test 56.9%, p = 0.041). No serious adverse events were reported.\n\n**Conclusions:** VRP combined with SCP/SHP has been shown to be safe and effective for women with multicompartment POP, providing optimal anatomical and functional outcomes. Larger, long-term, prospective-controlled studies are needed to confirm these results.", "abstract_zh": "**介绍：** 文献中关于伴随腹侧直肠固定术（VRP）和骶阴道/子宫固定术（SCP/SHP）的数据有限，现有研究主要是回顾性的。本荟萃分析的目的是评估 VRP 和 SCP/SHP 联合治疗多室盆腔器官脱垂 (POP) 的解剖学和功能结果。\n\n**方法：** 截至 2025 年 1 月 15 日，我们根据系统评价和荟萃分析的首选报告项目 (PRISMA) 2020 指南，从 PubMed/MEDLINE 和 EMBASE 进行了系统研究和荟萃分析。纳入了通过 SCP/SHP 提交 VRP 的女性。评估肛门直肠症状的改善情况。据报道术后解剖学复发。评估了再手术率。\n\n**结果：** 收录了六篇文章。便秘/排便阻塞综合征 (ODS) [比值比 (OR) 0.26，95% CI 0.10-0.68； p = 0.006（I<sup>2</sup> 测试 81%，p = 0.56）] 和肛门/大便失禁 (AI/FI) 率 [OR 0.09，95% CI 0.03-0.30； p < 0.0001（I<sup>2</sup>测试70%，p = 0.04）]在VRP和SCP/SHP结合后显着改善。四项纳入研究的比例荟萃分析报告主观 POP 复发率为 7%（95% CI 1-13%；I<sup>2</sup> 检验 82.9%，p<0.001）。五项纳入客观 POP 复发研究的荟萃分析比例为 5%（95% CI 1-9%；I<sup>2</sup> 检验 56.9%，p = 0.041）。没有报告严重不良事件。\n\n**结论：** VRP 与 SCP/SHP 相结合已被证明对患有多室 POP 的女性安全有效，可提供最佳的解剖和功能结果。需要更大规模、长期、前瞻性对照研究来证实这些结果。", "keywords_zh": "肛门失禁、排便阻塞综合征、盆腔器官脱垂、直肠脱垂、骶骨阴道固定术、骶子宫固定术、腹侧直肠固定术", "keywords_en": "Anal incontinence, Obstructed defecation syndrome, Pelvic organ prolapse, Rectal prolapse, Sacrocolpopexy, Sacrohysteropexy, Ventral rectopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/41359190/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 08 Dec 2025"}, {"id": "41316735", "title_en": "Colorectal polyp distribution in relation to age: meta-analysis", "title_zh": "结直肠息肉分布与年龄的关系：荟萃分析", "authors": "Frank Frizelle", "abstract_en": "**Background:** An increase in early-onset colorectal cancer has been observed globally, despite a decline in colorectal cancer incidence rates in many Western countries. Screening strategies for younger individuals are particularly challenging, as there are limited data on polyps in young individuals to guide clinicians. This study aimed to systematically review the current evidence surrounding polyp distribution in different age groups.\n\n**Methods:** A literature search was performed in PubMed, Scopus, MEDLINE, Embase (OVID), Web of Science, and Cochrane Review databases using the keywords 'age' and 'polyp', and Medical Subject Heading terms 'age of onset', 'age factors', 'age distribution', and 'age groups', with no restrictions on publication year. Articles published in English that described the distribution of polyps (adenomatous, advanced adenomatous polyps, and sessile serrated lesions) or individuals with polyps according to different age groups were considered for inclusion. Younger patients were defined as those aged < 50 years. The outcomes of interest were the number of patients with polyps in the left and/or right colon, or the number of polyps per side of the colorectum in different age groups.\n\n**Results:** From 12 470 articles, 24 met the eligibility criteria for the systematic review, and 12 were suitable for meta-analysis. Among younger people, 46.5% had right-sided and 75.9% had left-sided polyps. In comparison, 70.8% of the older group had right-sided and 61.9% had left-sided polyps. Meta-analyses of studies showed a greater proportion of younger people than older people with at least one left-sided polyp (mean difference 0.06, 95% confidence interval (c.i.) 0.03 to 0.09; P < 0.001). There was also a greater proportion of left-sided polyps in younger people (odds ratio 0.77, 95% c.i. 0.59 to 1.01; P < 0.001).\n\n**Conclusion:** Patients aged < 50 years have a greater tendency towards having polyps in the left colon, compared with people ≥ 50 years of age, similar to the distribution of early-onset colorectal cancer. This has implications for the methodology of screening and investigation of symptoms in those aged < 50 years.", "abstract_zh": "**背景：** 尽管许多西方国家的结直肠癌发病率有所下降，但全球范围内早发性结直肠癌的发病率有所增加。针对年轻人的筛查策略尤其具有挑战性，因为指导临床医生的年轻人息肉数据有限。本研究旨在系统地回顾有关不同年龄组息肉分布的当前证据。\n\n**方法：** 使用关键词“年龄”和“息肉”以及医学主题词“发病年龄”、“年龄因素”、“年龄分布”和“年龄组”在 PubMed、Scopus、MEDLINE、Embase (OVID)、Web of Science 和 Cochrane Review 数据库中进行文献检索，对发表年份没有限制。以英文发表的描述息肉（腺瘤性、晚期腺瘤性息肉和无蒂锯齿状病变）或息肉个体根据不同年龄组的分布的文章被考虑纳入。年轻患者被定义为年龄< 50 岁的患者。感兴趣的结果是左和/或右结肠息肉患者的数量，或不同年龄组每侧结肠直肠息肉的数量。\n\n**结果：** 在 12 470 篇文章中，24 篇符合系统评价的资格标准，12 篇适合荟萃分析。在年轻人中，46.5% 患有右侧息肉，75.9% 患有左侧息肉。相比之下，70.8% 的老年人患有右侧息肉，61.9% 的老年人患有左侧息肉。研究荟萃分析显示，患有至少一颗左侧息肉的年轻人比例高于老年人（平均差 0.06，95% 置信区间 (c.i.) 0.03 至 0.09；P < 0.001）。年轻人中左侧息肉的比例也较高（比值比 0.77，95% c.i. 0.59 至 1.01；P < 0.001）。\n\n**结论：** 与年龄≥50岁的人相比，年龄<50岁的患者左半结肠息肉的倾向更大，与早发性结直肠癌的分布相似。这对于 50 岁以下人群的症状筛查和调查方法具有重要意义。", "keywords_zh": "腺瘤、结肠、直肠、无蒂锯齿状病变", "keywords_en": "adenoma, colon, rectum, sessile serrated lesions", "link": "https://pubmed.ncbi.nlm.nih.gov/41316735/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 29 Nov 2025"}, {"id": "41290553", "title_en": "Preemptive Versus Postoperative Analgesia in Colorectal Surgery: A Systematic Review and Meta-Analysis", "title_zh": "结直肠手术中的先发性镇痛与术后镇痛：系统评价和荟萃分析", "authors": "Muhammed Elhadi", "abstract_en": "**Background:** Preemptive and preventative methods have been suggested to decrease pain by blocking nociceptive inputs to tissues. Preemptive analgesia has the potential to enhance postoperative recovery in patients undergoing colorectal surgery. This study aimed to evaluate the efficacy and safety of preemptive versus postoperative analgesia in this population.\n\n**Methods:** We systematically searched PubMed, Scopus, Web of Science, and the Cochrane Library from inception to December 2024, and updated the search in May 2025, to identify randomized controlled trials (RCTs) comparing preemptive analgesia with postoperative analgesia in adult patients undergoing colorectal surgery. The primary outcomes were opioid consumption within 24 h, visual analog scale (VAS) pain score at rest at 24 and 48 h postoperatively. Secondary outcomes included adverse events, length of hospital stay, surgery duration (minutes), and postoperative nausea and vomiting (PONV). The Cochrane Risk of Bias 2.0 tool was used to assess risk of bias, and the strength of evidence was graded using the GRADE approach.\n\n**Results:** We identified a total of 2739 records. Seven studies involving 625 patients (312 preemptive and 313 postoperative) met the inclusion criteria. Preemptive analgesia decreased VAS scores at 24 h compared to postoperative analgesia (MD -0.45, 95% CI: -0.89 to -0.01, p = 0.04). However, significant heterogeneity was observed among included studies. Additionally, there was no difference between the two groups regarding VAS at 48 h (MD -0.17, 95% CI -0.43 to 0.09, p = 0.21) and opioid consumption at 24 h (MD -21.17, 95% CI 48.18-5.85, p = 0.12).\n\n**Conclusion:** The findings indicate that preemptive analgesia did not decrease opioid consumption at 24 h; however, it decreased VAS score at 24 h without any difference in VAS at 48 h, length of hospital stay, incidence of PONV, or other adverse events when compared to postoperative analgesia alone in colorectal surgery.\n\n**Trial Registration:** The study is registered in PROSPERO under the registration number CRD420250636020.", "abstract_zh": "**背景：** 已提出先发制人和预防性方法，通过阻止对组织的伤害性输入来减轻疼痛。超前镇痛有可能促进结直肠手术患者的术后恢复。本研究旨在评估先发性镇痛与术后镇痛在这一人群中的有效性和安全性。\n\n**方法：** 我们系统地检索了 PubMed、Scopus、Web of Science 和 Cochrane 图书馆，从开始到 2024 年 12 月，并于 2025 年 5 月更新了检索，以识别在接受结直肠手术的成年患者中比较超前镇痛与术后镇痛的随机对照试验 (RCT)。主要结果是 24 小时内阿片类药物的消耗量、术后 24 小时和 48 小时的视觉模拟量表 (VAS) 静息疼痛评分。次要结局包括不良事件、住院时间、手术持续时间（分钟）和术后恶心和呕吐（PONV）。 Cochrane 偏倚风险 2.0 工具用于评估偏倚风险，并使用 GRADE 方法对证据强度进行分级。\n\n**结果：** 我们总共识别出 2739 条记录。涉及 625 名患者（312 名先发性患者和 313 名术后患者）的 7 项研究符合纳入标准。与术后镇痛相比，超前镇痛在 24 小时降低了 VAS 评分（MD -0.45，95% CI：-0.89 至 -0.01，p = 0.04）。然而，纳入的研究之间观察到显着的异质性。此外，两组之间 48 小时 VAS（MD -0.17，95% CI -0.43 至 0.09，p = 0.21）和 24 小时阿片类药物消耗量（MD -21.17，95% CI 48.18-5.85，p = 0.12）之间没有差异。\n\n**结论：** 研究结果表明，超前镇痛并没有减少 24 小时阿片类药物的消耗；然而，与结直肠手术中单独使用术后镇痛相比，它降低了 24 小时 VAS 评分，但 48 小时 VAS、住院时间、PONV 发生率或其他不良事件没有任何差异。\n\n**Trial registration：** 该研究已在 PROSPERO 中注册，注册号为 CRD420250636020。", "keywords_zh": "结直肠手术、术后镇痛、超前镇痛", "keywords_en": "colorectal surgery, postoperative analgesia, preemptive analgesia", "link": "https://pubmed.ncbi.nlm.nih.gov/41290553/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 25 Nov 2025"}, {"id": "41263625", "title_en": "Regarding: \"Efficacy and safety of methylene blue for postoperative pain of haemorrhoids: a systematic review and meta-analysis\"", "title_zh": "关于：“亚甲蓝治疗痔疮术后疼痛的功效和安全性：系统评价和荟萃分析”", "authors": "Fahmi H Kakamad", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41263625/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 20 Nov 2025"}, {"id": "41223393", "title_en": "Systematic Review of Hyperbaric Oxygen for Late Radiation Tissue Injury (Bowel, Bladder)", "title_zh": "高压氧治疗晚期放射性组织损伤（肠、膀胱）的系统评价", "authors": "Marissa Janine Carter", "abstract_en": "**Background:** This systematic review evaluated comparative studies to determine if hyperbaric oxygen therapy (HBO₂) is beneficial to late radiation tissue injury (LRTI) of the bowel/bladder.\n\n**Methods:** We included adequately powered, comparative studies evaluating the effect of HBO₂ on patients with LRTI (≥3 months duration and/or ≥6 months after radiation therapy) to the bowel/bladder compared to no HBO₂ or placebo/sham; complete outcomes data must have corresponded to the tools used to measure change in LRTI symptoms. Medline was searched through May 4, 2023, Embase through May 29, 2023, and Google Scholar through May 5, 2023. The Cochrane risk-of-bias tool and GRADE approach were used with a certainty of outcomes assessment.\n\n**Results:** Three RCTs were included with 273 subjects. Two double-blinded studies evaluated rectal symptoms; one open study evaluated cystitis. One study had a low risk of bias; two had some concerns. All had moderate certainty of outcomes. There is moderate certainty with a weak recommendation for using HBO₂ for rectal complications or cystitis, which (in context of GRADE terminology) means the decision to treat depends on a case-by-case basis.\n\n**Discussion:** The highly heterogeneous design of the trials made meta-analysis impossible, but moderate certainty of the beneficial effect of HBO₂ on LRTI to the rectum and bladder was confirmed. With the weak recommendation, a discussion should take place between the patient and their physician as to whether or not the patient is likely to benefit from HBO₂.", "abstract_zh": "**背景：** 本系统综述评估了比较研究，以确定高压氧治疗 (HBO 2) 是否有益于肠/膀胱的晚期放射性组织损伤 (LRTI)。\n\n**方法：** 我们纳入了充分有力的比较研究，评估与不使用 HBO 或安慰剂/假手术相比，HBO 2 对 LRTI（持续时间≥3 个月和/或放射治疗后≥6 个月）患者对肠/膀胱的影响；完整的结果数据必须与用于测量 LRTI 症状变化的工具相对应。 Medline 的检索截止日期为 2023 年 5 月 4 日，Embase 的检索截止日期为 2023 年 5 月 29 日，Google Scholar 的检索截止日期为 2023 年 5 月 5 日。使用 Cochrane 偏倚风险工具和 GRADE 方法对结果进行确定性评估。\n\n**结果：** 三项随机对照试验纳入了 273 名受试者。两项双盲研究评估了直肠症状；一项开放研究评估了膀胱炎。一项研究的偏倚风险较低；两个人有一些担忧。所有结果的确定性均为中等。对于使用 HBO 来治疗直肠并发症或膀胱炎有中等程度的确定性和弱推荐，这（在 GRADE 术语的背景下）意味着治疗决定取决于具体情况。\n\n**讨论：** 试验设计的高度异质性使得荟萃分析变得不可能，但 HBO2 对直肠和膀胱 LRTI 的有益作用的中等确定性得到了证实。对于弱建议，患者和医生应就患者是否可能从 HBO2 中受益进行讨论。", "keywords_zh": "LRTI、癌症、慢性伤口、比较研究、膀胱炎、高压氧治疗、直肠炎", "keywords_en": "LRTI, cancer, chronic wounds, comparative studies, cystitis, hyperbaric oxygen therapy, proctitis", "link": "https://pubmed.ncbi.nlm.nih.gov/41223393/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 12 Nov 2025"}, {"id": "41075390", "title_en": "Quality of Life and Functional Outcomes After Watch-and-Wait for Locally Advanced Rectal Cancer: A Meta-analysis", "title_zh": "局部晚期直肠癌观察等待后的生活质量和功能结果：荟萃分析", "authors": "Jonathan S Abelson", "abstract_en": "**Introduction:** Watch-and-wait (W&W), which involves total neoadjuvant therapy followed by close observation, has emerged as an alternative to total mesorectal excision for patients with locally advanced rectal cancer who achieve a clinical or near-complete response. This approach aims to preserve bowel function and avoid the morbidity associated with radical surgery.\n\n**Methods:** This systematic review and meta-analysis followed Preferred Reporting Items for Systematic Reviews and Meta-Analyses and Cochrane guidelines. Eligible studies included randomized trials and observational studies of patients with locally advanced rectal cancer treated with total neoadjuvant therapy, followed by either W&W or total mesorectal excision. The primary outcome was quality of life (QoL), assessed using validated instruments (European Organization for Research and Treatment of Cancer Quality of Life Questionnaire-C30, Quality of Life Questionnaire-CR29, Fecal Incontinence Quality of Life). Secondary outcomes included bowel function among patients without an ostomy, using validated measures such as Cleveland Clinic Florida Fecal Incontinence Scores, Vaizey, Memorial Sloan Kettering Cancer Center, and low anterior resection syndrome scores. A comprehensive search of PubMed, EMBASE, Medline, and Web of Science (Sept 2023-May 2025) was performed without language or date restrictions. Abstract/full-text screening, data extraction, and risk of bias assessments were conducted independently by two reviewers. Meta-analyses used inverse-variance weighting under a random-effects model. Data unsuitable for meta-analysis were synthesized narratively.\n\n**Results:** Of 617 screened studies, 28 were reviewed in full and 9 met inclusion criteria (total 923 patients). Meta-analysis of five studies (n = 601) with no statistically significant difference in overall QoL between groups (pooled mean difference = 0.10, 95% confidence interval: -0.19 to 0.39, P = 0.49). However, pooled analysis of fecal incontinence scores from four studies (n = 384) showed a significant advantage for W&W (pooled mean difference = -1.10, 95% confidence interval: -1.50 to -0.73, P < 0.001). Qualitative synthesis of low anterior resections syndrome scores outcomes favored W&W.\n\n**Conclusions:** W&W, offers a functional advantage without compromising QoL. The decision to pursue W&W should be individualized, considering both the potential functional benefits and the oncological risks.", "abstract_zh": "**介绍：** 观察等待（W＆W）涉及全面新辅助治疗，然后进行密切观察，已成为局部晚期直肠癌患者达到临床或接近完全缓解的全直肠系膜切除的替代方案。这种方法旨在保护肠道功能并避免与根治性手术相关的发病率。\n\n**方法：** 本系统评价和荟萃分析遵循系统评价和荟萃分析的首选报告项目以及 Cochrane 指南。符合条件的研究包括对接受全新辅助治疗、随后进行 W&W 或全直肠系膜切除的局部晚期直肠癌患者进行的随机试验和观察性研究。主要结局是生活质量（QoL），使用经过验证的仪器（欧洲癌症研究和治疗组织生活质量问卷-C30、生活质量问卷-CR29、大便失禁生活质量）进行评估。次要结局包括未进行造口术的患者的肠道功能，使用经过验证的措施，如克利夫兰诊所佛罗里达大便失禁评分、Vaizey、纪念斯隆凯特琳癌症中心和低前切除综合征评分。对 PubMed、EMBASE、Medline 和 Web of Science（2023 年 9 月至 2025 年 5 月）进行了全面检索，没有语言或日期限制。摘要/全文筛选、数据提取和偏倚风险评估由两名评审员独立进行。荟萃分析在随机效应模型下使用逆方差加权。不适合荟萃分析的数据以叙述方式合成。\n\n**结果：** 在 617 项筛选研究中，28 项经过全面审查，9 项符合纳入标准（总共 923 名患者）。对五项研究 (n = 601) 进行荟萃分析，组间总体生活质量无统计学显着差异（汇总平均差 = 0.10，95% 置信区间：-0.19 至 0.39，P = 0.49）。然而，四项研究 (n = 384) 的大便失禁评分汇总分析显示 W&W 具有显着优势（汇总平均差 = -1.10，95% 置信区间：-1.50 至 -0.73，P < 0.001）。低位前切除综合征评分结果的定性综合有利于 W&W。\n\n**结论：** W&W 在不影响生活质量的情况下提供功能优势。追求 W&W 的决定应该因人而异，同时考虑潜在的功能益处和肿瘤风险。", "keywords_zh": "局部晚期直肠癌，荟萃分析，生活质量，系统评价，观察等待", "keywords_en": "Locally advanced rectal cancer, Meta-analysis, Quality of life, Systematic review, Watch-and-wait", "link": "https://pubmed.ncbi.nlm.nih.gov/41075390/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 11 Oct 2025"}, {"id": "41023221", "title_en": "Single-incision laparoscopic endorectal pull-through for Hirschsprung disease: a prospective institutional study and systematic review with meta-analysis", "title_zh": "单切口腹腔镜直肠内牵引治疗先天性巨结肠：前瞻性机构研究和荟萃分析系统评价", "authors": "Quang Thanh Nguyen", "abstract_en": "**Background:** Single-incision laparoscopic endorectal pull-through (SILEP) has emerged as an alternative to conventional laparoscopic surgery for Hirschsprung disease (HSCR), offering improved cosmetic outcomes with comparable efficacy. However, its adoption remains limited, and evidence supporting its long-term safety and functional outcomes is sparse. This study presents our institutional experience with SILEP, alongside a systematic review and meta-analysis evaluating perioperative outcomes, postoperative complications, bowel function, and cosmesis.\n\n**Patients And Methods:** A prospective study was conducted at our institution involving 93 pediatric patients diagnosed with HSCR, who underwent SILEP between 2020 and 2021. Demographic data, perioperative details, and postoperative outcomes, including bowel function score (Rintala) and cosmetic results (Manchester Scar Scale), were prospectively collected and analyzed. Additionally, a systematic review and meta-analysis were performed following PRISMA guidelines, pooling data from nine studies comprising 420 patients.\n\n**Results:** The mean operative time was 70.0 ± 30.3 min, significantly shorter than the pooled estimate from the meta-analysis (166.44 min; 95% CI 137.74-195.14, p < 0.001). No intraoperative complications or conversions were recorded. The mean hospital stay was 5.23 ± 2.69 days, consistent with prior reports. Enterocolitis occurred in 16.1% of cases, comparable to the pooled estimate (12%; 95% CI 7-21%). Among patients aged ≥ 4 years (n = 64), 84% achieved good to excellent bowel function scores. The mean Manchester Scar Score was 5.73 ± 1.38.\n\n**Conclusion:** SILEP is a safe, effective, and cosmetically superior approach for HSCR, with favorable perioperative outcomes and functional results. Our findings, supported by meta-analysis data, reinforce the feasibility of SILEP as a viable alternative for HSCR management.", "abstract_zh": "**背景：** 单切口腹腔镜直肠内拉穿术 (SILEP) 已成为治疗先天性巨结肠 (HSCR) 的传统腹腔镜手术的替代方案，可提供改善的美容效果且疗效相当。然而，它的采用仍然有限，并且支持其长期安全性和功能结果的证据很少。本研究介绍了我们在 SILEP 方面的机构经验，以及评估围手术期结果、术后并发症、肠道功能和美容的系统回顾和荟萃分析。\n\n**Patients and methods：** 我们的机构进行了一项前瞻性研究，涉及 93 名诊断为 HSCR 的儿童患者，这些患者在 2020 年至 2021 年间接受了 SILEP。前瞻性收集和分析了人口统计数据、围手术期详细信息和术后结果，包括肠功能评分 (Rintala) 和美容结果（曼彻斯特疤痕量表）。此外，还按照 PRISMA 指南进行了系统回顾和荟萃分析，汇集了涉及 420 名患者的 9 项研究的数据。\n\n**结果：** 平均手术时间为 70.0±30.3 分钟，明显短于荟萃分析的汇总估计时间（166.44 分钟；95% CI 137.74-195.14，p<0.001）。没有记录术中并发症或转化。平均住院时间为 5.23±2.69 天，与之前的报告一致。 16.1% 的病例发生小肠结肠炎，与汇总估计值相当（12%；95% CI 7-21%）。在年龄 ≥ 4岁的患者中（n = 64），84%的人取得了良好至优秀的肠道功能评分。平均曼彻斯特疤痕评分为 5.73±1.38。\n\n**结论：** SILEP 是一种安全、有效且美观的 HSCR 方法，具有良好的围手术期结果和功能结果。我们的研究结果得到荟萃分析数据的支持，强化了 SILEP 作为 HSCR 管理的可行替代方案的可行性。", "keywords_zh": "肠道功能，先天性巨结肠，腹腔镜，荟萃分析，单切口，Soave 手术", "keywords_en": "Bowel function, Hirschsprung’s disease, Laparoscopic, Meta-analysis, Single-incision, Soave procedure", "link": "https://pubmed.ncbi.nlm.nih.gov/41023221/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 29 Sep 2025"}, {"id": "40972340", "title_en": "Postoperative physiotherapy in enhanced recovery pathways: A general surgery evidence update, dominated by colorectal studies", "title_zh": "加速康复路径中的术后物理治疗：以结直肠研究为主的普外科证据更新", "authors": "Thomas W Wainwright", "abstract_en": "**Introduction:** Physiotherapy is a pivotal component of enhanced recovery protocols, particularly in initiating early mobilisation and supporting the return to functional independence. Despite this, there is a lack of guidance on optimal post-mobilisation physiotherapy strategies. This systematic review aims to synthesise and critically appraise the most recent evidence on postoperative physiotherapy interventions within enhanced recovery pathways for general surgical patients. This review seeks to advance scientific understanding and provide guidance for the optimisation of physiotherapy practice within enhanced recovery pathways.\n\n**Materials And Methods:** A systematic review of the literature between 2000 and 2024 was conducted to identify studies of physiotherapy interventions in general surgical populations following an enhanced recovery protocol.\n\n**Results:** Ten studies met the inclusion criteria. Six studies were conducted in colorectal patients, one study (plus a secondary analysis) was conducted in radical cystectomy patients, one in head and neck patients undergoing oncologic resection, and one included a mixed patient sample (colon, rectum, stomach, pancreas and liver surgery). Interventions involving early physiotherapy were found to benefit postoperative walking distance, achievement of activities of daily living and length of stay in hospital. There was mixed evidence for influence on readiness for discharge, quality of recovery measures and health-related quality of life. No consistent effects were observed for inpatient satisfaction or functional outcome.\n\n**Conclusion:** This review supports the feasibility and potential benefits of a structured physiotherapy interventions within enhanced recovery protocols. These results highlight the potential for structured mobilisation interventions to enhance recovery, particularly when supported by education and technology-based strategies.", "abstract_zh": "**介绍：** 物理治疗是加速康复方案的关键组成部分，特别是在启动早期活动和支持恢复功能独立方面。尽管如此，仍缺乏关于最佳动员后物理治疗策略的指导。本系统综述旨在综合并严格评估普通外科患者加速康复途径术后物理治疗干预的最新证据。本综述旨在增进科学理解，并为加速康复途径中物理治疗实践的优化提供指导。\n\n**材料与方法：** 对 2000 年至 2024 年期间的文献进行了系统回顾，以确定在加速康复方案后对普通手术人群进行物理治疗干预的研究。\n\n**结果：** 十项研究符合纳入标准。六项研究在结直肠患者中进行，一项研究（加上二次分析）是在根治性膀胱切除术患者中进行的，一项研究是在接受肿瘤切除术的头颈部患者中进行的，一项研究包括混合患者样本（结肠、直肠、胃、胰腺和肝脏手术）。研究发现，涉及早期物理治疗的干预措施有利于术后步行距离、日常生活活动的完成度和住院时间。对于出院准备、康复措施质量和健康相关生活质量的影响，证据不一。对于住院患者满意度或功能结果没有观察到一致的效果。\n\n**结论：** 这篇综述支持了强化康复方案中结构化物理治疗干预措施的可行性和潜在益处。这些结果凸显了结构化动员干预措施在促进康复方面的潜力，特别是在教育和技术战略的支持下。", "keywords_zh": "加速康复外科 (ERAS)、活动、物理治疗、恢复、康复、手术", "keywords_en": "Enhanced recovery after surgery (ERAS), Mobilisation, Physiotherapy, Recovery, Rehabilitation, Surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40972340/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 19 Sep 2025"}, {"id": "40968352", "title_en": "Stroke risk in cancer survivors: A meta-analysis and meta regression", "title_zh": "癌症幸存者的中风风险：荟萃分析和荟萃回归", "authors": "Rommel Mario Rodríguez Burbano", "abstract_en": "**Introduction:** It is suggested that survivors of different types of cancer may have an increased risk of stroke. Our study aims to evaluate cancer patients and non-cancer controls by analyzing stroke events in each group. Previous studies concluded that certain types of cancer increased stroke risk, however, their results had significant heterogeneity and statistical concerns.\n\n**Methods:** Medline, Embase, and Cochrane databases were systematically searched until February 18th, 2024, assessing stroke in cancer survivor patients compared to the global population. Data were examined using the Mantel-Haenszel method and 95% CIs. Heterogeneity was assessed using I² statistics. Rstudio software, version 4.2.3., was used for statistical analysis.\n\n**Results:** A total of 18 studies were included, and stroke was reported in both cancer and non-cancer groups. Breast cancer (HR 1.09; 95% CI 1.02-1.17; p = 0.01; I²= 0%), Central Nervous System cancers (HR 2.47; 95% CI 1.01-6.01; p = 0.047; I²= 78%), cervical cancers (HR 1.58; 95% CI 1.19-2.09; p = 0.001; I²= 0%), head and neck cancers (HR 1.4439; 95% CI 1.3095-1.5922; p < 0.001; I²=31.5%), lung cancers (HR 1.60; 95% CI 1.40-1.83; p < 0.001; I²=67%), multiple myeloma (HR 1.58; 95% CI 1.32-1.89; p < 0.001; I²= 49%), nasopharyngeal cancers (HR 1.9178; 95% CI 1.3358-2.7533; p < 0.001; I²=89.7%), oesophageal cancers (HR 1.33; 95% CI 1.07-1.65; p = 0.009; I²= 0%), ovarian cancers (HR 1.33; 95% CI 1.07-1.65; p = 0.01; I²= 38%), pancreatic cancers (HR 2,70; 95% CI 2.34-3.11; p < 0.001; I²= 0%) and rectum cancers (HR 1.29; 95% CI 1.01-1.63; p = 0.04; I²= 0%) showed statistically significant differences between groups in favor of non-cancer controls.\n\n**Conclusions:** In this meta-analysis, the stroke risk was increased in all cancers that reached statistical significance. Furthermore, our study brings relevant data to the body of literature concerning this long-term clinical uncertainty.", "abstract_zh": "**介绍：** 研究表明，不同类型癌症的幸存者患中风的风险可能会增加。我们的研究旨在通过分析每组的中风事件来评估癌症患者和非癌症对照。先前的研究得出的结论是，某些类型的癌症会增加中风风险，然而，他们的结果存在显着的异质性和统计问题。\n\n**方法：** 截至 2024 年 2 月 18 日，对 Medline、Embase 和 Cochrane 数据库进行了系统检索，评估了癌症幸存者患者中风与全球人口的情况。使用 Mantel-Haenszel 方法和 95% CI 检查数据。使用 I² 统计数据评估异质性。使用Rstudio软件4.2.3版进行统计分析。\n\n**结果：** 总共纳入了 18 项研究，癌症组和非癌症组均报告了中风。乳腺癌（HR 1.09；95% CI 1.02-1.17；p = 0.01；I²= 0%）、中枢神经系统癌症（HR 2.47；95% CI 1.01-6.01；p = 0.047；I²= 78%）、宫颈癌（HR 1.58；95% CI 1.19-2.09；p = 0.001；I²= 0%）、头颈癌（HR 1.4439；95% CI 1.3095-1.5922；p < 0.001；I²=31.5%）、肺癌（HR 1.60；95% CI 1.40-1.83；p< 0.001；I²=67%）、多发性骨髓瘤（HR 1.58；95% CI 1.32-1.89；p< 0.001；I²= 49%）、鼻咽癌（HR 1.9178；95% CI 1.3358-2.7533；p < 0.001；I²=89.7%）、食道癌（HR 1.33；95% CI 1.07-1.65；p = 0.009；I²= 0%）、卵巢癌（HR 1.33；95% CI 1.07-1.65；p = 0.01；I²= 38%）、胰腺癌（HR 2.70；95% CI 2.34-3.11；p < 0.001；I²= 0%）和直肠癌（HR 1.29；95% CI 1.01-1.63； p = 0.04；I²= 0%）显示组间存在统计学显着差异，有利于非癌症对照。\n\n**结论：** 在这项荟萃分析中，所有癌症的中风风险均增加，并达到统计学显着性。此外，我们的研究为有关这种长期临床不确定性的文献提供了相关数据。", "keywords_zh": "癌症幸存者、荟萃分析、中风风险", "keywords_en": "Cancer survivors, Meta-Analysis, Stroke risk", "link": "https://pubmed.ncbi.nlm.nih.gov/40968352/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 19 Sep 2025"}, {"id": "40956186", "title_en": "Clinicopathological characteristics and biomarker alterations in early-onset vs. late-onset colorectal cancer: a systematic review and meta-analysis", "title_zh": "早发性结直肠癌与晚发性结直肠癌的临床病理学特征和生物标志物变化：系统评价和荟萃分析", "authors": "Lie Yang", "abstract_en": "**Background:** The clinicopathological and molecular characteristics of early-onset colorectal cancer (EOCRC) are unclear. In this study, we compared the clinicopathological features, biomarkers, and prognoses between EOCRC and late-onset colorectal cancer (LOCRC).\n\n**Methods:** A search was conducted on PubMed, Web of Science, Embase, and Cochrane Library from inception to May 2024. The key outcomes were clinicopathological features, prevalence of molecular biomarker alterations, and 5-year overall survival (OS), with pooled odds ratios (ORs) and hazard ratios (HRs), along with their corresponding 95% confidence intervals (CIs), calculated for each outcome.\n\n**Results:** Forty studies were included in the final analysis. EOCRC exhibited distal colon and rectum localization (OR: 0.59; 95% CI: 0.55-0.62; P < 0.001), was poorly differentiated (OR: 0.56; 95% CI: 0.52-0.60; P = 0.01), tended to be more mucinous or signet-ring cell carcinoma (OR: 0.56; 95% CI: 0.52-0.60; P < 0.001), and was associated with advanced stages (OR: 1.49; 95% CI: 1.30-1.71; P < 0.001), lymph node metastasis (LNM) (OR: 0.56; 95% CI: 0.53-0.60; P < 0.001), and distant metastasis (OR: 1.29; 95% CI: 1.04-1.60; P = 0.02). EOCRC exhibited higher TP53 mutation rates (OR: 1.33; 95% CI: 1.13-1.58; P < 0.001), MSI-H status (OR: 1.45; 95% CI: 1.10-1.92; P = 0.01), but lower PIK3CA mutation rates (OR: 0.93; 95% CI: 0.88-0.99; P = 0.03). EOCRC and LOCRC had similar 5-year OS rates (HR: 1.01; 95% CI: 0.79-1.30; P = 0.92). Although no significant difference was observed in the APC, BRAF, KRAS, NRAS, SM4D4, and MMR, subgroup analyses revealed that BRAF ( P = 0.01), KRAS mutations ( P < 0.001), and DNA hypermethylation ( P = 0.01) were less prevalent among westerners.\n\n**Conclusion:** EOCRC often presents with more aggressive and metastatic features due to its frequent diagnosis at advanced stages. TP53 mutations and the MSI-H status are prevalent in EOCRC. EOCRC's prognosis is often comparable to LOCRC. Radical and tailored treatment strategies should be developed to improve the survival outcomes in advanced and metastatic EOCRC.", "abstract_zh": "**背景：** 早发性结直肠癌（EOCRC）的临床病理学和分子特征尚不清楚。在这项研究中，我们比较了 EOCRC 和晚发结直肠癌 (LOCRC) 的临床病理特征、生物标志物和预后。\n\n**方法：** 从开始到 2024 年 5 月，我们在 PubMed、Web of Science、Embase 和 Cochrane 图书馆上进行了检索。主要结果是临床病理学特征、分子生物标记物改变的发生率和 5 年总生存率 (OS)，以及针对每个结果计算的汇总比值比 (OR) 和风险比 (HR) 及其相应的 95% 置信区间 (CI)。\n\n**结果：** 最终分析中纳入了四十项研究。 EOCRC 表现出远端结肠和直肠定位（OR：0.59；95% CI：0.55-0.62；P < 0.001），分化不良（OR：0.56；95% CI：0.52-0.60；P = 0.01），倾向于更多粘液性或印戒细胞癌（OR：0.56；95% CI： 0.52-0.60；P < 0.001），并且与晚期（OR：1.49；95% CI：1.30-1.71；P < 0.001）、淋巴结转移（LNM）（OR：0.56；95% CI：0.53-0.60；P < 0.001）和远处转移（OR： 1.29；95% CI：1.04-1.60；P = 0.02）。 EOCRC 表现出较高的 TP53 突变率（OR：1.33；95% CI：1.13-1.58；P < 0.001）、MSI-H 状态（OR：1.45；95% CI：1.10-1.92；P = 0.01），但 PIK3CA 突变率较低（OR：0.93；95% CI： 0.88-0.99；P = 0.03）。 EOCRC 和 LOCRC 的 5 年 OS 率相似（HR：1.01；95% CI：0.79-1.30；P = 0.92）。尽管APC、BRAF、KRAS、NRAS、SM4D4和MMR没有观察到显着差异，但亚组分析显示BRAF（P=0.01）、KRAS突变（P<0.001）和DNA高甲基化（P=0.01）在西方人中较少见。\n\n**结论：** 由于 EOCRC 经常在晚期诊断，因此通常表现出更具侵袭性和转移性的特征。 TP53 突变和 MSI-H 状态在 EOCRC 中普遍存在。 EOCRC 的预后通常与 LOCRC 相当。应制定根治性和量身定制的治疗策略，以改善晚期和转移性 EOCRC 的生存结果。", "keywords_zh": "临床病理特征, 结直肠癌, 早发型, 分子生物标志物, 生存", "keywords_en": "clinicopathological features, colorectal cancer, early-onset, molecular biomarker, survival", "link": "https://pubmed.ncbi.nlm.nih.gov/40956186/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 16 Sep 2025"}, {"id": "40944330", "title_en": "Efficacy and safety of methylene blue for postoperative pain of haemorrhoids: a systematic review and meta-analysis", "title_zh": "亚甲蓝治疗痔疮术后疼痛的疗效和安全性：系统评价和荟萃分析", "authors": "Li Xu", "abstract_en": "**Objectives:** Pain is a common complication after haemorrhoid surgery. In addition to anaesthetic methods, surgical techniques and postoperative interventions, surgeons also use intraoperative adjuncts to alleviate postoperative pain. This study aims to evaluate the effectiveness and safety of methylene blue in reducing postoperative pain in haemorrhoid patients.\n\n**Methods:** A search was conducted in PubMed, Embase, Cochrane Library and Web of Science for randomized controlled trials (RCTs) up until 9 December 2024, involving methylene blue use for pain relief after haemorrhoid surgery. Two reviewers independently assessed the study eligibility, extracted data and evaluated the risk of bias. Data analysis was performed using Stata 18 software. The primary outcome was the visual analogue scale (VAS) pain scores at different time points within 14 days postoperatively. Secondary outcomes included the number of patients requiring analgesics and the occurrence of complications.\n\n**Results:** 358 articles were retrieved and six studies involving 598 patients were included after screening. Compared with the control group, the use of methylene blue reduced pain within 12 h postoperatively(WMD -1.582, 95% CI -2.834 to -0.330, <i>p</i> = .013), as well as on day 2 (WMD -1.441, 95% CI - 1.874 to -1.008, <i>p</i> < .0001), day 3 (WMD -0.975, 95% CI -1.309 to -0.641, <i>p</i> < .0001), day 5(WMD -0.786, 95% CI -1.094 to -0.478, <i>p</i> = .028) and day 7 (WMD -0.679, 95% CI -1.257 to -0.101, <i>p</i> = .021), decreased the number of patients using analgesics(RR 0.293, 95% CI 0.203 to 0.422, <i>p</i> < .0001) and did not increase the incidence of complications(RR 0.65, 95% CI 0.39-1.10, <i>p</i> = .111) such as urinary retention, secondary haemorrhage, pruritus, temporary incontinence, wound infection, or local skin reactions.\n\n**Conclusions:** This study shows that methylene blue can reduce postoperative pain, decrease analgesic use and does not increase complications after haemorrhoid surgery.", "abstract_zh": "**Objectives：** 疼痛是痔疮手术后常见的并发症。除了麻醉方法、手术技术和术后干预外，外科医生还使用术中辅助手段来减轻术后疼痛。本研究旨在评估亚甲蓝减轻痔疮患者术后疼痛的有效性和安全性。\n\n**方法：** 在 PubMed、Embase、Cochrane 图书馆和 Web of Science 中检索了截至 2024 年 12 月 9 日的随机对照试验 (RCT)，涉及亚甲蓝用于缓解痔疮手术后的疼痛。两名评审员独立评估研究资格、提取数据并评估偏倚风险。使用Stata 18软件进行数据分析。主要结果是术后14天内不同时间点的视觉模拟评分（VAS）疼痛评分。次要结局包括需要镇痛药的患者数量和并发症的发生率。\n\n**结果：** 筛选后共检索到 358 篇文章，纳入 6 项涉及 598 名患者的研究。与对照组相比，使用亚甲基蓝可减轻术后 12 小时内的疼痛（WMD -1.582，95% CI -2.834 至 -0.330，<i>p</i> = .013）以及第 2 天（WMD -1.441，95% CI -1.874 至 -1.008， <i>p</i> < .0001），第 3 天（WMD -0.975，95% CI -1.309 至 -0.641，<i>p</i> < .0001），第 5 天（WMD -0.786，95% CI -1.094 至 -0.478， <i>p</i> = .028）和第7天（WMD -0.679，95% CI -1.257至-0.101，<i>p</i> = .021），使用镇痛药的患者数量减少（RR 0.293，95% CI 0.203至0.422， <i>p</i> < .0001），并且不会增加尿潴留、继发性出血、瘙痒、暂时失禁、伤口感染或局部皮肤反应等并发症的发生率（RR 0.65，95% CI 0.39-1.10，<i>p</i> = .111）。\n\n**结论：** 这项研究表明，亚甲蓝可以减轻术后疼痛，减少镇痛药的使用，并且不会增加痔疮手术后的并发症。", "keywords_zh": "镇痛，痔疮切除术，亚甲蓝，术后疼痛", "keywords_en": "Analgesia, haemorrhoidectomy, methylene blue, postoperative pain", "link": "https://pubmed.ncbi.nlm.nih.gov/40944330/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 13 Sep 2025"}, {"id": "40914745", "title_en": "Robotic versus laparoscopic total mesorectal excision for mid-low rectal cancer after neoadjuvant chemoradiotherapy: a systematic review and meta-analysis of oncological, perioperative, and survival-related outcomes", "title_zh": "新辅助放化疗后机器人与腹腔镜全直肠系膜切除术治疗中低位直肠癌：肿瘤学、围手术期和生存相关结果的系统评价和荟萃分析", "authors": "Shukai Wang", "abstract_en": "A major cause of cancer death, colorectal cancer is becoming more common in younger people. The comparative effectiveness of robotic versus laparoscopic total mesorectal excision (TME) as surgical interventions for mid-low rectal cancer following neoadjuvant chemoradiotherapy (nCRT) remains uncertain. To systematically evaluate oncological, perioperative, and survival outcomes of robotic versus laparoscopic surgery for mid-low rectal cancer following nCRT. A PRISMA-compliant systematic review and meta-analysis included 20 non-randomized studies (13,212 patients) from Web of Science, PubMed, and Embase up to July 2025. Outcomes encompassed pathological completeness (circumferential resection margin, TME quality), perioperative metrics (operative duration, conversion rates), complications, and survival (5-year OS/DFS). Risk of bias was assessed via ROBINS-I; statistical synthesis utilized RevMan5.4 and hazard ratios derived from Kaplan-Meier curves. This meta-analysis of 20 non-randomized studies (13,212 patients) found no significant differences in 5-year overall survival (HR: 1.07, 95% CI 0.20-5.66, p = 0.94, I<sup>2</sup> = 98%) or disease-free survival (HR: 1.16, 95% CI 0.72-1.89, p = 0.54, I<sup>2</sup> = 0%) between robotic and laparoscopic TME after nCRT. Robotic surgery demonstrated superior technical outcomes, including higher rates of complete TME (OR: 1.97, p = 0.02) and reduced conversion to open surgery (OR: 0.46, p < 0.001), but required significantly longer operative time (WMD: + 42.09 min, p < 0.001). Perioperative metrics showed equivalence in intraoperative blood loss (p = 0.20), hospitalization duration (p = 0.78), and postoperative complications, including anastomotic leakage (5.4% vs. 6.5%, p = 0.28) and Clavien-Dindo III-IV events (OR: 1.11, p = 0.54). Pathological outcomes were comparable, with no differences in circumferential resection margin positivity (OR: 1.0, p = 1), distal margin length (p = 0.92), or lymph-node yield (p = 0.55). Local (OR: 0.85, p = 0.34) and distant recurrence rates (p = 0.99) were statistically indistinguishable. Risk-of-bias assessment revealed confounding risks in non-randomized designs, underscoring the need for RCT validation. Robotic and laparoscopic TME achieve equivalent long-term survival and oncological control after nCRT, with robotic advantages in technical precision counterbalanced by prolonged operative duration. The equivalence underscores nCRT's dominant role in tumor control, while procedural differences highlight context-dependent surgical feasibility. High heterogeneity in survival data and reliance on non-randomized evidence necessitate validation through rigorously designed RCTs incorporating standardized protocols and patient-reported functional outcomes.", "abstract_zh": "作为癌症死亡的主要原因，结直肠癌在年轻人中变得越来越常见。机器人与腹腔镜全直肠系膜切除术（TME）作为新辅助放化疗（nCRT）后中低位直肠癌手术干预的效果仍不确定。系统评估 nCRT 后机器人与腹腔镜手术治疗中低位直肠癌的肿瘤学、围手术期和生存结果。符合 PRISMA 标准的系统评价和荟萃分析包括截至 2025 年 7 月来自 Web of Science、PubMed 和 Embase 的 20 项非随机研究（13,212 名患者）。结果包括病理完整性（圆周切除边缘、TME 质量）、围手术期指标（手术持续时间、转换率）、并发症和生存率（5 年 OS/DFS）。通过 ROBINS-I 评估偏倚风险；统计综合利用 RevMan5.4 和源自 Kaplan-Meier 曲线的风险比。这项对 20 项非随机研究（13,212 名患者）的荟萃分析发现，5 年总生存率（HR：1.07，95% CI 0.20-5.66，p = 0.94，I<sup>2</sup> = 98%）或无病生存率（HR：1.16，95% CI）没有显着差异nCRT 后机器人 TME 与腹腔镜 TME 之间的差异为 0.72-1.89，p = 0.54，I<sup>2</sup> = 0%)。机器人手术表现出优越的技术成果，包括更高的完全 TME 率（OR：1.97，p = 0.02）和减少中转开放手术（OR：0.46，p < 0.001），但需要明显更长的手术时间（WMD： + 42.09 分钟，p < 0.001）。围手术期指标显示术中失血量 (p = 0.20)、住院时间 (p = 0.78) 和术后并发症，包括吻合口瘘（5.4% vs. 6.5%，p = 0.28）和 Clavien-Dindo III-IV 事件（OR：1.11，p = 0.54）等方面的等效性。病理结果具有可比性，环周切缘阳性率（OR：1.0，p = 1）、远端切缘长度（p = 0.92）或淋巴结产量（p = 0.55）没有差异。局部复发率（OR：0.85，p = 0.34）和远处复发率（p = 0.99）在统计学上无法区分。偏倚风险评估揭示了非随机设计中的混杂风险，强调了 RCT 验证的必要性。机器人和腹腔镜 TME 在 nCRT 后实现了同等的长期生存和肿瘤控制，机器人在技术精度方面的优势被延长的手术时间所抵消。这种等同性强调了 nCRT 在肿瘤控制中的主导作用，而程序差异则强调了手术可行性。生存数据的高度异质性和对非随机证据的依赖需要通过严格设计的随机对照试验（结合标准化方案和患者报告的功能结果）进行验证。", "keywords_zh": "腹腔镜手术、Meta分析、中低位直肠癌、新辅助放化疗、机器人手术、全直肠系膜切除术", "keywords_en": "Laparoscopic surgery, Meta-analysis, Mid–low rectal cancer, Neoadjuvant chemoradiotherapy, Robotic surgery, Total mesorectal excision", "link": "https://pubmed.ncbi.nlm.nih.gov/40914745/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 06 Sep 2025"}, {"id": "40907429", "title_en": "ICG-FA for Anastomotic Leak Prevention During Minimally Invasive Colorectal Surgery: A Meta-analysis", "title_zh": "ICG-FA 在微创结直肠手术期间预防吻合口漏：荟萃分析", "authors": "Muhammad Shehryar Hussain", "abstract_en": "**Introduction:** Anastomotic leakage is a serious complication after colorectal surgery. Indocyanine green fluorescence angiography (ICG-FA) allows real-time perfusion assessment and may reduce leak rates; however, recent larger randomized clinical trials reported conflicting results. This meta-analysis aimed to clarify the effectiveness of ICG-FA in reducing anastomotic leakage and related complications following minimally invasive colorectal surgery.\n\n**Methods:** We conducted a comprehensive search across the databases to identify relevant studies. The search results were imported into Covidence for article eligibility screening, and all relevant outcomes data were synthesized using risk ratios (RRs) or mean differences with 95% confidence intervals (CIs) in meta-analysis models using RevMan 5.4. CRD420251031138.\n\n**Results:** Six randomized clinical trials involving 3264 participants were included. ICG-FA significantly reduced the risk of overall anastomotic leakage (RR: 0.66, 95% CI [0.53-0.83], P = 0.0005) and complications (RR: 0.88, 95% CI [0.78-0.99], P = 0.03). Subgroup analysis showed a significant reduction in leakage for left-sided anastomoses (RR: 0.57, 95% CI [0.44-0.75], P < 0.0001) but not for right-sided ones (RR: 0.90, 95% CI [0.53-1.51], P = 0.68). No significant differences were found in Clavien-Dindo ≥3 complications, reoperation rates, or hospital stay. However, the ICG-FA group had a longer operation time (mean difference: 5.57, 95% CI [1.56-9.58], P = 0.006).\n\n**Conclusions:** ICG-FA significantly reduces anastomotic leakage and overall complications in minimally invasive colorectal surgery, especially for left-sided anastomoses. However, its use is associated with a slightly longer operative time. Further research is needed to confirm its role in right-sided procedures and long-term outcomes.", "abstract_zh": "**介绍：** 吻合口漏是结直肠手术后的严重并发症。吲哚菁绿荧光血管造影（ICG-FA）可进行实时灌注评估，并可降低渗漏率；然而，最近更大规模的随机临床试验报告了相互矛盾的结果。这项荟萃分析旨在阐明 ICG-FA 在减少微创结直肠手术后吻合口瘘和相关并发症方面的有效性。\n\n**方法：** 我们对数据库进行了全面搜索，以确定相关研究。将搜索结果导入 Covidence 进行文章资格筛选，并使用 RevMan 5.4 在荟萃分析模型中使用风险比 (RR) 或平均差与 95% 置信区间 (CI) 合成所有相关结果数据。 CRD420251031138。\n\n**结果：** 其中包括 6 项随机临床试验，涉及 3264 名参与者。 ICG-FA 显着降低了总体吻合口瘘（RR：0.66，95% CI [0.53-0.83]，P = 0.0005）和并发症（RR：0.88，95% CI [0.78-0.99]，P = 0.03）的风险。亚组分析显示左侧吻合术的渗漏显着减少（RR：0.57，95% CI [0.44-0.75]，P < 0.0001），但右侧吻合术的渗漏没有显着减少（RR：0.90，95% CI [0.53-1.51]，P = 0.68）。 Clavien-Dindo ≥3 种并发症、再手术率或住院时间没有显着差异。然而，ICG-FA组的手术时间较长（平均差：5.57，95% CI [1.56-9.58]，P = 0.006）。\n\n**结论：** ICG-FA 显着减少微创结直肠手术中的吻合口瘘和总体并发症，尤其是左侧吻合术。然而，其使用会导致手术时间稍长。需要进一步的研究来确认其在正确程序和长期结果中的作用。", "keywords_zh": "吻合口漏、结直肠手术、荧光血管造影、ICG、吲哚菁绿、Meta分析、微创手术", "keywords_en": "Anastomotic leakage, Colorectal surgery, Fluorescence angiography, ICG, Indocyanine green, Meta-analysis, Minimally invasive surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40907429/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Sep 2025"}, {"id": "40905480", "title_en": "Neoadjuvant Chemotherapy Without Radiation for Locally Advanced Rectal Cancer: A Meta-analysis of Surgical Outcomes After Total Mesorectal Excision", "title_zh": "局部晚期直肠癌无放射新辅助化疗：全直肠系膜切除后手术结果的荟萃分析", "authors": "Dean A Fergusson", "abstract_en": "**Background:** Neoadjuvant chemotherapy alone (with radiation omission) for locally advanced rectal cancer has been evaluated in several randomized controlled trials. Although oncologic outcomes have been well described, the impact of this treatment strategy on surgical outcomes is unknown.\n\n**Objective:** To evaluate how important surgical outcomes were reported in previous trials comparing neoadjuvant chemotherapy to chemoradiation therapy for locally advanced rectal cancer and to perform a meta-analysis of available data.\n\n**Data Sources:** A systematic review was conducted using MEDLINE, Embase, and the Cochrane Library Databases.\n\n**Study Selection:** All published randomized controlled trials that compared neoadjuvant chemotherapy to chemoradiation for MRI-staged rectal adenocarcinoma.\n\n**Interventions:** Neoadjuvant chemotherapy alone (with radiation omission).\n\n**Main Outcome Measures:** Postoperative surgical outcomes, including anastomotic leak, diverting ostomy use, ostomy nonreversal, 30-day postoperative morbidity, and postoperative bowel function.\n\n**Results:** Four randomized controlled trials met eligibility criteria and were included for data analysis. Oncologic outcomes demonstrated that neoadjuvant chemotherapy was equivalent or noninferior to chemoradiation therapy. Anastomotic leak and use of diverting ostomy were reported in 3 of the 4 trials, whereas 30-day postoperative morbidity and ostomy nonreversal were reported in only 2 trials. Bowel function was measured in 3 trials but was measured and reported differently in each trial. On meta-analysis, neoadjuvant chemotherapy was associated with a significant reduction in anastomotic leak (relative risk [RR] 0.54; 95% CI, 0.35-0.81), use of diverting ostomy (RR 0.79; 95% CI, 0.70-0.88), and ostomy nonreversal (RR 0.37; 95% CI, 0.15-0.93). There was no association between neoadjuvant chemotherapy and 30-day postoperative morbidity (RR 0.88; 95% CI, 0.53-1.45).\n\n**Limitations:** A small number of included trials with heterogeneity in outcome definitions was the limitation.\n\n**Conclusions:** Important surgical outcomes were not reported in trials comparing neoadjuvant chemotherapy alone to chemoradiation therapy for locally advanced rectal cancer. Based on the limited data available, chemotherapy alone was associated with reduced risk of anastomotic leak, diverting ostomy use, and ostomy nonreversal. See Video Abstract .", "abstract_zh": "**背景：** 多项随机对照试验已对单独新辅助化疗（省略放疗）治疗局部晚期直肠癌进行了评估。尽管肿瘤学结果已得到很好的描述，但这种治疗策略对手术结果的影响尚不清楚。\n\n**目的：** 评估先前比较新辅助化疗与放化疗治疗局部晚期直肠癌的试验中报告的手术结果的重要性，并对现有数据进行荟萃分析。\n\n**Data sources：** 使用 MEDLINE、Embase 和 Cochrane 图书馆数据库进行了系统评价。\n\n**Study selection：** 所有已发表的随机对照试验都对 MRI 分期直肠腺癌的新辅助化疗与放化疗进行了比较。\n\n**Interventions：** 单独新辅助化疗（省略放射治疗）。\n\n**Main outcome measures：** 术后手术结果，包括吻合口瘘、分流造口术的使用、造口术不可逆转、术后 30 天的发病率和术后肠功能。\n\n**结果：** 四项随机对照试验符合资格标准并被纳入数据分析。肿瘤学结果表明，新辅助化疗相当于或不劣于放化疗。 4 项试验中有 3 项报告了吻合口瘘和改道造口术的使用，而仅 2 项试验报告了术后 30 天的发病率和造口术不可逆转。在 3 项试验中测量了肠功能，但每项试验的测量和报告都不同。荟萃分析显示，新辅助化疗与吻合口瘘显着减少（相对风险 [RR] 0.54；95% CI，0.35-0.81）、改道造口术的使用（RR 0.79；95% CI，0.70-0.88）和造口非逆转（RR 0.37；95% CI， 0.15-0.93）。新辅助化疗与术后 30 天发病率之间没有关联（RR 0.88；95% CI，0.53-1.45）。\n\n**Limitations：** 少数纳入的试验在结果定义上具有异质性是限制。\n\n**结论：** 在比较单独新辅助化疗与放化疗治疗局部晚期直肠癌的试验中，没有报告重要的手术结果。根据现有的有限数据，单独化疗与降低吻合口瘘、转移造口术使用和造口术不可逆转的风险相关。参见视频摘要。", "keywords_zh": "化疗、新辅助治疗、遗漏放射治疗、直肠癌、手术结果", "keywords_en": "Chemotherapy, Neoadjuvant therapy, Radiation omission, Rectal cancer, Surgical outcomes", "link": "https://pubmed.ncbi.nlm.nih.gov/40905480/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 04 Sep 2025"}, {"id": "40894328", "title_en": "Systematic meta-review: diagnostic accuracy of colon capsule endoscopy for colonic neoplasia with umbrella meta-analysis", "title_zh": "系统荟萃回顾：结肠胶囊内镜检查对结肠肿瘤的伞形荟萃分析诊断准确性", "authors": "Anastasios Koulaouzidis", "abstract_en": "**Background:** Colorectal cancer (CRC) incidence is rising globally, intensifying pressure on endoscopy services. Colon capsule endoscopy (CCE) offers a non-invasive alternative. Despite several systematic reviews showing reasonable polyp detection rates, clinical scepticism remains.\n\n**Objectives:** This meta-review and umbrella meta-analysis aim to synthesise evidence on CCE's diagnostic accuracy in polyp and CRC detection, using CT colonography or colonoscopy as the reference standard.\n\n**Methods:** We conducted a systematic search of EMBASE, MEDLINE and PubMed for systematic reviews evaluating the diagnostic accuracy of CCE in detecting polyps and CRC. A qualitative thematic review and synthesis were conducted following PRISMA guidelines. A bivariate generalised linear mixed model with random effects was used for pooled diagnostic accuracy estimates, and meta-regression was performed using restricted maximum likelihood estimation.\n\n**Results:** Nine systematic reviews encompassing 28 unique studies (3472 participants) were included. For polyps of any size, the pooled per-patient sensitivity was 0.79 (95% CI: 0.69-0.86), specificity was 0.77 (95% CI: 0.71-0.82), and the area under the curve (AUC) was 0.81. For polyps ⩾6 mm, sensitivity and specificity were 0.80 and 0.87 (AUC 0.81), and for polyps ⩾10 mm, 0.88 and 0.95 (AUC 0.95), respectively. Second-generation CCE (CCE2) improved diagnostic accuracy across all polyp sizes. For polyps of any size, CCE2 achieved a sensitivity of 0.90, specificity of 0.81 and AUC of 0.82. For polyps ⩾ 6 mm and ⩾10 mm, AUCs were 0.92 and 0.94, respectively. CCE2 showed high sensitivity for detecting any polyp size and polyps ⩾6 mm, with low heterogeneity (<i>p</i> > 0.05, <i>I</i> <sup>2</sup> < 25%). CRC detection sensitivity was 0.96 (95% CI: 0.73-1.00) after excluding cases where the capsule failed to reach the rectum due to battery exhaustion.\n\n**Conclusion:** CCE2 has high diagnostic accuracy for polyps and colorectal cancer detection. While technical challenges persist, CCE2 shows promise as a complementary diagnostic tool to help address the increasing demands for endoscopy services.", "abstract_zh": "**背景：** 全球结直肠癌（CRC）发病率不断上升，加大了内窥镜检查服务的压力。结肠胶囊内窥镜检查 (CCE) 提供了一种非侵入性替代方案。尽管多项系统评价显示息肉检出率合理，但临床仍持怀疑态度。\n\n**Objectives：** 这项荟萃审查和伞式荟萃分析旨在以 CT 结肠成像或结肠镜检查作为参考标准，综合证明 CCE 在息肉和 CRC 检测中诊断准确性的证据。\n\n**方法：** 我们对 EMBASE、MEDLINE 和 PubMed 进行了系统检索，以进行系统评价，评估 CCE 在检测息肉和 CRC 方面的诊断准确性。按照 PRISMA 指南进行了定性主题审查和综合。具有随机效应的二元广义线性混合模型用于汇总诊断准确性估计，并使用限制最大似然估计进行元回归。\n\n**结果：** 其中包括 9 项系统评价，涵盖 28 项独特研究（3472 名参与者）。对于任何大小的息肉，每位患者的汇总敏感性为 0.79（95% CI：0.69-0.86），特异性为 0.77（95% CI：0.71-0.82），曲线下面积 (AUC) 为 0.81。对于≥6mm的息肉，敏感性和特异性分别为0.80和0.87（AUC 0.81），对于≥10mm的息肉，敏感性和特异性分别为0.88和0.95（AUC 0.95）。第二代 CCE (CCE2) 提高了所有息肉尺寸的诊断准确性。对于任何大小的息肉，CCE2 的敏感性为 0.90，特异性为 0.81，AUC 为 0.82。对于 ⩾ 6 mm和⩾10 mm的息肉，AUC分别为0.92和0.94。 CCE2 对检测任何息肉大小和息肉 ⩾6 mm 表现出高灵敏度，异质性低（<i>p</i> > 0.05，<i>I</i> <sup>2</sup> < 25%）。排除胶囊因电池耗尽而未能到达直肠的情况后，CRC 检测灵敏度为 0.96（95% CI：0.73-1.00）。\n\n**结论：** CCE2对于息肉和结直肠癌检测具有较高的诊断准确性。尽管技术挑战仍然存在，但 CCE2 作为一种补充诊断工具有望帮助满足日益增长的内窥镜服务需求。", "keywords_zh": "CCE、CRC检测、CT结肠镜检查、胶囊内镜检查、结肠胶囊内镜检查、结肠镜检查、全肠胶囊内镜检查、息肉、息肉检测、息肉样病变", "keywords_en": "CCE, CRC detection, CT colonoscopy, capsule endoscopy, colon capsule endoscopy, colonoscopy, panenteric capsule endoscopy, polyp, polyp detection, polypoidal lesion", "link": "https://pubmed.ncbi.nlm.nih.gov/40894328/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 02 Sep 2025"}, {"id": "40877526", "title_en": "Outcomes of embolization therapy of superior rectal arteries for the management of grade 1 to 3 internal hemorrhoids: a systematic Review of clinical studies", "title_zh": "直肠上动脉栓塞治疗 1 至 3 级内痔的结果：临床研究的系统评价", "authors": "Jana Al Jnainati", "abstract_en": "**Background:** Superior rectal artery embolization (\"Emborrhoid\") offers a catheter-based alternative for grade I-III internal hemorrhoids when office therapies fail or surgery is undesirable.\n\n**Methods:** Following PRISMA 2020, PubMed and Embase were searched (Jan 2014-Jan 2024). Two reviewers independently screened records, extracted data, and applied RoB 2, ROBINS-I, or an adapted Newcastle-Ottawa Scale. Prespecified outcomes were technical success, clinical success (≥ 2-point fall in bleeding score or equivalent), adverse events, and recurrence. Substantial heterogeneity blocked meta-analysis; results were narratively synthesized.\n\n**Results:** Twenty-two studies encompassing 810 procedures qualified. Technical success reached 93-100%. Clinical success ranged from 63 to 94%, yielding marked bleeding control and symptom relief. Reported complications were mild and self-limited (pelvic discomfort, nausea, and low-grade fever); no ischemic injury, continence disturbance, or mortality occurred. Recurrence necessitating repeat treatment affected 8-20% of patients, usually when collateral arterial supply persisted. Patient-reported satisfaction exceeded 80% in every series. Only two small, heterogeneous comparative studies versus rubber-band ligation or sclerotherapy were available, precluding a pooled analysis.\n\n**Conclusions:** Current evidence suggests Emborrhoid is a safe, effective bridge between office procedures and surgery-particularly valuable for frail or anticoagulated patients. Yet small single-center cohorts, disparate techniques, and scarce head-to-head trials limit external validity. Multicenter randomized studies with harmonized outcomes and ≥ 24-month follow-up are required to confirm long-term efficacy, cost-effectiveness, and optimal patient selection.", "abstract_zh": "**背景：** 当办公室治疗失败或不宜进行手术时，直肠上动脉栓塞术（“栓塞术”）为 I-III 级内痔提供了一种基于导管的替代方案。\n\n**方法：** 继 PRISMA 2020 之后，对 PubMed 和 Embase 进行了检索（2014 年 1 月-2024 年 1 月）。两名评审员独立筛选记录、提取数据并应用 RoB 2、ROBINS-I 或改编的纽卡斯尔-渥太华量表。预先设定的结果是技术成功、临床成功（出血评分下降≥2分或同等水平）、不良事件和复发。显着的异质性阻碍了荟萃分析；结果是叙述性综合的。\n\n**结果：** 涵盖 810 项程序的 22 项研究合格。技术成功率达到93-100%。临床成功率为 63% 至 94%，显着控制出血并缓解症状。报告的并发症轻微且具有自限性（骨盆不适、恶心和低烧）；没有发生缺血性损伤、失禁障碍或死亡。需要重复治疗的复发影响了 8-20% 的患者，通常是在侧支动脉供应持续存在的情况下。每个系列中患者报告的满意度均超过 80%。只有两项小型、异质性与橡皮筋结扎或硬化疗法的比较研究可用，排除了汇总分析。\n\n**结论：** 目前的证据表明，Emborroid 是办公室程序和手术之间的安全、有效的桥梁，对于体弱或接受抗凝治疗的患者尤其有价值。然而，小型单中心队列、不同的技术和稀缺的头对头试验限制了外部有效性。需要具有一致结果的多中心随机研究和≥24个月的随访来确认长期疗效、成本效益和最佳患者选择。", "keywords_zh": "栓塞材料、痔疮栓塞、微创治疗、患者满意度、复发率、直肠上动脉、系统评价", "keywords_en": "Embolic materials, Hemorrhoidal embolization, Minimally invasive therapy, Patient satisfaction, Recurrence rates, Superior rectal artery, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40877526/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 28 Aug 2025"}, {"id": "40876363", "title_en": "Local excision versus total mesorectal excision following neoadjuvant chemoradiotherapy for rectal cancer: A systematic review and meta-analysis", "title_zh": "直肠癌新辅助放化疗后局部切除与全直肠系膜切除：系统评价和荟萃分析", "authors": "Neary Peter", "abstract_en": "**Background:** Total mesorectal excision (TME) with or without neoadjuvant chemoradiotherapy remains the gold standard treatment for rectal cancer. However, newer organ sparing methods, including Local Excision (LE) have been introduced in conjunction with neoadjuvant therapy to improve morbidity and functional outcomes while not impacting on oncological outcomes.\n\n**Methods:** A systematic review and meta-analysis was performed using the PRISMA guidelines. All studies comparing neoadjuvant chemoradiotherapy and local excision versus TME were included from 2000 to 2024. Primary endpoint included local recurrence rates. Secondary outcomes included distant recurrence, disease free survival (DFS), overall survival (OS), and morbidity. Subgroup analysis was performed on randomised control trials (RCT).\n\n**Results:** Sixteen studies (n = 2121; LE = 616, TME = 1505) were included. LE was associated with higher local recurrence (8.3 % vs 5.5 %; OR 1.82, 95 % CI 1.19-2.77, p = 0.006). However, in RCTs (n = 245), this difference was not significant (7.3 % vs 6.6 %; OR 1.10, 95 % CI 0.41-2.97, p = 0.84). No significant differences were observed in distant recurrence, DFS, or OS. LE was associated with significantly reduced morbidity (OR 0.30, 95 % CI 0.18-0.50, p < 0.0001).\n\n**Conclusion:** Local recurrence was not statistically significant in the RCT subgroup analysis. Despite, higher local recurrence rates in the overall pooled analysis, no significant differences were observed for secondary outcomes. Neoadjuvant chemoradiotherapy and local excision appears oncologically safe, defined by DFS and OS, in select patient cohorts with a clinical complete or near-complete response to neoadjuvant therapy.", "abstract_zh": "**背景：** 全直肠系膜切除术（TME）联合或不联合新辅助放化疗仍然是直肠癌的金标准治疗。然而，新的器官保留方法，包括局部切除（LE），已与新辅助治疗结合使用，以改善发病率和功能结果，同时不影响肿瘤结果。\n\n**方法：** 使用 PRISMA 指南进行系统评价和荟萃分析。 2000 年至 2024 年期间所有比较新辅助放化疗和局部切除与 TME 的研究均纳入其中。主要终点包括局部复发率。次要结局包括远处复发、无病生存期（DFS）、总生存期（OS）和发病率。在随机对照试验（RCT）中进行亚组分析。\n\n**结果：** 纳入了 16 项研究（n = 2121；LE = 616，TME = 1505）。 LE 与较高的局部复发率相关（8.3% vs 5.5%；OR 1.82，95% CI 1.19-2.77，p = 0.006）。然而，在随机对照试验 (n = 245) 中，这种差异并不显着（7.3% vs 6.6%；OR 1.10，95% CI 0.41-2.97，p = 0.84）。在远处复发、DFS 或 OS 方面未观察到显着差异。 LE 与发病率显着降低相关（OR 0.30，95% CI 0.18-0.50，p < 0.0001）。\n\n**结论：** 在 RCT 亚组分析中，局部复发没有统计学意义。尽管在总体汇总分析中局部复发率较高，但次要结局没有观察到显着差异。在对新辅助治疗具有临床完全或接近完全反应的选定患者队列中，新辅助放化疗和局部切除似乎在肿瘤学上是安全的（由 DFS 和 OS 定义）。", "keywords_zh": "局部切除、根治性手术、直肠癌、全直肠系膜切除", "keywords_en": "Local excision, Radical surgery, Rectal cancer, Total mesorectal excision", "link": "https://pubmed.ncbi.nlm.nih.gov/40876363/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 28 Aug 2025"}, {"id": "40845608", "title_en": "Transparency in Externally Validated Models: A systematic review of machine learning vs. logistic regression for predicting colorectal anastomotic leakage", "title_zh": "外部验证模型的透明度：对机器学习与逻辑回归预测结直肠吻合口漏的系统评价", "authors": "Freek Daams", "abstract_en": "**Introduction:** Colorectal resection carries a 2.8 %-30 % risk of anastomotic leakage. Machine learning can estimate risks and guide decisions, but clinical implementation remains inadequate due to transparency issues. This review assesses the performance and transparency of machine learning models compared to logistic regression.\n\n**Methods:** A systematic review followed PRISMA guidelines. Medline, Embase, Web of Science, and Cochrane databases were searched for studies using Logistic Regression or Machine Learning with external validation for colorectal anastomotic leakage prediction. Data were extracted using CHARMS, risk of bias assessed with PROBAST, and transparency with TRIPOD + AI.\n\n**Results:** Ten studies were included. Machine learning models were validated on smaller cohorts than logistic regression. Transparency scores ranged from 29 % to 63 %, averaging 45 % for logistic regression and 43 % for machine learning. Reporting of missing data was inconsistent, and external validation was limited. Most studies had a high risk of bias due to small sample sizes and low event counts.\n\n**Conclusion:** In comparison to Logistic regression studies, machine learning studies are limited by small cohorts, low outcome numbers, and a lower level of transparency. Future research should prioritise transparency, adhere to TRIPOD + AI standards, and develop LR and ML models in parallel using the same datasets while ensuring separate models for colon and rectal surgery. Currently, these models are not yet suitable for clinical implementation; more robust and transparent models must be developed based on these recommendations before they can be applied in clinical practice.", "abstract_zh": "**介绍：** 结直肠切除术有 2.8%-30% 的吻合口瘘风险。机器学习可以估计风险并指导决策，但由于透明度问题，临床实施仍然不足。这篇综述评估了机器学习模型与逻辑回归相比的性能和透明度。\n\n**方法：** 系统评价遵循 PRISMA 指南。在 Medline、Embase、Web of Science 和 Cochrane 数据库中搜索了使用 Logistic 回归或机器学习并进行结直肠吻合口漏预测外部验证的研究。使用 CHARMS 提取数据，使用 PROBAST 评估偏倚风险，并使用 TRIPOD + AI 评估透明度。\n\n**结果：** 其中包括十项研究。机器学习模型在比逻辑回归更小的队列上进行了验证。透明度分数范围为 29% 到 63%，逻辑回归平均为 45%，机器学习平均为 43%。缺失数据的报告不一致，外部验证也有限。由于样本量小和事件计数低，大多数研究存在较高的偏倚风险。\n\n**结论：** 与逻辑回归研究相比，机器学习研究受到小群体、低结果数量和较低透明度的限制。未来的研究应优先考虑透明度，遵守 TRIPOD + AI 标准，并使用相同的数据集并行开发 LR 和 ML 模型，同时确保结肠和直肠手术的模型不同。目前，这些模型尚不适合临床实施；必须根据这些建议开发更稳健和透明的模型，然后才能应用于临床实践。", "keywords_zh": "吻合口漏、结直肠手术、Logistic 回归、机器学习、预测", "keywords_en": "Anastomotic leakage, Colorectal surgery, Logistic regression, Machine learning, Prediction", "link": "https://pubmed.ncbi.nlm.nih.gov/40845608/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 22 Aug 2025"}, {"id": "40824311", "title_en": "Abdominoperineal pull-through with delayed coloanal anastomosis for pelvic anastomotic failure-a systematic review", "title_zh": "腹会阴牵引延迟结肠肛管吻合术治疗盆腔吻合失败的系统评价", "authors": "I Seow-En", "abstract_en": "**Aim:** Despite the potential benefits of abdominoperineal pull-through with delayed coloanal anastomosis (DCAA), it is still infrequently performed as a salvage procedure for pelvic anastomotic failure. We aimed to perform a systematic review on the subject to guide practice.\n\n**Method:** PubMed, Embase and Cochrane were used to identify studies evaluating DCAA for salvage after pelvic surgery from inception to August 2024. Risk of bias assessment was performed using the Newcastle-Ottawa scale. The primary outcome was overall stoma-free survival. Secondary outcomes included hospital length of stay, high-grade postoperative complication rates, 30-day postoperative mortality rates, incidence of redo surgical intervention after DCAA, and postoperative anorectal function.\n\n**Results:** Five retrospective cohort studies evaluating a total of 97 patients who underwent salvage abdominoperineal pull-through and DCAA were included in this review. All patients had previous pelvic surgery, predominantly proctectomy (n = 84, 86.6%). The most common indication for redo surgery was chronic fistula (n = 62, 63.9%) followed by anastomotic leak or chronic pelvic sepsis (n = 34, 35.1%). The pooled overall stoma-free survival rate across all five studies was 81.4% over a mean 24-month postoperative follow-up duration. The overall incidence of high-grade complications after DCAA was 39.1% (n = 38). Pooled mean length of stay was 17 days. There were no cases of early postoperative death. Pooled rate of repeat surgery across four studies was 11.6% (n = 8). Pooled mean functional scores across three studies indicated minor low anterior resection syndrome at 26 months.\n\n**Conclusion:** Abdominoperineal pull-through with delayed coloanal anastomosis is a viable option for salvage surgery following pelvic anastomotic complications, with low rates of permanent stoma and acceptable long-term anorectal function.", "abstract_zh": "**Aim：** 尽管腹会阴拉穿延迟结肠肛门吻合术 (DCAA) 具有潜在益处，但它仍然很少作为骨盆吻合失败的挽救手术进行。我们的目的是对该主题进行系统回顾以指导实践。\n\n**Method：** PubMed、Embase 和 Cochrane 被用来识别从开始到 2024 年 8 月评估 DCAA 在盆腔手术后挽救效果的研究。使用纽卡斯尔-渥太华量表进行偏倚风险评估。主要结果是总体无造口生存率。次要结局包括住院时间、术后高级并发症发生率、术后 30 天死亡率、DCAA 后重做手术干预的发生率以及术后肛门直肠功能。\n\n**结果：** 本综述纳入了五项回顾性队列研究，评估了总共 97 名接受挽救性腹会阴牵引术和 DCAA 的患者。所有患者均曾接受过盆腔手术，主要是直肠切除术（n = 84，86.6%）。重做手术最常见的适应症是慢性瘘（n = 62，63.9%），其次是吻合口瘘或慢性盆腔脓毒症（n = 34，35.1%）。在平均 24 个月的术后随访期间，所有五项研究的汇总总体无造口生存率为 81.4%。 DCAA 后高级并发症的总体发生率为 39.1% (n = 38)。合并平均住院时间为 17 天。无术后早期死亡病例。四项研究的重复手术汇总率为 11.6% (n = 8)。三项研究的汇总平均功能评分表明 26 个月时有轻微的低位前切除综合征。\n\n**结论：** 腹会阴牵引联合延迟结肠肛管吻合术是盆腔吻合并发症后挽救手术的可行选择，具有较低的永久性造口率和可接受的长期肛门直肠功能。", "keywords_zh": "腹会阴牵引、结直肠手术、延迟结肠肛门吻合术、重做手术", "keywords_en": "Abdominoperineal pull-through, Colorectal surgery, Delayed coloanal anastomosis, Redo surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/40824311/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 18 Aug 2025"}, {"id": "40819153", "title_en": "Comprehensive evaluation of reinforcement strategies for anastomotic leak prevention in rectal cancer surgery: an umbrella review of meta-analyses", "title_zh": "直肠癌手术中预防吻合口瘘的强化策略的综合评价：荟萃分析的总体综述", "authors": "Leonardo Vincenti", "abstract_en": "Anastomotic leakage remains a serious complication following colorectal surgery. Various reinforcement techniques have been explored in literature, with multiple systematic reviews and meta-analyses addressing their effectiveness. However, no umbrella review has yet comprehensively synthesized this evidence. We aimed to summarize and critically appraise the available systematic reviews and meta-analyses investigating the effectiveness of anastomotic reinforcement techniques in colorectal surgery. A comprehensive literature search was conducted in PubMed, Embase, Scopus, and Cochrane Library up to June 2025. Eligible studies were systematic reviews or meta-analyses evaluating any reinforcement technique (biological, mechanical, or chemical) in colorectal anastomoses. Data extraction included review characteristics, reinforcement strategies, primary outcomes (anastomotic leak), and methodological quality assessed using AMSTAR 2. Twenty-one systematic reviews and meta-analyses were included. The reinforcement strategies evaluated comprised transanal tube (TAT) placement, suture reinforcement, and omentoplasty. Most reviews showed a reduction in anastomotic leak rates, particularly with TAT (43-70%) and sutures (59-75%), with the most pronounced effect observed in patients without a diverting stoma. TAT was also associated with a reduction in reintervention rates (62-84%). Findings on hospital stay were inconsistent, while no significant effects were reported for anastomotic bleeding, infections, stenosis, or mortality. The overall methodological quality of the included studies was rated as critically low. TAT and reinforcement sutures show potential in reducing anastomotic leakage in colorectal surgery. However, significant heterogeneity and variable methodological quality across reviews limit definitive conclusions. High-quality, targeted studies and standardized outcome definitions are warranted.", "abstract_zh": "吻合口漏仍然是结直肠手术后的严重并发症。文献中已经探讨了各种强化技术，并进行了多项系统评价和荟萃分析来探讨其有效性。然而，还没有总体审查全面综合这些证据。我们的目的是总结和批判性评价现有的系统评价和荟萃分析，研究结直肠手术中吻合加固技术的有效性。截至 2025 年 6 月，在 PubMed、Embase、Scopus 和 Cochrane 图书馆进行了全面的文献检索。符合条件的研究是评估结直肠吻合术中任何强化技术（生物、机械或化学）的系统评价或荟萃分析。数据提取包括综述特征、强化策略、主要结局（吻合口瘘）以及使用 AMSTAR 2 评估的方法学质量。其中包括 21 项系统综述和荟萃分析。评估的加固策略包括经肛管（TAT）放置、缝合加固和网膜成形术。大多数评论显示吻合口漏率降低，特别是 TAT（43-70%）和缝合（59-75%），在没有分流造口的患者中观察到最明显的效果。 TAT 还与再干预率的降低有关 (62-84%)。关于住院时间的研究结果不一致，而对于吻合口出血、感染、狭窄或死亡率没有显着影响。纳入研究的总体方法学质量被评为极低。 TAT 和加固缝合线显示出减少结直肠手术中吻合口渗漏的潜力。然而，不同评论间显着的异质性和可变的方法学质量限制了明确的结论。高质量、有针对性的研究和标准化的结果定义是必要的。", "keywords_zh": "吻合口漏、吻合口加固、直肠癌、经肛管", "keywords_en": "Anastomotic leak, Anastomotic reinforcement, Rectal cancer, Transanal tube", "link": "https://pubmed.ncbi.nlm.nih.gov/40819153/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 16 Aug 2025"}, {"id": "40808658", "title_en": "Association between anastomotic leak after rectal resection and bowel dysfunction, a systematic review, meta-analysis and meta-regression", "title_zh": "直肠切除术后吻合口瘘与肠功能障碍之间的关联、系统评价、荟萃分析和荟萃回归", "authors": "Marylise Boutros", "abstract_en": "**Background:** Anastomotic leak (AL) after colorectal anastomosis can be a risk factor for bowel dysfunction, namely low anterior resection syndrome (LARS). The present study aimed to assess bowel dysfunction in patients who developed AL after anterior resection compared to patients without AL.\n\n**Methods:** We conducted a PRISMA-compliant systematic review of PubMed, Scopus and Cochrane Library for randomized and observational studies investigating the association between AL after anterior resection and bowel dysfunction. The main outcomes were LARS, faecal incontinence and urgency. Pairwise meta-analyses were conducted to calculate the relative risk (RR) of the study outcomes and their 95% confidence intervals (CI).\n\n**Results:** This review included 20 retrospective studies comprising 4764 patients (61.6% male, median age 63 years). AL was detected in 14% of patients and those who experienced AL had a higher risk of LARS (six studies; 1329 patients, RR: 1.27 95%CI: 1.02, 1.58, p = 0.035), major LARS (seven studies; 1395 patients, RR: 1.38, 95%CI: 1.07, 1.79, p = 0.012), urgency (five studies; 955 patients, RR: 1.15, 95%CI: 1.04, 1.27, p = 0.005) and had higher LARS scores (seven studies; 1450 patients, WMD: 6.64, 95%CI: 3.76, 9.52, p < 0.001) and Wexner incontinence scores (seven studies; 1045 patients, WMD: 1.72, 95%CI: 0.16, 3.28, p = 0.031).\n\n**Conclusion:** Based on low to moderate certainty evidence, AL after colorectal and coloanal anastomoses was significantly associated with an increased risk of LARS, particularly major LARS, urgency and higher LARS and Wexner/Cleveland Clinic Florida-Fecal Incontinence Scores.", "abstract_zh": "**背景：** 结直肠吻合术后吻合口漏（AL）可能是肠功能障碍的危险因素，即低位前切除综合征（LARS）。本研究旨在评估前切除术后发生 AL 的患者与未发生 AL 的患者相比的肠功能障碍。\n\n**方法：** 我们对 PubMed、Scopus 和 Cochrane 图书馆进行了符合 PRISMA 标准的系统评价，以进行随机和观察性研究，调查前切除术后 AL 与肠功能障碍之间的关联。主要结局是 LARS、大便失禁和尿急。进行配对荟萃分析以计算研究结果的相对风险（RR）及其95%置信区间（CI）。\n\n**结果：** 该综述包括 20 项回顾性研究，涉及 4764 名患者（61.6% 为男性，中位年龄 63 岁）。 14% 的患者检测到 AL，经历过 AL 的患者发生 LARS 的风险较高（六项研究；1329 名患者，RR：1.27 95%CI：1.02、1.58，p = 0.035）、主要 LARS（七项研究；1395 名患者，RR：1.38，95%CI：1.07， 1.79，p = 0.012），紧迫性（五项研究；955 名患者，RR：1.15，95%CI：1.04，1.27，p = 0.005）并且具有较高的 LARS 评分（七项研究；1450 名患者，WMD：6.64，95%CI：3.76， 9.52，p< 0.001）和 Wexner 失禁评分（七项研究；1045 名患者，WMD：1.72，95%CI：0.16、3.28，p= 0.031）。\n\n**结论：** 根据低到中等确定性的证据，结直肠和结肠肛管吻合术后的 AL 与 LARS 风险增加显着相关，特别是主要 LARS、尿急和较高的 LARS 以及 Wexner/Cleveland Clinic 佛罗里达大便失禁评分。", "keywords_zh": "LARS，吻合口瘘，前切除，肠功能障碍，结直肠，系统评价", "keywords_en": "LARS, anastomotic leak, anterior resection, bowel dysfunction, colorectal, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/40808658/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 14 Aug 2025"}, {"id": "40793873", "title_en": "Systematic Review: The Relationship Between the Faecal Microbiome and Colorectal Neoplasia in Shotgun Metagenomic Studies", "title_zh": "系统综述：鸟枪法宏基因组研究中粪便微生物组与结直肠肿瘤之间的关系", "authors": "Colin Rees", "abstract_en": "**Background:** The human gut microbiome is of academic and clinical interest. Associations between certain organisms and colorectal neoplasia have been reported, but findings have limited reproducibility in different populations.\n\n**Methods:** We performed a systematic review of whole metagenome shotgun sequencing studies using faecal samples from patients with colorectal neoplasia and control populations. Searches were performed on 30th June 2023. We identified 26 studies, reporting on 22 study populations (13 from Asia, five from Europe and four from North America). Study size ranged from 14 to 971 individuals (mean 170).\n\n**Results:** Some reproducible data were identified, such as the significant enrichment of Fusobacterium nucleatum and Parvimonas micra in colorectal cancer patients compared to controls (in 10 and nine studies, respectively). However, 21 out of 26 studies scored poorly on quality appraisal, specifically surrounding selection of cases and controls. Definitions of controls varied; some studies used individuals with normal endoscopic investigations, some used 'healthy' individuals where no colonoscopy was performed, and one used those with non-neoplastic findings (haemorrhoids). There was even less reproducibility of data in studies where individuals with colorectal polyps were compared to controls, possibly because of heterogeneity in these patient groupings as a variety of definitions for 'polyp cases' were used.\n\n**Conclusions:** Heterogeneity and potential for bias indicates that findings should be interpreted with caution. Standardised protocols to ensure robust methodology and allow pooling of large-scale data are required before these findings can be used in clinical practice (PROSPERO: CRD42023431977).", "abstract_zh": "**背景：** 人类肠道微生物组具有学术和临床意义。某些微生物与结直肠肿瘤之间的关联已有报道，但研究结果在不同人群中的重复性有限。\n\n**方法：** 我们使用结直肠肿瘤患者和对照人群的粪便样本对整个宏基因组鸟枪法测序研究进行了系统回顾。检索于 2023 年 6 月 30 日进行。我们确定了 26 项研究，报告了 22 个研究人群（13 项来自亚洲，5 项来自欧洲，4 项来自北美）。研究规模从 14 人到 971 人不等（平均 170 人）。\n\n**结果：** 确定了一些可重复的数据，例如与对照组相比，结直肠癌患者中具核梭杆菌和微小单胞菌显着富集（分别在 10 项和 9 项研究中）。然而，26 项研究中有 21 项在质量评估方面得分较低，特别是在病例和对照的选择方面。控制的定义各不相同；一些研究使用了正常内窥镜检查的个体，一些研究使用了未进行结肠镜检查的“健康”个体，还有一项研究使用了非肿瘤发现（痔疮）的个体。在将结直肠息肉患者与对照组进行比较的研究中，数据的重复性甚至更低，这可能是因为这些患者分组的异质性，因为使用了多种“息肉病例”定义。\n\n**结论：** 异质性和潜在偏差表明应谨慎解释研究结果。在将这些发现用于临床实践之前，需要制定标准化方案以确保稳健的方法并允许汇集大规模数据（PROSPERO：CRD42023431977）。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/40793873/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 12 Aug 2025"}, {"id": "40788642", "title_en": "Role of Neoadjuvant Immune Checkpoint Inhibitors in Locally Advanced Rectal Cancer: A Systematic Review of Currently Available Studies", "title_zh": "新辅助免疫检查点抑制剂在局部晚期直肠癌中的作用：对现有研究的系统回顾", "authors": "Alexander G Heriot", "abstract_en": "**Background:** During the past few decades, the standard of care for locally advanced rectal cancer, involving neoadjuvant chemoradiation followed by surgery, has been associated with a pathological complete response rate of only 10% to 20%. Combination therapy with immune checkpoint inhibitors may improve treatment response.\n\n**Objective:** This systematic review examines the current evidence regarding neoadjuvant immune checkpoint inhibitors in locally advanced rectal cancer in terms of treatment efficacy, impact on surgical outcomes, and potential adverse events.\n\n**Data Sources:** A literature search was conducted using the Ovid MEDLINE, Embase, Web of Science, and Cochrane Library databases from the start of database records to October 31, 2024.\n\n**Study Selection:** All studies that reported outcomes in patients with locally advanced rectal cancer who received immune checkpoint inhibitors as part of their neoadjuvant treatment were included for examination.\n\n**Main Outcome Measures:** Primary outcome was pathological complete response rate. Secondary outcomes were major pathological response rate, clinical complete response rate, complete response rate, R0 resection rate, and sphincter preservation rate.
