线组不良事件发生率低于切开引流组（P<0.05）。 5项研究显示切开挂线组的住院时间短于切开引流组（P<0.05）。\n\n**讨论：** Error 500 (Server Error)!!1500.That’s an error.There was an error. Please try again later.That’s all we know.", "keywords_zh": "切开挂线治疗，高位肛周脓肿，切开引流治疗，Meta分析", "keywords_en": "Incision-seton therapy, high perianal abscess, incision-drainage therapy, meta-analysis", "link": "https://pubmed.ncbi.nlm.nih.gov/34628909/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=14OzJS8GjXZKNRRzPCpEeeWNsNMgy1WIuhFrUouU5lu4ZC2kX-&fc=20260103014642&ff=20260316223031&v=2.19.0.post6+133c1fe", "date": "Mon, 11 Oct 2021"}], "未命名": [], "痔疮": [{"id": "41832382", "title_en": "Novel adjunctive technologies for the prevention of colorectal anastomotic leakage: a systematic review", "title_zh": "预防结直肠吻合口漏的新型辅助技术：系统评价", "authors": "A Picciariello", "abstract_en": "**Background:** Anastomotic leakage (AL) remains one of the most serious complications following colorectal surgery, particularly after low anterior resection. In recent years, several adjunctive technologies have been introduced to reinforce anastomotic integrity during the early phases of healing. This systematic review aimed to evaluate the safety, feasibility, and clinical effectiveness of novel mechanical and biological devices designed to prevent AL in colorectal surgery.\n\n**Methods:** A systematic literature search was conducted in PubMed, Embase, and Scopus. Human studies evaluating innovative adjunctive devices for AL prevention in patients undergoing low anterior resection were included. Studies focusing on transanal tubes, omental wrapping, or suture reinforcement were excluded. The primary outcome was the rate of anastomotic leakage.\n\n**Results:** Eighteen studies published between 2005 and 2021 met the inclusion criteria. The evaluated technologies were grouped into six categories: bioabsorbable staple-line reinforcements, nitinol-based compression rings, biodegradable intraluminal sheaths, vacuum-anchored diversion systems, fi brin-based sealants, and collagen patches (Seamguard™, C-Seal™, ColonRing™, Colovac™, Tissucol™/Greenplast™, TachoSil™, and Hemopatch™). Considerable heterogeneity in study design and methodological quality was observed. Although several devices demonstrated acceptable technical feasibility and safety, their eff ect on AL prevention was inconsistent. Only a limited number of studies included control groups or were designed as randomized controlled trials. Device-related complications, including migration, technical difficulties, and local tissue reactions, were reported in some series.\n\n**Conclusions:** Current adjunctive technologies have not consistently demonstrated a reduction in AL rates after colorectal surgery. While selected devices may provide potential benefit in high-risk patients, their clinical applicability remains limited by technical constraints and heterogeneous evidence. Further large, high-quality studies incorporating standardized definitions of AL and patient-specific risk stratification are warranted.", "abstract_zh": "**背景：** 吻合口漏（AL）仍然是结直肠手术后最严重的并发症之一，特别是低位前切除术后。近年来，已经引入了几种辅助技术来加强愈合早期阶段的吻合口完整性。 This systematic review aimed to evaluate the safety, feasibility, and clinical effectiveness of novel mechanical and biological devices designed to prevent AL in colorectal surgery.\n\n**方法：** 在 PubMed、Embase 和 Scopus 中进行了系统的文献检索。其中包括评估用于预防低位前切除患者 AL 的创新辅助装置的人体研究。专注于经肛管、大网膜包裹或缝合加固的研究被排除在外。主要结果是吻合口漏发生率。\n\n**结果：** 2005 年至 2021 年间发表的 18 项研究符合纳入标准。评估的技术分为六类：生物可吸收钉线增强材料、镍钛诺压缩环、可生物降解管腔内护套、真空锚定分流系统、纤维蛋白密封剂和胶原蛋白补片（Seamguard™、C-Seal™、ColonRing™、Colovac™、Tissucol™/Greenplast™、TachoSil™ 和 Hemopatch™）。观察到研究设计和方法学质量存在相当大的异质性。尽管一些设备表现出可接受的技术可行性和安全性，但它们对预防 AL 的效果并不一致。只有有限数量的研究包括对照组或被设计为随机对照试验。一些系列报道了与设备相关的并发症，包括迁移、技术困难和局部组织反应。\n\n**结论：** 目前的辅助技术并未一致证明结直肠手术后 AL 率有所降低。虽然所选设备可能为高危患者提供潜在益处，但其临床适用性仍然受到技术限制和异质证据的限制。需要进一步开展大规模、高质量的研究，纳入 AL 的标准化定义和患者特定的风险分层。", "keywords_zh": "吻合口漏、吻合口加固装置、结直肠手术、外科密封剂和生物材料", "keywords_en": "Anastomotic leakage, Anastomotic reinforcement devices, Colorectal surgery, urgical sealants and biomaterials", "link": "https://pubmed.ncbi.nlm.nih.gov/41832382/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sun, 15 Mar 2026"}, {"id": "41822113", "title_en": "Perioperative outcomes of robotic-assisted vs. conventional laparoscopy for colorectal cancer resection: a systematic review and meta-analysis", "title_zh": "机器人辅助与传统腹腔镜结直肠癌切除术的围手术期结果：系统评价和荟萃分析", "authors": "Ashraf Abdelmonem Elsayed", "abstract_en": "**Background:** Colorectal cancer is a major global health concern that requires successful surgical treatments. While robotic-assisted surgery (RAS) provides prospective improvements, laparoscopic surgery has proven to yield better results than open surgeries.\n\n**Methods:** From 2018 to December 2024, PubMed, Scopus, and Web of Science were used to perform a systematic review and meta-analysis of cohort studies and randomized controlled trials (RCTs). Studies comparing RAS and conventional laparoscopic surgery were included. The primary outcomes assessed were length of hospital stay, conversion to open surgery, postoperative complications, and operating time. Using Comprehensive Meta-Analysis software, statistical analysis was performed, including subgroup analyses by anatomical site (colon, rectum, colorectal). Sensitivity analyses and heterogeneity were conducted.\n\n**Results:** 21 studies involving over 70,000 patients were included. The meta-analysis demonstrated significantly longer operative times with RAS (MD = 0.161-1.049, <i>p</i> < 0.001). RAS was linked to a significantly lower chance of re-operative rates (RR = 0.549, <i>p</i> = 0.023) and a significantly lower risk of conversion to open surgery (RR = 0.412-0.592, <i>p</i> < 0.001). RAS decreased problems in the colorectal group (RR = 0.867, <i>p</i> = 0.023), but overall rectum group complication rates were comparable. Hospital stays were shorter after robotic-assisted surgery (MD = -0.284 to -0.755, <i>p</i> = 0.001).\n\n**Conclusion:** When compared to CLS, RAS has the advantage of lowering conversion and re-operation rates, albeit at the expense of higher operating time. CLS led to shorter hospital stays, but in some circumstances, the complication rates were on level with or lower than those of RAS. According to these results, RAS might be useful in some surgical situations and patient demographics.\n\n**Systematic Review Registration:** https://www.crd.york.ac.uk/PROSPERO/view/614084, PROSPERO CRD42024614084.", "abstract_zh": "**背景：** 结直肠癌是全球主要的健康问题，需要成功的手术治疗。虽然机器人辅助手术 (RAS) 提供了前瞻性的改进，但腹腔镜手术已被证明比开放手术能产生更好的结果。\n\n**方法：** 2018年至2024年12月，使用PubMed、Scopus和Web of Science对队列研究和随机对照试验（RCT）进行系统评价和荟萃分析。比较 RAS 和传统腹腔镜手术的研究也被纳入其中。评估的主要结果是住院时间、转为开放手术、术后并发症和手术时间。使用综合荟萃分析软件进行统计分析，包括按解剖部位（结肠、直肠、结直肠）进行亚组分析。进行了敏感性分析和异质性分析。\n\n**结果：** 纳入了 21 项研究，涉及超过 70,000 名患者。荟萃分析表明 RAS 的手术时间显着延长（MD = 0.161-1.049，<i>p</i> < 0.001）。 RAS 与显着较低的再手术率（RR = 0.549，<i>p</i> = 0.023）和显着较低的中转开腹手术风险（RR = 0.412-0.592，<i>p</i> < 0.001）相关。 RAS 减少了结直肠组的问题（RR = 0.867，<i>p</i> = 0.023），但直肠组的总体并发症发生率相当。机器人辅助手术后住院时间更短（MD = -0.284至-0.755，<i>p</i> = 0.001）。\n\n**结论：** 与 CLS 相比，RAS 的优点是降低转换率和重复操作率，但代价是操作时间较长。 CLS 导致住院时间缩短，但在某些情况下，并发症发生率与 RAS 持平或更低。根据这些结果，RAS 可能在某些手术情况和患者人口统计中有用。\n\n**Systematic review registration：** https://www.crd.york.ac.uk/PROSPERO/view/614084，PROSPERO CRD42024614084。", "keywords_zh": "结直肠癌, 腹腔镜手术, 荟萃分析, 术后结果, 机器人手术, 系统评价", "keywords_en": "colorectal cancer, laparoscopic surgery, meta-analysis, postoperative outcomes, robotic surgery, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/41822113/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 13 Mar 2026"}, {"id": "41815276", "title_en": "Setup and target volume shape variation in rectal cancer radiotherapy: a systematic literature review", "title_zh": "直肠癌放射治疗的设置和靶区形状变化：系统文献综述", "authors": "Rianne de Jong", "abstract_en": "**Introduction:** This systematic literature review aimed to evaluate treatment uncertainties associated with modern rectal cancer radiotherapy, focusing on systematic and random errors in setup and target volume (TV) shape variation, with the aim of supporting clinics in optimizing treatment accuracy and consistency in daily practice.\n\n**Methods:** A systematic literature review was conducted to quantify geometrical uncertainties with respect to setup and TV shape variations in the treatment of rectal cancer. It included studies reporting uncertainties for setup, CTV (Clinical Target Volume) shape variations (rectum and mesorectum), GTVp (Gross Tumor Volume - Primary Tumor), GTVn (Gross Tumor Volume - Nodes), and/or elective pelvic lymph nodes; excluding non-English language publications.\n\n**Results:** 196 reports were assessed for full text screening and 32 publications were selected for final reporting. Most authors utilized on board imaging to calculate setup errors and TV shape variation, and all reported substantial uncertainties. Setup uncertainty was reported to be very different for prone (w/o belly board) vs supine position, in favour of supine position. TV shape variation showed large systematic and random errors, especially for GTVp and the upper anterior part of the mesorectum. A subset of publications analyzed the positional uncertainties of elective draining lymph nodes, which are typically not removed during surgery, showing their small positional variations in relation to bone structures.\n\n**Conclusion:** Setup and TV shape variation are significant and non-negligible geometric uncertainties. Setup errors can largely be minimized with daily (2D or 3D) IGRT, whereas TV shape variations-particularly in the mesorectum-needs to be assessed daily with 3D imaging and requires anisotropic margins.", "abstract_zh": "**介绍：** 本系统文献综述旨在评估与现代直肠癌放射治疗相关的治疗不确定性，重点关注设置和靶区 (TV) 形状变化的系统性和随机性误差，旨在支持诊所在日常实践中优化治疗准确性和一致性。\n\n**方法：** 我们进行了系统的文献综述，以量化直肠癌治疗中设置和电视形状变化的几何不确定性。它包括报告设置、CTV（临床目标体积）形状变化（直肠和直肠系膜）、GTVp（总肿瘤体积 - 原发肿瘤）、GTVn（总肿瘤体积 - 淋巴结）和/或选择性盆腔淋巴结不确定性的研究；不包括非英语出版物。\n\n**结果：** 196 reports were assessed for full text screening and 32 publications were selected for final reporting. Most authors utilized on board imaging to calculate setup errors and TV shape variation, and all reported substantial uncertainties.据报道，俯卧位（无腹板）与仰卧位的设置不确定性非常不同，有利于仰卧位。 TV 形状变化显示出较大的系统误差和随机误差，尤其是 GTVp 和直肠系膜上前部。一部分出版物分析了选择性引流淋巴结的位置不确定性，这些淋巴结通常在手术期间不会被切除，显示出它们相对于骨结构的微小位置变化。\n\n**结论：** 设置和电视形状变化是显着且不可忽略的几何不确定性。通过日常（2D 或 3D）IGRT 可以很大程度上减少设置误差，而 TV 形状变化（尤其是直肠系膜）需要每天通过 3D 成像进行评估，并且需要各向异性边缘。", "keywords_zh": "Error 500 (Server Error)!!1500.That’s an error.There was an error. Please try again later.That’s all we know.", "keywords_en": "Image guided radiotherapy, Rectal cancer, Review, Set up, Shape variation, Uncertainties", "link": "https://pubmed.ncbi.nlm.nih.gov/41815276/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 12 Mar 2026"}, {"id": "41804965", "title_en": "Impact of circular stapler size on anastomotic complications after low colorectal anastomosis: a systematic review and meta-analysis", "title_zh": "圆形吻合器尺寸对低位结直肠吻合术后吻合并发症的影响：系统评价和荟萃分析", "authors": "Dimitrios Prassas", "abstract_en": "**Introduction:** Despite advancements in colorectal surgery, anastomotic complications such as leakage and stricture remain significant challenges. The influence of circular stapler size on these outcomes is controversial. This meta-analysis evaluates the impact of stapler diameter on anastomotic morbidity following low colorectal anastomosis.\n\n**Evidence Acquisition:** A systematic search of PubMed, Google Scholar, and the Cochrane Central Register was conducted in accordance with PRISMA guidelines. Comparative studies that reported outcomes based on circular stapler size were included. Primary endpoints were anastomotic leak, stricture, bleeding, and overall anastomotic morbidity. Secondary outcomes included overall morbidity, major complications, reoperation, readmission, and operative time. Odds ratios (ORs) and standardized mean differences (SMDs) with 95% confidence intervals (CIs) were calculated. The ROBINS-I and GRADE tools were used to assess the risk of bias and quality of evidence.\n\n**Evidence Synthesis:** Seven studies comprising 2214 patients (small stapler size (<30 mm): N.=859, large stapler size (≥30 mm): N.=1355) were included. Use of larger staplers was associated with a significantly lower incidence of anastomotic stricture (OR=2.31, 95% CI: 1.48-3.60, P=0.0002), with low heterogeneity (I<sup>2</sup>=5%). No significant differences were observed in anastomotic leak, bleeding, or overall anastomotic morbidity. Secondary outcomes, including overall and major morbidity, readmission, reoperation, and operative duration, also showed no significant differences between stapler sizes.\n\n**Conclusions:** Larger circular staplers are associated with a reduced risk of anastomotic stricture following low colorectal anastomosis, without increasing other postoperative complications. These findings support the consideration of larger stapler diameters when anatomically feasible. Further high-quality prospective studies are warranted to validate these results and guide surgical decision-making.", "abstract_zh": "**介绍：** 尽管结直肠手术取得了进步，但渗漏和狭窄等吻合口并发症仍然是重大挑战。圆形吻合器尺寸对这些结果的影响是有争议的。这项荟萃分析评估了吻合器直径对低位结直肠吻合术后吻合发病率的影响。\n\n**Evidence acquisition：** 根据 PRISMA 指南对 PubMed、Google Scholar 和 Cochrane Central Register 进行了系统检索。其中包括报告基于圆形吻合器尺寸的结果的比较研究。主要终点是吻合口瘘、狭窄、出血和总体吻合口发病率。次要结局包括总体发病率、主要并发症、再次手术、再入院和手术时间。计算比值比 (OR) 和标准化平均差 (SMD) 以及 95% 置信区间 (CI)。 ROBINS-I 和 GRADE 工具用于评估偏倚风险和证据质量。\n\n**Evidence synthesis：** 纳入了 7 项研究，涉及 2214 名患者（小吻合器尺寸（<30 mm）：N.=859，大吻合器尺寸（≥30 mm）：N.=1355）。使用较大吻合器可显着降低吻合口狭窄的发生率（OR=2.31，95% CI：1.48-3.60，P=0.0002），且异质性较低（I<sup>2</sup>=5%）。在吻合口瘘、出血或总体吻合口发病率方面没有观察到显着差异。次要结果，包括总体和主要发病率、再入院、再次手术和手术持续时间，也显示吻合器尺寸之间没有显着差异。\n\n**结论：** 较大的圆形吻合器可降低低位结直肠吻合术后吻合口狭窄的风险，而不会增加其他术后并发症。这些发现支持在解剖学上可行的情况下考虑使用更大的吻合器直径。需要进一步的高质量前瞻性研究来验证这些结果并指导手术决策。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41804965/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 10 Mar 2026"}, {"id": "41793125", "title_en": "Response to letter regarding comment on \"worldwide prevalence of haemorrhoids: a systematic review and meta-analysis\"", "title_zh": "对有关“全球痔疮患病率：系统评价和荟萃分析”评论的信函的回复", "authors": "Pouyan Ebrahimi", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41793125/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 07 Mar 2026"}, {"id": "41784434", "title_en": "The prevalence of nonmalignant gastrointestinal disease in patients with iron deficiency anemia: a systematic review and meta-analysis", "title_zh": "缺铁性贫血患者非恶性胃肠道疾病的患病率：系统评价和荟萃分析", "authors": "Leo Alexandre", "abstract_en": "**Objective:** Gastrointestinal pathology is a major cause of iron deficiency anemia (IDA). While previous studies have focused on establishing the prevalence of malignant gastrointestinal disease, the prevalence of nonmalignant gastrointestinal disease in patients with IDA has not been analyzed systematically. We performed a systematic review and meta-analysis to determine the prevalence of normal findings, individual nonmalignant findings, and malignancy in patients with IDA.\n\n**Methods:** We searched Medline, Embase, and Scopus from inception for observational studies that reported the prevalence of individual upper and lower gastrointestinal pathologies among adults (≥18 years) with confirmed IDA who underwent endoscopic investigation. We also sought to establish the prevalence of normal endoscopic findings within the IDA population as well as the prevalence of nonmalignant and malignant gastrointestinal pathology amongst clinically relevant subgroups. Results were synthesized using a random effects meta-analysis.\n\n**Results:** A total of 8563 citations were screened, and 39 articles were included from four continents, comprising 9807 patients with IDA. Overall, the most prevalent upper gastrointestinal finding was Helicobacter pylori gastritis (27.0%), and the most prevalent lower gastrointestinal finding was hemorrhoids (10.0%). The overall prevalence of upper gastrointestinal malignancy was 5.0%, and the prevalence of colorectal cancer was 8.0%. A total of 52.0% of upper gastrointestinal endoscopies and 66.0% of lower gastrointestinal endoscopies did not detect any abnormalities.\n\n**Conclusion:** The estimated prevalence of individual malignant and nonmalignant gastrointestinal disease will serve as a guide in the context of clinical decision making before endoscopy in patients with IDA. Further population-based studies are needed, particularly among relevant subgroups.", "abstract_zh": "**目的：** 胃肠道病理是缺铁性贫血（IDA）的主要原因。虽然之前的研究重点是确定恶性胃肠道疾病的患病率，但尚未对 IDA 患者非恶性胃肠道疾病的患病率进行系统分析。我们进行了系统回顾和荟萃分析，以确定 IDA 患者正常结果、个体非恶性结果和恶性肿瘤的发生率。\n\n**方法：** 我们从一开始就检索了 Medline、Embase 和 Scopus，寻找观察性研究，这些研究报告了经内镜检查确诊 IDA 的成年人（≥18 岁）个体上消化道和下消化道病变的患病率。我们还试图确定 IDA 人群中正常内镜检查结果的患病率以及临床相关亚组中非恶性和恶性胃肠道病理的患病率。使用随机效应荟萃分析综合结果。\n\n**结果：** 共筛选了 8563 条引用，纳入了来自四大洲的 39 篇文章，包括 9807 名 IDA 患者。总体而言，最常见的上消化道症状是幽门螺杆菌胃炎（27.0%），最常见的下消化道症状是痔疮（10.0%）。上消化道恶性肿瘤的总患病率为5.0%，结直肠癌的总患病率为8.0%。总共52.0%的上消化道内镜检查和66.0%的下消化道内镜检查未发现任何异常。\n\n**结论：** 个体恶性和非恶性胃肠道疾病的估计患病率将作为 IDA 患者内窥镜检查前临床决策的指南。需要进一步的基于人群的研究，特别是在相关亚组中。", "keywords_zh": "癌症, 内窥镜检查, 胃肠道, 缺铁性贫血, 系统评价", "keywords_en": "cancer, endoscopy, gastrointestinal, iron deficiency anemia, systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/41784434/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 05 Mar 2026"}, {"id": "41741329", "title_en": "Comment on 'Worldwide prevalence of haemorrhoids: a systematic review and meta-analysis'", "title_zh": "对“全球痔疮患病率：系统回顾和荟萃分析”的评论", "authors": "Liangbin Wang", "abstract_en": "No abstract", "abstract_zh": "无摘要", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41741329/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 25 Feb 2026"}, {"id": "41737205", "title_en": "Discordance between radiological and pathological response to neoadjuvant immunotherapy in mismatch repair-deficient/microsatellite instability-high colorectal cancer: a meta-analysis", "title_zh": "Error 500 (Server Error)!!1500.That’s an error.There was an error. Please try again later.That’s all we know.", "authors": "Wu Jiang", "abstract_en": "**Background:** Mismatch repair deficiency (dMMR) and microsatellite instability (MSI-H) cancers exhibit high immunogenicity and are highly responsive to immune checkpoint inhibitors. In patients with locally advanced dMMR/MSI-H colorectal cancer (CRC), neoadjuvant immunotherapy (NIT) has demonstrated unprecedented pathological complete response (pCR) rates, suggesting nonoperative management strategies may be possible. There remains a discrepancy between radiological assessment and pathological responses to NIT in CRC.\n\n**Methods:** We conducted a systematic review and meta-analysis of studies published between February 2015 and February 2025 to determine if radiological and pathological assessments following neoadjuvant immune checkpoint inhibitor therapy (NIT) were consistent in patients with non-metastatic dMMR/MSI-H CRC. Using PubMed, Embase, and Web of Science, the literature was retrieved, with inclusion criteria focusing on studies that reported both imaging data and pathological results. A random-effects model was used to calculate pooled odds ratios (ORs) and 95% confidence intervals (CIs). Subgroup analyses were conducted based on tumor location (colon versus rectum) and type of response (cCR versus pCR).\n\n**Results:** In 12 studies, 396 patients were included. A total rate of 59.6% discordance was found between radiological and pathological responses. Compared to rectal cancer patients (34.9%), colon cancer patients exhibited a significantly higher rate of discordance (64.2%). A total of 238 patients with confirmed pCR were incorrectly diagnosed as having residual disease on radiological assessment (OR = 61.41; 95% CI: 10.05-375.27;P < 0.00001). A high level of heterogeneity was observed across studies (I2 = 85%), but no publication bias was observed.\n\n**Conclusion:** In dMMR/MSI-H CRC, radiologic assessment alone cannot reliably assess the efficacy of NIT, particularly in colon cancer. It should be integrated with additional modalities-such as endoscopic evaluation and biomarker analysis-to ensure an accurate appraisal of treatment efficacy.", "abstract_zh": "**背景：** Mismatch repair deficiency (dMMR) and microsatellite instability (MSI-H) cancers exhibit high immunogenicity and are highly responsive to immune checkpoint inhibitors. In patients with locally advanced dMMR/MSI-H colorectal cancer (CRC), neoadjuvant immunotherapy (NIT) has demonstrated unprecedented pathological complete response (pCR) rates, suggesting nonoperative management strategies may be possible. CRC 中 NIT 的放射学评估和病理反应之间仍然存在差异。\n\n**方法：** 我们对 2015 年 2 月至 2025 年 2 月期间发表的研究进行了系统回顾和荟萃分析，以确定新辅助免疫检查点抑制剂治疗 (NIT) 后的放射学和病理学评估在非转移性 dMMR/MSI-H CRC 患者中是否一致。使用 PubMed、Embase 和 Web of Science 检索文献，纳入标准侧重于报告影像数据和病理结果的研究。使用随机效应模型来计算合并比值比 (OR) 和 95% 置信区间 (CI)。根据肿瘤位置（结肠与直肠）和反应类型（cCR 与 pCR）进行亚组分析。\n\n**结果：** 12 项研究纳入了 396 名患者。放射学和病理学反应之间的总不一致率为 59.6%。与直肠癌患者（34.9%）相比，结肠癌患者表现出明显更高的不一致率（64.2%）。共有 238 名确诊 pCR 的患者在放射学评估中被错误诊断为有残留病灶（OR = 61.41；95% CI：10.05-375.27；P < 0.00001）。各研究之间观察到高度异质性 (I2 = 85%)，但未观察到发表偏倚。\n\n**结论：** 在 dMMR/MSI-H CRC 中，仅放射学评估无法可靠评估 NIT 的疗效，特别是在结肠癌中。它应与其他模式（例如内窥镜评估和生物标志物分析）相结合，以确保准确评估治疗效果。", "keywords_zh": "dMMR/MSI-H结直肠癌，荟萃分析，高微卫星不稳定性，新辅助免疫治疗，放射学评估", "keywords_en": "dMMR/MSI-H colorectal cancer, meta-analysis, microsatellite instability-high, neoadjuvant immunotherapy, radiological assessment", "link": "https://pubmed.ncbi.nlm.nih.gov/41737205/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 25 Feb 2026"}, {"id": "41721863", "title_en": "Life outcomes of being born with anorectal malformation: a systematic review of intersectional reporting, mental health co-morbidities, and psychosocial experiences in adulthood", "title_zh": "出生时患有肛门直肠畸形的生活结果：对成年期交叉报告、心理健康共病和心理社会经历的系统回顾", "authors": "Paul Harris", "abstract_en": "**Purpose:** Anorectal malformations exist across a spectrum of abnormalities involving the rectum, distal anus, genital and urinary tracts, and occur in approximately one in 5,000 live births. The purpose of this study was to investigate intersectional reporting, mental health co-morbidities, and psychosocial experiences of adults born with anorectal malformation.\n\n**Methods:** A systematic quantitative literature review was utilized to collect and analyze data. Articles were required to discuss population demographics, mental health comorbidities, or psychosocial experiences associated with anorectal malformation in adulthood. A total of 94 articles were found suitable for review.\n\n**Results:** Patient ethnicity, culture, sexuality, and spirituality were significantly underrepresented. Mental health co-morbidities such as anxiety and depression were discussed but rarely transitioned to intervention. Psychological challenges included psychosexual anxiety and limited professional knowledge. Sociological challenges included navigating health services and social settings. Literature prioritized continence outcomes that diminished psychosocial complexities.\n\n**Conclusions:** The intersectionality, mental health concerns, and psychosocial experiences of adults born with anorectal malformation remain largely unknown. Allied health professionals such as social workers can improve ongoing support provision, with interventions that enhance psychosocial functioning and emotional wellbeing.", "abstract_zh": "**Purpose：** 肛门直肠畸形存在于一系列涉及直肠、远端肛门、生殖器和泌尿道的异常中，大约每 5,000 个活产儿中就有一个发生这种畸形。本研究的目的是调查出生时患有肛门直肠畸形的成年人的交叉报告、心理健康合并症和心理社会经历。\n\n**方法：** 利用系统的定量文献综述来收集和分析数据。文章需要讨论与成年期肛门直肠畸形相关的人口统计、心理健康合并症或心理社会经历。共找到 94 篇适合评审的文章。\n\n**结果：** 患者的种族、文化、性取向和灵性特征明显不足。人们讨论了焦虑和抑郁等心理健康并发症，但很少转变为干预措施。心理挑战包括性心理焦虑和专业知识有限。社会学挑战包括应对医疗服务和社会环境。文献优先考虑了减少社会心理复杂性的节制结果。\n\n**结论：** 出生时患有肛门直肠畸形的成年人的交叉性、心理健康问题和心理社会经历在很大程度上仍然未知。社会工作者等专职卫生专业人员可以通过增强心理社会功能和情绪健康的干预措施来改善持续的支持服务。", "keywords_zh": "肛门直肠畸形、心理社会功能、社会工作", "keywords_en": "Anorectal malformation, Psychosocial functioning, Social work", "link": "https://pubmed.ncbi.nlm.nih.gov/41721863/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 21 Feb 2026"}, {"id": "41717740", "title_en": "Robot-assisted multivisceral resections for locally advanced rectal cancer: a case series and systematic review", "title_zh": "机器人辅助局部晚期直肠癌多脏器切除术：病例系列和系统评价", "authors": "V N Galkin", "abstract_en": "**Objective:** To conduct a systematic review of literature data on robot-assisted multivisceral resections for locally advanced rectal cancer and to present own immediate results of these interventions.\n\n**Material And Methods:** Request \"robotic OR,\" \"robotic ORs,\" \"robot-assisted OR,\" \"robot-assisted\" and «(Robotic OR robot-assisted) AND rectal AND (T4 OR multivisceral)» in PubMed and E-library databases resulted in 268 publications. Of these, 12 articles were included. Surgery time, intraoperative complications, including blood loss, conversion rate, postoperative complications, and extent of resection (R0, R1) were studied. Meta-analysis enrolled the incidence of complications and R0 resections. In addition, own results of 5 robot-assisted combined rectal resections for the period August - December 2024 are presented. Rectal resections were combined with bladder resection in three cases, and left-sided adnexectomy was performed in one case. One surgery was combined with anterior abdominal wall resection.\n\n**Results:** Treatment outcomes were analyzed in 891 people. The conversion rate was 11%, incidence of R0 resections - 76.2-100%, overall morbidity - 20.7-78%. Locoregional recurrences occurred in 4-9.3% of cases. Own results of treating 5 patients with locally advanced rectal cancer are summarized. There were R0 resections in all cases. There were no intraoperative complications. Severe postoperative complications (Clavien-Dindo ³ III) were observed in one case. Mean surgery time was 5 hours.\n\n**Conclusion:** Our experience of robot-assisted combined rectal resections for locally advanced cancer demonstrates feasibility of such operations. Own data are comparable with results of previous studies. Systematization of available results is complicated by high heterogeneity of data. However, available data are favorable and confirm the need for prospective accumulation of experience.", "abstract_zh": "**目的：** 对机器人辅助局部晚期直肠癌多脏器切除术的文献数据进行系统回顾，并提出这些干预措施的直接结果。\n\n**Material and methods：** 在 PubMed 和电子图书馆数据库中请求“机器人 OR”、“机器人 OR”、“机器人辅助 OR”、“机器人辅助”和“（机器人 OR 机器人辅助）AND 直肠 AND（T4 OR 多内脏）”，结果产生了 268 篇出版物。其中，收录了 12 篇文章。研究了手术时间、术中并发症，包括失血量、中转率、术后并发症和切除范围（R0、R1）。荟萃分析纳入了并发症和 R0 切除的发生率。此外，还介绍了 2024 年 8 月至 12 月期间 5 例机器人辅助联合直肠切除术的结果。直肠切除联合膀胱切除3例，左侧附件切除1例。一项手术与前腹壁切除术相结合。\n\n**结果：** 对 891 人的治疗结果进行了分析。转化率为 11%，R0 切除发生率 - 76.2-100%，总体发病率 - 20.7-78%。 4-9.3% 的病例出现局部复发。现总结自己治疗5例局部晚期直肠癌的结果。所有病例均进行 R0 切除。无术中并发症。 1例出现严重术后并发症（Clavien-DindoⅢ）。平均手术时间为5小时。\n\n**结论：** 我们在机器人辅助联合直肠切除术治疗局部晚期癌症方面的经验证明了此类手术的可行性。自己的数据与之前的研究结果具有可比性。由于数据的高度异质性，可用结果的系统化变得复杂。然而，现有数据是有利的，并证实需要前瞻性积累经验。", "keywords_zh": "局部晚期直肠癌、肿瘤学、直肠癌、机器人辅助多脏器切除术、机器人手术", "keywords_en": "locally advanced rectal cancer, oncology, rectal cancer, robot-assisted multivisceral resection, robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/41717740/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 20 Feb 2026"}, {"id": "41689388", "title_en": "Efficacy of wound protectors in reducing surgical site infections in patients undergoing open colorectal surgery: A systematic review and meta-analysis", "title_zh": "伤口保护器在减少接受开放性结直肠手术的患者手术部位感染方面的功效：系统评价和荟萃分析", "authors": "Tejaswini Pisipati", "abstract_en": "**Background:** The incidence of surgical site infections (SSIs) has been reported to be significantly higher in colorectal surgeries compared to other surgical procedures. Wound protectors have been developed to help reduce the incidence of SSIs by creating a barrier between the incisional wound and the contaminated surgical field, but their efficacy remains uncertain.\n\n**Objective:** To assess whether the use of wound protectors reduces the incidence of SSIs in patients undergoing open colorectal surgery.\n\n**Data Sources:** A comprehensive literature review was conducted using PubMed, Embase, Web of Science and Cochrane databases from inception to January 2025.\n\n**Study Selection:** Randomised controlled trials (RCTs) assessing the efficacy of wound protectors for reducing the incidence of SSIs in patients undergoing open colorectal surgery.\n\n**Interventions:** The intervention consisted of wound protectors (e.g., Alexis O-ring wound retractors, plastic ring drape).\n\n**Main Outcomes Measures:** The main outcome was SSI. We pooled risk ratios (RRs) with a 95% confidence interval (CI) using a random effects model. Statistical analysis was performed using R software (version 4.4.2).\n\n**Results:** We included 6 RCTs comprising 666 patients, of whom 327 (49 %) were randomised to the wound protectors' group. The mean follow-up duration was 30 days post-operatively. The incidence of SSIs was significantly lower in the intervention group (RR 0.44; 95% CI 0.22-0.88; p = 0.021). Subgroup analysis of four RCTs evaluating Alexis-O ring wound retractors showed a significantly lower incidence of SSIs in the experimental group (RR 0.21; 95% CI 0.09-0.48; p < 0.001).\n\n**Conclusion:** Wound protectors were associated with a significantly lower incidence of SSIs in patients undergoing open colorectal surgery.", "abstract_zh": "**背景：** 据报道，结直肠手术中手术部位感染（SSI）的发生率明显高于其他手术。伤口保护器已被开发出来，通过在切口伤口和受污染的手术区域之间建立屏障来帮助减少 SSI 的发生率，但其功效仍不确定。\n\n**目的：** 评估伤口保护器的使用是否可以降低接受开放性结直肠手术的患者 SSI 的发生率。\n\n**Data sources：** 使用 PubMed、Embase、Web of Science 和 Cochrane 数据库对从成立到 2025 年 1 月的时间进行了全面的文献综述。\n\n**Study selection：** 随机对照试验 (RCT) 评估伤口保护器对于降低接受开放性结直肠手术的患者 SSI 发生率的功效。\n\n**Interventions：** 干预措施包括伤口保护器（例如 Alexis O 形环伤口牵开器、塑料环手术巾）。\n\n**Main outcomes measures：** 主要成果是 SSI。我们使用随机效应模型将风险比 (RR) 与 95% 置信区间 (CI) 合并。使用R软件（版本4.4.2）进行统计分析。\n\n**结果：** 我们纳入了 6 项随机对照试验，涉及 666 名患者，其中 327 名 (49%) 被随机分配到伤口保护剂组。平均随访时间为术后 30 天。干预组的 SSI 发生率显着较低（RR 0.44；95% CI 0.22-0.88；p = 0.021）。评估 Alexis-O 环伤口牵开器的四项随机对照试验的亚组分析显示，实验组 SSI 的发生率显着较低（RR 0.21；95% CI 0.09-0.48；p<0.001）。\n\n**结论：** 伤口保护装置与接受开放性结直肠手术的患者 SSI 发生率显着降低相关。", "keywords_zh": "结直肠手术、手术部位感染、伤口保护器", "keywords_en": "colorectal surgery, surgical site infections, wound protectors", "link": "https://pubmed.ncbi.nlm.nih.gov/41689388/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Sat, 14 Feb 2026"}, {"id": "41665757", "title_en": "Perioperative impact of enhanced recovery after surgery (ERAS) for minimally invasive colorectal resection: a systematic review and meta-analysis", "title_zh": "加速康复外科（ERAS）对微创结直肠切除术围手术期的影响：系统评价和荟萃分析", "authors": "Bo-Wen Wu", "abstract_en": "**Purpose:** The added value of Enhanced Recovery After Surgery protocols in minimally invasive colorectal surgery remains debated. This study synthesized available evidence to examine how ERAS performs in minimally invasive colorectal resection, with attention to both effectiveness and safety.\n\n**Methods:** We conducted a systematic review of these documents, covering key databases such as the Cochrane Library, PubMed, EMBASE, and Web of Science. The latest information was updated up to December 2025. Data analyses were conducted using STATA 18. Continuous outcomes were expressed as weighted mean differences, while categorical outcomes were summarized with odds ratios, each accompanied by 95% confidence intervals. The rigor of the included studies was appraised using the Newcastle-Ottawa Scale (NOS).\n\n**Results:** Five eligible studies encompassing 2324 patients were synthesized. Compared with conventional care, ERAS implementation was associated with a meaningful reduction in length of hospital stay (WMD = - 2.38 days; 95% CI: -4.16, - 0.61; P < 0.01), alongside fewer overall postoperative complications (OR = 0.55; 95% CI: 0.44, 0.68; P < 0.05) and a decreased occurrence of postoperative ileus (OR = 0.57; 95% CI: 0.38, 0.86; P < 0.05). Readmission rates were comparable between groups (OR = 0.99, 95% CI: 0.55, 1.79; P = 0.952), and no meaningful difference was observed in operative time (WMD = 3.53, 95% CI: -15.76, 22.81; P = 0.115).\n\n**Conclusions:** ERAS protocols act synergistically with minimally invasive colorectal surgery to accelerate recovery and reduce complications without compromising safety. Future investigations with prospective designs are needed to confirm the robustness of these results.", "abstract_zh": "**Purpose：** 加速康复外科方案在微创结直肠手术中的附加价值仍存在争议。这项研究综合了现有证据来检验 ERAS 在微创结直肠切除术中的表现，同时关注有效性和安全性。\n\n**方法：** 我们对这些文献进行了系统回顾，涵盖 Cochrane 图书馆、PubMed、EMBASE 和 Web of Science 等关键数据库。最新信息更新至2025年12月。使用STATA 18进行数据分析。连续结果表示为加权平均差，而分类结果则用比值比总结，每个结果都带有95%置信区间。使用纽卡斯尔-渥太华量表（NOS）评估纳入研究的严谨性。\n\n**结果：** 综合了涵盖 2324 名患者的五项合格研究。与传统护理相比，ERAS 的实施可显着缩短住院时间（WMD = - 2.38 天；95% CI：-4.16，- 0.61；P < 0.01），同时总体术后并发症较少（OR = 0.55；95% CI：0.44，0.68；P < 0.01）。 P < 0.05）和术后肠梗阻发生率降低（OR = 0.57；95% CI：0.38，0.86；P < 0.05）。各组之间的再入院率具有可比性（OR = 0.99，95% CI：0.55，1.79；P = 0.952），手术时间没有观察到有意义的差异（WMD = 3.53，95% CI：-15.76，22.81；P = 0.115）。\n\n**结论：** ERAS 方案与微创结直肠手术协同作用，可在不影响安全性的情况下加速康复并减少并发症。未来需要对前瞻性设计进行调查，以确认这些结果的稳健性。", "keywords_zh": "结直肠癌、ERAS、Meta分析、微创手术、机器人手术", "keywords_en": "Colorectal cancer, ERAS, Meta-analysis, Minimally invasive surgery, Robotic surgery", "link": "https://pubmed.ncbi.nlm.nih.gov/41665757/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 10 Feb 2026"}, {"id": "41659148", "title_en": "Efficacy and safety of bipolar energy-based therapy for hemorrhoids: a systematic review", "title_zh": "双极能量疗法治疗痔疮的疗效和安全性：系统评价", "authors": "Douglas G Adler", "abstract_en": "**Background:** Hemorrhoids arise from dilated vessels in the submucosal layer of the anorectal canal. Hemorrhoids are responsible for 4 million office and emergency visits annually in the US. Hemorrhoidal energy therapy (HET) is a novel nonsurgical, bipolar energy-based instrument for treating hemorrhoids. It has multiple benefits, such as requiring only a single session for resolution of symptoms, and minimizing heat-related collateral damage. However, there are limited data regarding the effectiveness and adverse events of HET. We performed the first systematic review to evaluate the efficacy and safety of HET in the treatment of internal hemorrhoids.\n\n**Methods:** A comprehensive search was performed from major databases to identify studies that investigated HET to treat hemorrhoids. The primary outcomes were technical success and clinical success. The secondary outcomes were total adverse events and individual adverse events, such as postprocedural bleeding and incontinence.\n\n**Results:** Eight studies with 512 patients were included in the meta-analysis. The average age was 55.6 years, and the majority of patients were female. Most patients presented with grade I and grade II hemorrhoids. The HET demonstrated technical and clinical success rates of 100% and 86.1%, respectively. All adverse events were determined to be mild, according to the ASGE lexicon, except for 1 case of perianal hematoma that required hospitalization.\n\n**Conclusion:** Our study demonstrates that HET is an effective and safe treatment for grade I and II internal hemorrhoids.", "abstract_zh": "**背景：** 痔疮由肛门直肠管粘膜下层扩张的血管引起。在美国，每年有 400 万人次因痔疮而到办公室就诊和急诊。痔疮能量疗法（HET）是一种新型非手术、双极能量治疗痔疮的仪器。它有多种好处，例如只需一次疗程即可解决症状，并最大限度地减少与热相关的附带损害。然而，关于 HET 的有效性和不良事件的数据有限。我们进行了首次系统评价，以评估 HET 治疗内痔的有效性和安全性。\n\n**方法：** 对主要数据库进行了全面检索，以确定研究 HET 治疗痔疮的研究。主要成果是技术成功和临床成功。次要结局是总体不良事件和个体不良事件，例如术后出血和失禁。\n\n**结果：** 荟萃分析中纳入了 8 项涉及 512 名患者的研究。平均年龄为55.6岁，大多数患者为女性。大多数患者患有 I 级和 II 级痔疮。 HET 的技术成功率和临床成功率分别为 100% 和 86.1%。根据 ASGE 词典，除 1 例需要住院治疗的肛周血肿外，所有不良事件均被确定为轻微。\n\n**结论：** 我们的研究表明，HET 是治疗 I 级和 II 级内痔的有效且安全的方法。", "keywords_zh": "双极能量疗法、痔疮能量疗法、内痔", "keywords_en": "Bipolar energy-based therapy, hemorrhoidal energy therapy, internal hemorrhoids", "link": "https://pubmed.ncbi.nlm.nih.gov/41659148/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 09 Feb 2026"}, {"id": "41640613", "title_en": "Is salvage treatment necessary after incomplete resection of rectal neuroendocrine tumors: A systematic review and meta-analysis", "title_zh": "直肠神经内分泌肿瘤不完全切除后是否需要挽救治疗：系统评价和荟萃分析", "authors": "Seun Ja Park", "abstract_en": "**Background:** Incomplete resection of rectal neuroendocrine tumors (NETs), defined by positive or indeterminate margins or lymphovascular invasion, raises concerns regarding residual disease and recurrence. However, the benefits of salvage treatment in these cases remain unclear.\n\n**Aim:** To evaluate the oncologic impact of salvage treatment compared with observation after incomplete endoscopic resection of rectal NETs through a systematic review and meta-analysis.\n\n**Methods:** We conducted a systematic review and meta-analysis in accordance with the preferred reporting items for systematic reviews and meta-analyses guidelines. MEDLINE, EMBASE, and the Cochrane Library were searched from their inception until May 2025. Eligible studies included patients with incompletely resected rectal NETs managed with salvage treatment or observation, reporting outcomes of residual tumors or recurrence. Pooled estimates were calculated using random-effects models with Hartung-Knapp adjustments.\n\n**Results:** Thirty-four studies with 2279 cases of incomplete endoscopic resection met the inclusion criteria. The incomplete resection rates differed markedly according to the initial resection method (17 studies): 73.1% for cold snare polypectomy, 29.8% for conventional endoscopic mucosal resection (EMR), 28.4% for modified EMR, and 14.7% for endoscopic submucosal dissection. Among the 19 studies that evaluated salvage treatment, the pooled residual tumor rate was 25.0% [95% confidence interval (CI): 12.0%-40.0%]. The crude recurrence rates from 31 studies favored salvage treatment over observation (0.96% <i>vs</i> 2.96%, <i>P</i> = 0.003). However, a meta-analysis of nine comparative studies found no statistically significant difference in recurrence risk (odds ratio = 0.89; 95%CI: 0.40-2.02).\n\n**Conclusion:** Given the relatively high residual tumor rate and low incidence of recurrence, salvage treatment may be justified as both a diagnostic and therapeutic approach after incomplete resection of rectal NETs. Although its benefits in preventing recurrence remain unclear, clinical decisions should be individualized, as these findings are based on low-certainty evidence.", "abstract_zh": "**背景：** 直肠神经内分泌肿瘤（NET）的不完全切除（定义为阳性或不确定的切缘或淋巴血管侵犯）引起了对残留疾病和复发的担忧。然而，在这些病例中挽救治疗的益处仍不清楚。\n\n**Aim：** 通过系统评价和荟萃分析，与直肠 NET 不完全内镜切除术后观察相比，评估挽救治疗的肿瘤学影响。\n\n**方法：** 我们根据系统评价和荟萃分析指南的首选报告项目进行了系统评价和荟萃分析。 MEDLINE、EMBASE 和 Cochrane 图书馆的检索时间从最初到 2025 年 5 月。符合条件的研究包括直肠 NET 切除不完全、接受挽救治疗或观察的​​患者，报告残留肿瘤或复发的结果。使用随机效应模型和 Hartung-Knapp 调整来计算汇总估计值。\n\n**结果：** 34 项研究涉及 2279 例不完全内镜切除病例，符合纳入标准。根据初始切除方法（17项研究），不完全切除率存在显着差异：冷圈套器息肉切除术为73.1%，传统内镜粘膜切除术（EMR）为29.8%，改良EMR为28.4%，内镜粘膜下剥离术为14.7%。在评估挽救治疗的 19 项研究中，汇总残留肿瘤率为 25.0% [95% 置信区间 (CI)：12.0%-40.0%]。 31 项研究的粗复发率倾向于挽救治疗而非观察（0.96% <i>vs</i> 2.96%，<i>P</i> = 0.003）。然而，对九项比较研究的荟萃分析发现，复发风险没有统计学上的显着差异（比值比 = 0.89；95% CI：0.40-2.02）。\n\n**结论：** 鉴于相对较高的残留肿瘤率和较低的复发率，挽救治疗可能是直肠 NET 不完全切除后的一种诊断和治疗方法。尽管其预防复发的益处尚不清楚，但临床决策应个体化，因为这些发现基于低质量证据。", "keywords_zh": "神经内分泌肿瘤，观察，直肠，残留肿瘤，抢救治疗", "keywords_en": "Neuroendocrine tumors, Observation, Rectum, Residual neoplasm, Salvage therapy", "link": "https://pubmed.ncbi.nlm.nih.gov/41640613/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 05 Feb 2026"}, {"id": "41629638", "title_en": "Fecal incontinence after prostate cancer irradiation: a systematic literature review", "title_zh": "前列腺癌照射后大便失禁：系统文献综述", "authors": "Jean-Michel Hannoun-Levi", "abstract_en": "**Goal:** Fecal incontinence (FI) is an underrecognized but clinically significant late gastrointestinal toxicity following radiotherapy (RT) for prostate cancer. This systematic review aimed to synthesize current knowledge on the definition and pathophysiology of post-radiation anal continence, as well as prevention strategies, technical considerations, and therapeutic approaches.\n\n**Method:** A systematic literature search was conducted according to PRISMA guidelines using the keywords: \"Fecal incontinence,\" \"Radiation therapy,\" and \"Prostatic neoplasms.\" Eligible studies included randomized phase III trials and prospective or retrospective series reporting on FI after definitive or adjuvant/salvage prostate RT. Fifty-four articles were included in the final analysis.\n\n**Results:** FI after prostate RT results from functional, morphological, and neurogenic alterations of the anorectal system. Reported incidence ranges from 1 to 12%, most often presenting as flatulence or liquid stool leakage, while severe forms requiring pads are uncommon. Variability is largely explained by heterogeneity in definitions and assessment tools, as no standardized scoring system is universally applied. Risk factors include advanced age, prior abdominal surgery, vascular comorbidities, chronic inflammatory bowel disease, hemorrhoids, and rectal urgency during RT. Dosimetric analyses indicate that low-to-intermediate doses to the anal canal and high doses to the rectum contribute differentially to FI. Based on current evidence, the mean dose to the anal canal should be kept below 37 Gy, though further studies are needed to define precise constraints for both structures. Preventive strategies such as MRI-based contouring and endorectal balloon placement, perirectal hydrogel spacers placement show promise. Management is multidisciplinary, including dietary measures, medications, pelvic floor therapy, neuromodulation, and, in severe cases, diversion procedures.\n\n**Conclusion:** FI after prostate RT is likely underestimated due to the absence of a standardized assessment. Developing a validated, universally applicable scoring system is a priority to improve evaluation, enable cross-study comparisons, refine preventive measures, and guide therapeutic strategies.", "abstract_zh": "**Goal：** 大便失禁（FI）是前列腺癌放疗（RT）后一种未被充分认识但具有临床意义的晚期胃肠道毒性。本系统综述旨在综合有关放射后肛门失禁的定义和病理生理学以及预防策略、技术考虑和治疗方法的最新知识。\n\n**Method：** 根据 PRISMA 指南，使用关键词“大便失禁”、“放射治疗”和“前列腺肿瘤”进行系统文献检索。符合条件的研究包括随机 III 期试验以及确定性或辅助/挽救性前列腺放疗后 FI 的前瞻性或回顾性系列报告。最终分析纳入54篇文章。\n\n**结果：** 前列腺放疗后的 FI 是由肛门直肠系统的功能、形态和神经源性改变引起的。报道的发病率从 1% 到 12% 不等，最常表现为胀气或粪便渗漏，而需要护垫的严重形式并不常见。变异性很大程度上是由定义和评估工具的异质性造成的，因为没有普遍应用的标准化评分系统。危险因素包括高龄、既往腹部手术、血管合并症、慢性炎症性肠病、痔疮和放疗期间的直肠紧迫感。剂量分析表明，肛管低至中剂量和直肠高剂量对 FI 的影响不同。根据目前的证据，肛管的平均剂量应保持在 37Gy 以下，尽管还需要进一步研究来确定这两种结构的精确限制。基于 MRI 的轮廓塑造和直肠内球囊放置、直肠周围水凝胶垫片放置等预防策略显示出希望。治疗是多学科的，包括饮食措施、药物、盆底治疗、神经调节，以及严重情况下的分流手术。\n\n**结论：** 由于缺乏标准化评估，前列腺放疗后的 FI 可能被低估。开发一个经过验证的、普遍适用的评分系统是改进评估、实现交叉研究比较、完善预防措施和指导治疗策略的首要任务。", "keywords_zh": "", "keywords_en": "", "link": "https://pubmed.ncbi.nlm.nih.gov/41629638/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 02 Feb 2026"}, {"id": "41611909", "title_en": "Indocyanine green fluorescence to prevent anastomotic leak in colorectal surgery: an updated systematic review and meta-analysis on randomized controlled trials", "title_zh": "吲哚菁绿荧光预防结直肠手术中的吻合口瘘：随机对照试验的最新系统评价和荟萃分析", "authors": "Antonino Spinelli", "abstract_en": "**Background:** In light of the recent publication of two multicentric controlled trials, this systematic review and meta-analysis aims to update the evidence of the efficacy of Indocyanine Green fluorescence angiography in preventing the risk of anastomotic leak after colorectal surgery.\n\n**Methods:** MEDLINE, EMBASE, and CENTRAL databases were searched for randomized controlled trials using relevant keywords from 2015 until September 2025. The outcomes were the overall rate of anastomotic leaks, the rate of reoperations, and the rate of intraoperative surgical strategy changes.\n\n**Results:** Ten randomized controlled trials were selected, including 4.885 patients, 2.432 (49.7%) who received intraoperative ICG assessment and 2.453 (50.3%) who underwent standard white light assessment. The studies displayed a moderate risk of bias and were included in the meta-analysis. The ICG group showed a reduced rate of anastomotic leak (OR = 0.64; p < 0.0001; high evidence) compared with the standard dressing group and a higher rate of changes in surgical strategy (OR = 7.50; p = 0.02; moderate evidence), while no difference was found in the rate of reoperations (OR = 0.94; p = 0.64; moderate evidence). A subgroup analysis showed reduced anastomotic leak rates in left colon (p = 0.003) and rectal resection (p = 0.0002) and no differences after right colon surgery (p = 0.94).\n\n**Conclusions:** This systematic review and meta-analysis supports the use of ICG to reduce the anastomotic leak rate in colorectal surgery, in particular in left-sided and rectal resections.", "abstract_zh": "**背景：** 鉴于最近发表的两项多中心对照试验，这项系统评价和荟萃分析旨在更新吲哚菁绿荧光血管造影在预防结直肠手术后吻合口瘘风险方面的功效证据。\n\n**方法：** 使用相关关键词检索MEDLINE、EMBASE和CENTRAL数据库中2015年至2025年9月的随机对照试验。结果为吻合口瘘总体发生率、再次手术率和术中手术策略改变率。\n\n**结果：** 选择了10个随机对照试验，包括4.885例患者，其中2.432例（49.7%）接受了术中ICG评估，2.453例（50.3%）接受了标准白光评估。这些研究显示出中等偏倚风险，并被纳入荟萃分析。与标准敷料组相比，ICG组吻合口瘘发生率降低（OR = 0.64；p < 0.0001；高证据），手术策略改变率较高（OR = 7.50；p = 0.02；中等证据），而再次手术率没有差异（OR = 0.94；p = 0.64；中等证据）。亚组分析显示，左结肠（p = 0.003）和直肠切除（p = 0.0002）吻合口漏率降低，右结肠手术后无差异（p = 0.94）。\n\n**结论：** 这项系统评价和荟萃分析支持使用 ICG 来降低结直肠手术中的吻合口漏率，特别是在左侧和直肠切除术中。", "keywords_zh": "吻合口瘘、结直肠手术、吲哚菁绿荧光血管造影", "keywords_en": "Anastomotic leak, Colorectal surgery, Indocyanine green fluorescence angiography", "link": "https://pubmed.ncbi.nlm.nih.gov/41611909/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 29 Jan 2026"}, {"id": "41604561", "title_en": "Colitis cystica profunda: a systematic review", "title_zh": "深部囊性结肠炎：系统评价", "authors": "Priyanka Kanth", "abstract_en": "Colitis cystica profunda (CCP) is an uncommon, benign colorectal lesion that can mimic malignancy. We conducted a systematic review of histologically confirmed CCP case reports and series to define epidemiology, presentation, diagnostic yield, management, and outcomes. Following PRISMA 2020, Embase, PubMed/MEDLINE, Web of Science, and CINAHL were searched (1965-2025); two reviewers independently screened studies and extracted demographic, clinical, imaging, histologic, treatment, and outcome data. Sixty-five studies (92 patients) met criteria. Mean age was 40 ± 12 years (median 39), and 54% were male. Rectal bleeding (70%), mucus discharge (32%), diarrhea (24%), and abdominal/rectal pain (26%) were most common; 12% were asymptomatic. Lesions were predominantly distal (rectum 61%), and superficial biopsies reached the submucosa in only 32%, contributing to frequent sampling error; Endoscopic ultrasound (EUS) and cross-sectional imaging typically showed submucosal cystic lesions with intact muscularis propria. Conservative and medical therapy were each attempted in 16% of patients, endoscopic resection in 14%, and surgery in 67%, most commonly local transanal/perineal excision (40% of surgeries) or segmental/partial colectomy (32% of surgeries). Dysplasia was reported in 10% and coexisting invasive adenocarcinoma in 4% at diagnosis; no subsequent malignant transformation was reported over a median follow-up of 8.4 months. Post-operative morbidity occurred in 5% and recurrence in 4%. CCP is a rare but important mimic of colorectal cancer; diagnosis is optimized with deep tissue sampling and high-resolution imaging. When feasible, organ-preserving endoscopic or local excision can achieve durable symptom resolution with low morbidity while avoiding unnecessary radical surgery.", "abstract_zh": "深部囊性结肠炎 (CCP) 是一种罕见的良性结直肠病变，可能类似于恶性肿瘤。我们对组织学证实的 CCP 病例报告和系列进行了系统回顾，以确定流行病学、表现、诊断率、管理和结果。 PRISMA 2020 之后，检索了 Embase、PubMed/MEDLINE、Web of Science 和 CINAHL（1965-2025 年）；两名评审员独立筛选研究并提取人口统计、临床、影像、组织学、治疗和结果数据。 65 项研究（92 名患者）符合标准。平均年龄为 40±12 岁（中位数 39 岁），其中 54% 为男性。最常见的是直肠出血（70%）、粘液排出（32%）、腹泻（24%）和腹部/直肠疼痛（26%）； 12%无症状。病变主要位于远端（直肠 61%），浅表活检仅到达粘膜下层，仅 32%，导致频繁出现采样错误；超声内镜 (EUS) 和横截面成像通常显示粘膜下囊性病变，固有肌层完整。 16% 的患者尝试了保守治疗和药物治疗，14% 的患者尝试了内镜切除术，67% 的患者尝试了手术，最常见的是局部经肛门/会阴切除术（占手术的 40%）或节段/部分结肠切除术（占手术的 32%）。据报道，诊断时 10% 存在不典型增生，4% 存在共存浸润性腺癌；中位随访时间为 8.4 个月，未报告随后发生恶变。术后发病率为 5%，复发率为 4%。 CCP 是一种罕见但重要的结直肠癌类似物；通过深层组织采样和高分辨率成像优化诊断。在可行的情况下，保留器官的内窥镜或局部切除术可以以较低的发病率实现持久的症状缓解，同时避免不必要的根治性手术。", "keywords_zh": "深部囊性结肠炎、内镜切除术、粘液性结肠炎、直肠出血、粘膜下囊肿", "keywords_en": "colitis cystica profunda, endoscopic resection, mucous colitis, rectal bleeding, submucosal cysts", "link": "https://pubmed.ncbi.nlm.nih.gov/41604561/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 28 Jan 2026"}, {"id": "41586878", "title_en": "Metronidazole is an effective method of analgesia following haemorrhoidectomy: a systematic review and meta-analysis", "title_zh": "甲硝唑是痔切除术后镇痛的有效方法：系统评价和荟萃分析", "authors": "Christina A Fleming", "abstract_en": "**Background:** Haemorrhoids are one of the most frequently encountered benign anorectal conditions that negatively impact patients' quality of life. Excisional haemorrhoidectomy (closed or open) is a surgical procedure reserved for the treatment of third- and fourth-degree haemorrhoids, with considerable post-procedure pain reported. The aim of this study was to clarify the association between post operative metronidazole use (both oral and topical) and post-haemorrhoidectomy pain scores through systematic review and meta-analysis of randomised controlled trials (RCTs).\n\n**Methods:** This study was guided by the Preferred Reporting Items for Systematic Reviews and Meta-Analysis (PRISMA) guidelines. Prospective registration was performed on PROSPERO (CRD42024580928). A systematic review was performed for RCTs reporting post-haemorrhoidectomy pain scores between patients who received metronidazole and patients who received placebo. Meta-analysis was performed using RevMan version 5.4.\n\n**Results:** Seventeen RCTs including 1297 participants were eligible for inclusion. Metronidazole administration was associated with significantly lower post-operative visual analogue scores (VAS) on day 1 (-1.18, p < 0.00001), day 2 (-1.15, p = 0.003), day 3 (-0.86, p < 0.00001), and day 7 post-operatively with a mean pain score difference of -1.72 (95% CI -2.27 to -1.18) (p < 0.00001). A significant difference in pain scores was seen on day 3 favouring topical metronidazole in comparison to the oral route (1.38, 95% CI [0.44, 2.32], p = 0.004).\n\n**Conclusion:** This review synthesises the best available evidence to support the use of metronidazole to reduce pain after excisional haemorrhoidectomy. While both oral and topical forms appear to be beneficial, topical administration appears to have a more effective analgesic effect from post-operative day 3.", "abstract_zh": "**背景：** 痔疮是最常见的良性肛门直肠疾病之一，会对患者的生活质量产生负面影响。痔疮切除术（封闭式或开放式）是一种专为治疗三度和四度痔疮而保留的外科手术，据报道有相当大的术后疼痛。本研究的目的是通过随机对照试验 (RCT) 的系统回顾和荟萃分析，阐明术后使用甲硝唑（口服和局部）与痔疮切除术后疼痛评分之间的关​​联。\n\n**方法：** 本研究以系统评价和荟萃分析首选报告项目 (PRISMA) 指南为指导。在 PROSPERO (CRD42024580928) 上进行了前瞻性注册。对报告接受甲硝唑的患者和接受安慰剂的患者之间痔疮切除术后疼痛评分的随机对照试验进行了系统评价。使用 RevMan 5.4 版进行荟萃分析。\n\n**结果：** 包括 1297 名参与者在内的 17 项 RCT 有资格纳入。甲硝唑给药与术后第 1 天（-1.18，p < 0.00001）、第 2 天（-1.15，p = 0.003）、第 3 天（-0.86，p < 0.00001）和术后第 7 天显着降低的术后视觉模拟评分（VAS）相关，平均疼痛评分差异为-1.72（95% CI -2.27 至 -1.18）（p < 0.00001）。与口服途径相比，第 3 天局部使用甲硝唑的疼痛评分存在显着差异（1.38，95% CI [0.44，2.32]，p = 0.004）。\n\n**结论：** 本综述综合了现有的最佳证据，支持使用甲硝唑来减轻痔疮切除术后的疼痛。虽然口服和外用形式似乎都是有益的，但从术后第 3 天开始，局部给药似乎具有更有效的镇痛效果。", "keywords_zh": "痔疮，甲硝唑，RCT", "keywords_en": "Haemorrhoids, Metronidazole, RCT", "link": "https://pubmed.ncbi.nlm.nih.gov/41586878/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 26 Jan 2026"}, {"id": "41554450", "title_en": "Salvia plebeia R.Br.: A comprehensive review of its ethnopharmacology, phytochemistry, pharmacological activities, quality control, and current applications", "title_zh": "Salvia plebeia R.Br.：对其民族药理学、植物化学、药理活性、质量控制和当前应用的全面综述", "authors": "Wei Jiang", "abstract_en": "**Ethnopharmacological Relevance:** Salvia plebeia R.Br. (Lamiaceae), the dried aerial parts, has been traditionally used across China and East/South Asia to treat sore throat, bronchitis, nephritis edema, abscesses, mastitis, hemorrhoids, and bleeding disorders, consistent with traditional indications of heat-clearing, detoxifying, cooling blood, and promoting diuresis.\n\n**Aim Of The Review:** This study provides a systematic overview of the ethnopharmacology, phytochemistry, pharmacological activities, quality control, and current applications of S. plebeia, while highlighting current research gaps and future perspectives.\n\n**Materials And Methods:** A comprehensive literature search was conducted using multiple scientific databases, including Web of Science, PubMed, Elsevier, ACS, CNKI, and Google Scholar, covering publications from database inception to October 2025. Relevant information on the ethnopharmacology, phytochemistry, pharmacological activities, quality control, and applications of S. plebeia was systematically collected, screened, and synthesized according to predefined inclusion/exclusion criteria.\n\n**Results:** To date, 325 constituents have been identified, dominated by flavonoids, phenolic acids, terpenoids, volatile oils, sterols, lignans, and others. Extracts and purified compounds show tradition-relevant anti-inflammatory, antiviral, immunoregulatory, and antioxidant activities, while other reported effects (hepatoprotective, hypolipidemic, cardiovascular-protective, sedative/anticonvulsant, anticancer, and anti-photoaging) are presented as exploratory findings. Quality evaluation evolved from UV and HPLC to UPLC-MS fingerprinting using flavonoids and sesquiterpenes as markers. In practical applications, S. plebeia has been used in medicinal preparations for the management of pharyngitis, bronchitis, nephritis, dermatitis, and anorectal inflammation. In food sector, it has been developed into functional products, including health teas, chewable or effervescent tablets, composite beverages, and co-fermented vinegars.\n\n**Conclusion:** Although S. plebeia shows broad pharmacological potential, current investigations remain constrained by incomplete chemical space coverage, limited pharmacokinetic and toxicological characterization, and insufficient well-designed clinical evidence. Future research should focus on comprehensive constituent profiling, mechanism-oriented validation aligned with traditional indications, standardized quality markers/fingerprints, and rigorous PK-toxicology-clinical translation, to promote safe, effective, and evidence-based utilization of S. plebeia in medicine and functional food development.", "abstract_zh": "**Ethnopharmacological relevance：** 鼠尾草 (Salvia plebeia R.Br.) （唇形科）干燥的地上部分，在中国和东亚/南亚传统上用于治疗咽喉肿痛、支气管炎、肾炎水肿、脓肿、乳腺炎、痔疮和出血性疾病，符合清热解毒、凉血和利尿的传统功能。\n\n**Aim of the review：** 本研究系统概述了白花草的民族药理学、植物化学、药理活性、质量控制和当前应用，同时强调了当前的研究差距和未来前景。\n\n**材料与方法：** 利用Web of Science、PubMed、Elsevier、ACS、CNKI和Google Scholar等多个科学数据库进行了全面的文献检索，涵盖了从数据库建库到2025年10月的出版物。根据预先确定的纳入/排除标准，系统收集、筛选和合成了白花草的民族药理学、植物化学、药理活性、质量控制和应用的相关信息。\n\n**结果：** 迄今为止，已鉴定出325种成分，主要为黄酮类、酚酸类、萜类、挥发油类、甾醇类、木脂素类等。提取物和纯化的化合物显示出传统相关的抗炎、抗病毒、免疫调节和抗氧化活性，而其他报道的作用（保肝、降血脂、心血管保护、镇静/抗惊厥、抗癌和抗光老化）则作为探索性发现提出。质量评估从 UV 和 HPLC 发展到使用类黄酮和倍半萜作为标记物的 UPLC-MS 指纹分析。在实际应用中，S. plebeia已被用于治疗咽炎、支气管炎、肾炎、皮炎和肛门直肠炎症的药物制剂。在食品领域，已开发成功能性产品，包括保健茶、咀嚼片或泡腾片、复合饮料、共发酵醋等。\n\n**结论：** 尽管S. plebeia显示出广泛的药理学潜力，但目前的研究仍然受到化学空间覆盖不完整、药代动力学和毒理学特征有限以及精心设计的临床证据不足的限制。未来的研究应侧重于全面的成分分析、与传统适应症一致的机制导向验证、标准化的质量标记/指纹以及严格的PK-毒理学-临床转化，以促进平纹草在医学和功能性食品开发中安全、有效和循证的利用。", "keywords_zh": "当前应用、民族药理学、药理活性、植物化学、质量控制、Salvia plebeia R.Br。", "keywords_en": "Current applications, Ethnopharmacology, Pharmacological activity, Phytochemistry, Quality control, Salvia plebeia R.Br.", "link": "https://pubmed.ncbi.nlm.nih.gov/41554450/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Mon, 19 Jan 2026"}, {"id": "41535511", "title_en": "Long-term outcomes of stapled haemorrhoidopexy versus conventional haemorrhoidectomy: An updated systematic review, meta-analysis and trial-sequential analysis of randomized controlled trials", "title_zh": "吻合器痔疮固定术与传统痔疮切除术的长期结果：随机对照试验的最新系统评价、荟萃分析和试验序贯分析", "authors": "Roberto Cirocchi", "abstract_en": "**Purpose:** Stapled haemorrhoidopexy (SH) offers well-established short-term advantages over conventional haemorrhoidectomy (CH), but its long-term effectiveness remains controversial. This systematic review and meta-analysis aimed to compare long-term outcomes of SH versus CH in adult patients with grade II-IV haemorrhoids, incorporating Trial Sequential Analysis (TSA).\n\n**Methods:** MEDLINE, EMBASE and CENTRAL were searched from January 2001 to October 2025 for randomized controlled trials (RCTs) comparing SH and CH with a minimum follow-up of 12 months. Two reviewers independently performed study selection, data extraction and risk-of-bias assessment (RoB-2). Primary outcomes included recurrence, reintervention, anal function, and quality of life (QoL). Pooled risk ratios (RRs) with 95% confidence intervals (CIs) were calculated using random-effects models. TSA was applied to overall recurrence.\n\n**Results:** Seventeen RCTs including 1,041 SH and 1,031 CH patients were analysed. SH was associated with a higher risk of overall recurrence compared with CH (RR = 1.56,95%CI = 1.00-2.44;I<sup>2</sup> = 48%). TSA showed that the accrued information size (1,913 patients) did not reach the required information size (2,608 patients), indicating that current evidence remains underpowered. Prolapse-related recurrence was significantly more frequent after SH (RR = 3.28,95%CI = 1.49-7.25;I<sup>2</sup> = 12%), whereas bleeding-related recurrence did not differ between groups (RR = 1.20,95%CI = 0.63-2.26;I<sup>2</sup> = 23%). No significant differences were found for reintervention, persistent anal pain, functional impairment or QoL.\n\n**Conclusion:** SH is associated with a higher risk of long-term recurrence, particularly prolapse-related recurrence, compared with CH, while long-term pain, functional outcomes and QoL appear broadly comparable. These findings suggest that, although SH may remain an option for selected patients, CH provides more durable anatomical correction, and procedural choice should balance early recovery against long-term durability.", "abstract_zh": "**Purpose：** 与传统痔疮切除术 (CH) 相比，吻合器痔疮固定术 (SH) 具有明显的短期优势，但其长期有效性仍存在争议。这项系统评价和荟萃分析旨在比较 SH 与 CH 在 II-IV 级痔疮成年患者中的长期结局，并结合试验序贯分析 (TSA)。\n\n**方法：** 检索了 2001 年 1 月至 2025 年 10 月期间 MEDLINE、EMBASE 和 CENTRAL 中比较 SH 和 CH 的随机对照试验 (RCT)，随访时间至少为 12 个月。两名评审员独立进行研究选择、数据提取和偏倚风险评估（RoB-2）。主要结局包括复发、再次干预、肛门功能和生活质量 (QoL)。使用随机效应模型计算具有 95% 置信区间 (CI) 的合并风险比 (RR)。 TSA 应用于总体复发情况。\n\n**结果：** 分析了 17 项随机对照试验，包括 1,041 名 SH 和 1,031 名 CH 患者。与CH相比，SH与较高的总体复发风险相关（RR = 1.56，95%CI = 1.00-2.44；I<sup>2</sup> = 48%）。 TSA 显示，累积的信息量（1,913 名患者）未达到所需的信息量（2,608 名患者），表明当前证据仍然不足。 SH 后脱垂相关复发显着增加 (RR = 3.28,95%CI = 1.49-7.25;I<sup>2</sup> = 12%)，而出血相关复发在组间没有差异(RR = 1.20,95%CI = 0.63-2.26;I<sup>2</sup> = 23%)。在重新干预、持续性肛门疼痛、功能障碍或生活质量方面没有发现显着差异。\n\n**结论：** 与 CH 相比，SH 与较高的长期复发风险相关，特别是与脱垂相关的复发，而长期疼痛、功能结果和生活质量似乎大致相当。这些研究结果表明，尽管 SH 可能仍然是选定患者的一种选择，但 CH 提供了更持久的解剖矫正，并且手术选择应平衡早期恢复与长期耐久性。", "keywords_zh": "圆形吻合器、弗格森、痔切除术、痔疮、谐波手术刀、LigaSure、Milligan-Morgan、PPH、吻合器痔疮固定术", "keywords_en": "Circular stapler, Ferguson, Haemorrhoidectomy, Haemorrhoids, Harmonic scalpel, LigaSure, Milligan-Morgan, PPH, Stapled haemorrhoidopexy", "link": "https://pubmed.ncbi.nlm.nih.gov/41535511/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 14 Jan 2026"}, {"id": "41503542", "title_en": "Arterial Embolization for the Internal Hemorrhoids Management: A Systematic Review", "title_zh": "动脉栓塞治疗内痔：系统评价", "authors": "Hadi Rokni Yazdi", "abstract_en": "**Background And Aims:** Hemorrhoids are common vascular structures that can become symptomatic when prolapsed, representing the most prevalent benign anorectal condition worldwide. Despite affecting up to 11% of the population with symptoms including pain, bleeding, and discomfort, hemorrhoids remain underdiagnosed and often inappropriately managed. This systematic review aimed to evaluate the efficacy, clinical outcomes, and morbidity of endovascular artery embolization in hemorrhoids.\n\n**Method:** Up to August 2022, PubMed, Scopus, Web of Science, and Embase were searched comprehensively. All studies had eligible criteria included, except review articles, articles published in a language other than English, and case reports or series of cases. Two independent reviewers performed a literature review and data extraction. Preferred Reporting Items for Systematic Reviews and Meta-Analysis (PRISMA) 2020 checklist was used for quality assessment.\n\n**Results:** The systematic review included 15 studies. The patient's age ranged from 40.5 ± 9.51 to 72.2 ± 10.9. Eleven studies mentioned the sample size as gender-specific, with 57.89% (<i>n</i> = 187/323) male patients. The embolic site involved in embolization, according to the frequency, was 424 patients for the superior rectal artery in all studies, and coils and micro coils were utilized as Embolic material in most cases. No major complication or death was noted in 12 studies. The most frequent complications were postoperative pain and tenesmus, bleeding, ulceration and fibrotic scars, and low-grade fever. In 11.79% (<i>n</i> = 27/229) of patients re-embolization and after-treatment surgery were due to surgical failure and symptom recurrence, such as bleeding.\n\n**Conclusion:** Rectal artery embolization using microcoils, embolic particles, or a combination is a new method for managing internal hemorrhoids with proper clinical efficacy without significant complications. QoL score has improved after emborrhoid, and most cases had a lower bleeding score.", "abstract_zh": "**Background and aims：** 痔疮是常见的血管结构，脱垂时会出现症状，是全世界最常见的良性肛门直肠疾病。尽管有多达 11% 的人口出现疼痛、出血和不适等症状，但痔疮的诊断率仍然较低，而且往往治疗不当。本系统评价旨在评估血管内动脉栓塞治疗痔疮的疗效、临床结果和发病率。\n\n**Method：** 截至2022年8月，PubMed、Scopus、Web of Science、Embase均被全面检索。所有研究均包含合格标准，但评论文章、以英语以外的语言发表的文章以及病例报告或系列病例除外。两名独立评审员进行了文献评审和数据提取。系统评价和荟萃分析的首选报告项目 (PRISMA) 2020 检查表用于质量评估。\n\n**结果：** 系统评价包括 15 项研究。患者年龄为40.5±9.51岁至72.2±10.9岁。 11 项研究提到样本量具有性别特异性，其中 57.89% (<i>n</i> = 187/323) 为男性患者。所有研究中涉及栓塞的部位为直肠上动脉424例，栓塞部位多采用弹簧圈和微弹簧圈作为栓塞材料。 12 项研究中未发现重大并发症或死亡。最常见的并发症是术后疼痛和里急后重、出血、溃疡和纤维化疤痕以及低烧。 11.79%（<i>n</i> = 27/229）的患者再次栓塞和治疗后手术是由于手术失败和出血等症状复发。\n\n**结论：** 使用微弹簧圈、栓塞颗粒或其组合进行直肠动脉栓塞是一种治疗内痔的新方法，具有良好的临床疗效，且无明显并发症。痔疮术后生活质量评分有所改善，大多数病例的出血评分较低。", "keywords_zh": "栓塞, 痔疮, 痔疮, 痔动脉, 直肠动脉", "keywords_en": "embolization, emborrhoid, hemorrhoid, hemorrhoidal artery, rectal artery", "link": "https://pubmed.ncbi.nlm.nih.gov/41503542/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 08 Jan 2026"}, {"id": "41450176", "title_en": "Worldwide prevalence of haemorrhoids: a systematic review and meta-analysis", "title_zh": "全球痔疮患病率：系统评价和荟萃分析", "authors": "Pouyan Ebrahimi", "abstract_en": "**Background:** Haemorrhoidal disease (HD) is one of the most common anorectal disorders globally, significantly impacting individuals' quality of life and productivity. Despite its importance, global prevalence remains unclear due to limited population-specific studies. This study aimed to systematically assess the global prevalence of HD through a systematic review and meta-analysis.\n\n**Methods:** We conducted a systematic review and meta-analysis by searching PubMed, Scopus, Embase, Web of Science, and Google Scholar up to March 31, 2025, without language restrictions. Studies reporting prevalence of haemorrhoids in general, clinical, or high-risk populations were included. Exclusion criteria comprised studies lacking total sample size, focusing on other anorectal conditions, or using duplicate or insufficient data. Four independent reviewers extracted and appraised study quality using the Joanna Briggs Institute tool. The primary outcome was pooled point prevalence of HD, analyzed using a random-effects model with 95% confidence intervals (CIs). The study was registered in PROSPERO (CRD420251045600).\n\n**Results:** From 6,312 records, 150 studies (210 datasets) comprising 8,960,338 individuals were included. The global pooled point prevalence was 25.92% (95% CI: 22.62-29.22). Lifetime prevalence was 27.19% (95% CI: 14.77-39.60), and one-year prevalence was 21.65% (95% CI: 14.33-28.97). Prevalence was higher in women (27.33%, 95% CI: 21.84-32.82) than in men, and highest in the African region 28.07% (95% CI: 15.34-40.79). Invasive diagnostic methods (28.05%, 95% CI: 23.86-32.26) yielded higher prevalence estimates than non-invasive methods. Also, factors showing associations with HD in unadjusted analyses include older age, obesity, pregnancy, diabetes, family history, constipation, and hypertension.\n\n**Conclusion:** HD remains a prevalent condition globally, with minor variation across regions. The burden is consistent regardless of socioeconomic context. Diagnostic method and population characteristics influence prevalence estimates. These findings underscore the importance of targeted prevention and early intervention strategies, especially for at-risk groups.", "abstract_zh": "**背景：** 痔疮疾病（HD）是全球最常见的肛门直肠疾病之一，显着影响个人的生活质量和生产力。尽管其重要性，但由于针对特定人群的研究有限，全球患病率仍不清楚。本研究旨在通过系统回顾和荟萃分析来系统评估 HD 的全球患病率。\n\n**方法：** 我们通过检索截至 2025 年 3 月 31 日的 PubMed、Scopus、Embase、Web of Science 和 Google Scholar，进行了系统综述和荟萃分析，没有语言限制。报告包括一般人群、临床人群或高危人群中痔疮患病率的研究。排除标准包括缺乏总样本量、关注其他肛门直肠疾病或使用重复或不足数据的研究。四位独立评审员使用乔安娜布里格斯研究所工具提取并评估研究质量。主要结果是 HD 的汇总点患病率，使用具有 95% 置信区间 (CI) 的随机效应模型进行分析。该研究已在 PROSPERO 中注册（CRD420251045600）。\n\n**结果：** 从 6,312 条记录中，纳入了 150 项研究（210 个数据集），涉及 8,960,338 名个体。全球汇总点患病率为 25.92%（95% CI：22.62-29.22）。终生患病率为 27.19%（95% CI：14.77-39.60），一年患病率为 21.65%（95% CI：14.33-28.97）。女性患病率（27.33%，95% CI：21.84-32.82）高于男性，非洲地区患病率最高，为 28.07%（95% CI：15.34-40.79）。侵入性诊断方法（28.05%，95% CI：23.86-32.26）比非侵入性方法产生更高的患病率估计值。此外，未经调整的分析显示与 HD 相关的因素包括年龄较大、肥胖、怀孕、糖尿病、家族史、便秘和高血压。\n\n**结论：** HD 在全球范围内仍然是一种流行病，各地区之间差异较小。无论社会经济背景如何，负担都是一致的。诊断方法和人群特征影响患病率估计。这些发现强调了有针对性的预防和早期干预策略的重要性，特别是对于高危人群。", "keywords_zh": "痔疮、流行病学、痔疮、荟萃分析、患病率", "keywords_en": "Haemorrhoids, epidemiology, haemorrhoid, meta-analysis, prevalence", "link": "https://pubmed.ncbi.nlm.nih.gov/41450176/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Fri, 26 Dec 2025"}, {"id": "41444098", "title_en": "Clinical factors affecting the therapeutic dose window in cervical cancer brachytherapy: A systematic review and meta-regression", "title_zh": "影响宫颈癌近距离放射治疗治疗剂量窗的临床因素：系统评价和荟萃回归", "authors": "Nick J van de Berg", "abstract_en": "**Background And Purpose:** Although dose planning aims in cervical cancer brachytherapy are well-defined, variability in clinical practices makes it difficult to draw generalizable conclusions on achievable dosimetry. This review and meta-regression aim to assess clinical practices in terms of their therapeutic dose window, that is, the balance between target and organs-at-risk (OAR) doses.\n\n**Materials And Methods:** A search of the literature was performed in Scopus, PubMed, and Web of Science databases. Peer-reviewed articles were included that described planning constraints and reported high-risk clinical target volume (CTV<sub>HR</sub>) D<sub>90%</sub> and OAR [Formula: see text] for intracavitary (IC) tandem and ring (T&R) / tandem and ovoid (T&O) / mold (M) applicators, possibly supplemented with interstitial (IS) needles (+N). To determine factors associated with target volume coverage (D<sub>90%</sub>) and OAR sparing ( [Formula: see text] ), multivariate meta-regressions were performed.\n\n**Results:** Out of 1590 articles, 34 met the full inclusion criteria. In most studies, the CTV<sub>HR</sub>D<sub>90%</sub> aimed at ≥84-86 Gy EQD2<sub>α/β = 10Gy</sub>, and constraints for the OARs were 80-90 Gy, 65-75 Gy and 70-75 Gy EQD2<sub>α/β = 3Gy</sub> for the bladder, rectum and sigmoid [Formula: see text] , respectively. Studies using IC/IS applicators were associated with a ∼4 Gy increase in CTV<sub>HR</sub>D<sub>90%</sub> compared to IC only, with no effect on OAR dose. T&R studies achieved improvements of 3.2 Gy and 2.8-3.4 Gy at typical planning aims in comparison with T&O applicators in target and OAR doses. In 100% (15/15) of patient groups treated with T&R + N both CTV<sub>HR</sub> and OAR objectives were met for the population average. For T&R, T&O, and T&O + N groups, this was the case in 89% (8/9), 43% (6/14), and 50% (4/8), respectively.\n\n**Conclusion:** Studies using interstitial needles with T&R applicators in MR-guided brachytherapy for cervical cancer seem to be associated with a favorable therapeutic target dose/OAR sparing ratio.", "abstract_zh": "**背景与目的：** 尽管宫颈癌近距离放射治疗的剂量计划目标是明确定义的，但临床实践的可变性使得很难就可实现的剂量测定得出普遍的结论。本综述和荟萃回归旨在评估临床实践的治疗剂量窗口，即目标剂量和危及器官（OAR）剂量之间的平衡。\n\n**材料与方法：** 在 Scopus、PubMed 和 Web of Science 数据库中进行了文献检索。其中包括同行评审的文章，描述了计划限制并报告了腔内 (IC) 串联和环形 (T&R) / 串联和卵形 (T&O) / 模具 (M) 施药器的高风险临床靶区 (CTV<sub>HR</sub>) D<sub>90%</sub> 和 OAR [公式：参见文本]，可能辅以间质 (IS) 针 (+N)。为了确定与目标体积覆盖 (D<sub>90%</sub>) 和 OAR 保留（[公式：见文本]）相关的因素，进行了多变量元回归。\n\n**结果：** 在 1590 篇文章中，有 34 篇符合完全纳入标准。在大多数研究中，CTV<sub>HR</sub>D<sub>90%</sub>的目标是≥84-86 Gy EQD2<sub>α/β=10Gy</sub>，OAR的限制为膀胱、直肠和乙状结肠80-90 Gy、65-75 Gy和70-75 Gy EQD2<sub>α/β=3Gy</sub> [式：见正文] 分别。与仅使用 IC 相比，使用 IC/IS 施药器的研究发现 CTV<sub>HR</sub>D<sub>90%</sub> 增加约 4 Gy，但对 OAR 剂量没有影响。与 T&O 施放器的目标剂量和 OAR 剂量相比，T&R 研究在典型计划目标下实现了 3.2 Gy 和 2.8-3.4 Gy 的改进。在 100% (15/15) 接受 T&R+N 治疗的患者组中，CTV<sub>HR</sub> 和 OAR 目标均达到总体平均水平。对于 T&R、T&O 和 T&O+N 组，这种情况的比例分别为 89% (8/9)、43% (6/14) 和 50% (4/8)。\n\n**结论：** 在 MR 引导的宫颈癌近距离放射治疗中使用间质针和 T&R 施源器的研究似乎与有利的治疗目标剂量/OAR 保留比相关。", "keywords_zh": "施源器使用、图像引导适应性近距离放射治疗、局部晚期宫颈癌、治疗剂量窗", "keywords_en": "Applicator use, Image-guided adaptive brachytherapy, Locally advanced cervical cancer, Therapeutic dose window", "link": "https://pubmed.ncbi.nlm.nih.gov/41444098/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Wed, 24 Dec 2025"}, {"id": "41413743", "title_en": "Altered molecular signature of the intestinal microbiota in irritable bowel syndrome patients versus healthy controls: An updated systematic review", "title_zh": "肠易激综合征患者与健康对照者肠道微生物群分子特征的改变：更新的系统评价", "authors": "Hui Zheng", "abstract_en": "**Background And Aims:** Irritable bowel syndrome (IBS), a prevalent functional gastrointestinal disorder, poses significant challenges for both patients and medical practitioners. Recent investigations have indicated the gut microbiome as a potential therapeutic target for IBS. Nevertheless, the exact association between these microorganisms and IBS symptoms remains incompletely elucidated. This updated systematic analysis aims to assess the extant research correlating the gut microbial community with IBS.\n\n**Methods:** A systematic search was performed in major electronic databases including PubMed, EMBASE and Web of Science, spanning from their inception to December 2024. The objective was to identify case-control studies that examined and compared the composition of the fecal or colonic microbiota in individuals diagnosed with IBS against healthy controls.\n\n**Results:** Our systematic search included 44 articles, which collectively revealed that IBS patients exhibit lower intestinal microbiome diversity compared to healthy controls. Fecal microbiome analysis demonstrated an imbalance in the phyla Firmicutes and Bacteroidetes among IBS patients. Specifically, IBS with diarrhea (IBS-D) patients showed reduced levels of Butyricimonas and Proteobacteria, while IBS with constipation (IBS-C) patients exhibited decreased Firmicutes and Actinobacteria, along with increased Verrucomicrobiota and Proteobacteria. Additionally, disruptions in the gut microbiome were noted, particularly in the duodenum and jejunum, as well as changes in key bacterial populations within the colon and rectum.\n\n**Conclusion:** Our review confirms significant gut microbiota dysbiosis in IBS patients, characterized by reduced microbial diversity and altered abundances of Firmicutes and Bacteroidetes. These findings support the potential for microbiota-targeted therapies in IBS management, though further research is needed to establish causal mechanisms and clinical applications.", "abstract_zh": "**Background and aims：** 肠易激综合症（IBS）是一种常见的功能性胃肠道疾病，给患者和医生带来了巨大的挑战。最近的研究表明肠道微生物组是 IBS 的潜在治疗靶点。然而，这些微生物与 IBS 症状之间的确切关联仍未完全阐明。这项更新的系统分析旨在评估现有的肠道微生物群落与肠易激综合症相关的研究。\n\n**方法：** 我们在包括 PubMed、EMBASE 和 Web of Science 在内的主要电子数据库中进行了系统检索，检索时间从数据库成立到 2024 年 12 月。目的是确定病例对照研究，这些研究检查并比较了诊断为 IBS 的个体与健康对照者的粪便或结肠微生物群的组成。\n\n**结果：** 我们的系统搜索包括 44 篇文章，这些文章共同揭示了与健康对照相比，IBS 患者的肠道微生物组多样性较低。粪便微生物组分析表明 IBS 患者的厚壁菌门和拟杆菌门不平衡。具体而言，腹泻型IBS（IBS-D）患者的丁酸单胞菌和变形菌水平降低，而便秘型IBS（IBS-C）患者的厚壁菌门和放线菌减少，疣微生物群和变形菌增加。此外，还注意到肠道微生物组的破坏，特别是在十二指肠和空肠中，以及结肠和直肠内关键细菌种群的变化。\n\n**结论：** 我们的综述证实了 IBS 患者存在显着的肠道微生物群失调，其特征是微生物多样性减少以及厚壁菌门和拟杆菌门的丰度改变。这些发现支持了微生物群靶向治疗在 IBS 治疗中的潜力，尽管还需要进一步研究来确定因果机制和临床应用。", "keywords_zh": "IBS 肠易激综合征、IBS-C IBS 便秘、IBS-D IBS 腹泻、菌群失调、肠道微生物群、肠易激综合征、微生物组、系统评价", "keywords_en": "IBS irritable bowel syndrome, IBS-C IBS with constipation, IBS-D IBS with diarrhea, Dysbiosis, Gut microbiota, Irritable bowel syndrome, Microbiome, Systematic review", "link": "https://pubmed.ncbi.nlm.nih.gov/41413743/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Thu, 18 Dec 2025"}, {"id": "41399305", "title_en": "Diagnostic accuracy and safety of image-guided transperineal versus transrectal prostate biopsy for clinically significant prostate cancer: a GRADE-assessed systematic review and meta-analysis", "title_zh": "图像引导经会阴前列腺活检与经直肠前列腺活检对有临床意义的前列腺癌的诊断准确性和安全性：GRADE 评估的系统评价和荟萃分析", "authors": "Muhammad Salih", "abstract_en": "**Introduction:** This systematic review and meta-analysis compared the diagnostic performance and complication profiles of transperineal biopsy (TPBx) versus transrectal biopsy (TRBx) for prostate cancer, incorporating recent randomized and large observational studies.\n\n**Methods:** Following PRISMA 2020 guidelines, PubMed, Scopus, Embase, and Cochrane Library were searched till April 2025. Studies directly comparing TPBx and TRBx were included. Risk of bias was assessed using RoB 2.0 for randomized trials and the Newcastle - Ottawa Scale for observational studies. Pooled relative risks (RRs) with 95% confidence intervals (CIs) were calculated using random-effects models. Subgroup analyses and a GRADE assessment were performed to evaluate the certainty of evidence.\n\n**Results:** Twenty-nine studies (<i>n</i> = 90,621) were included. TPBx showed higher PCa detection (RR 1.08; 95% CI 1.01-1.15; <i>p</i> = 0.02) and csPCa detection (RR 1.14; 95% CI 1.05-1.24; <i>p</i> = 0.001), though the certainty of evidence was low to moderate. Heterogeneity was moderate to high. TPBx also showed lower infection-related complications and comparable overall events, though procedure-related pain was slightly higher.\n\n**Conclusion:** TPBx offers improved diagnostic yield and lower infection risk compared with TRBx, with comparable safety. However, given the moderate heterogeneity and limited high-quality RCTs, further confirmatory trials are necessary.\n\n**Protocol Registration:** https://www.crd.york.ac.uk/PROSPERO identifier is CRD420251035763.", "abstract_zh": "**介绍：** 这项系统回顾和荟萃分析比较了前列腺癌经会阴活检 (TPBx) 与经直肠活检 (TRBx) 的诊断性能和并发症情况，纳入了最近的随机和大型观察性研究。\n\n**方法：** 根据 PRISMA 2020 指南，检索了 PubMed、Scopus、Embase 和 Cochrane 图书馆，直至 2025 年 4 月。其中包括直接比较 TPBx 和 TRBx 的研究。使用 RoB 2.0 进行随机试验评估偏倚风险，使用纽卡斯尔 - 渥太华量表进行观察性研究。使用随机效应模型计算具有 95% 置信区间 (CI) 的汇总相对风险 (RR)。进行亚组分析和 GRADE 评估以评估证据的确定性。\n\n**结果：** 纳入了 29 项研究 (<i>n</i> = 90,621)。 TPBx 显示出较高的 PCa 检出率（RR 1.08；95% CI 1.01-1.15；<i>p</i> = 0.02）和 csPCa 检出率（RR 1.14；95% CI 1.05-1.24；<i>p</i> = 0.001），但证据质量为低至中等。异质性为中度至高度。 TPBx 还表现出较低的感染相关并发症和可比较的总体事件，尽管手术相关的疼痛略高。\n\n**结论：** 与 TRBx 相比，TPBx 具有更高的诊断率和更低的感染风险，且安全性相当。然而，鉴于中等异质性和有限的高质量随机对照试验，进一步的验证性试验是必要的。\n\n**Protocol registration：** https://www.crd.york.ac.uk/PROSPERO 标识符为 CRD420251035763。", "keywords_zh": "前列腺活检、有临床意义的前列腺癌、前列腺癌、经会阴、经直肠", "keywords_en": "Prostate biopsy, clinically significant prostate cancer, prostate cancer, transperineal, transrectal", "link": "https://pubmed.ncbi.nlm.nih.gov/41399305/?utm_source=Other&utm_medium=rss&utm_campaign=pubmed-2&utm_content=1p9j2Ia0knTignEE7vvWNCOPD-p8oHaBJk6HqSr1JJOMQoMsn2&fc=20260103012326&ff=20260316223336&v=2.19.0.post6+133c1fe", "date": "Tue, 16 Dec 2025"}, {"id": "41385931", "title_en": "Transperineal versus Transrectal Prostate Biopsy: A Systematic Review and Meta-Analysis of Randomized Controlled Trials", "title_zh": "经会阴前列腺活检与经直肠前列腺活检：随机对照试验的系统回顾和荟萃分析", "authors": "Leopoldo Alves Ribeiro-Filho", "abstract_en": "To compare the safety and diagnostic performance of transperineal (TP) versus transrectal (TR) ultrasound-guided prostate biopsies using only data from randomized controlled trials (RCTs). A systematic search was performed in multiple databases up to May 2025. We included only RCTs comparing TP and TR approaches in men undergoing MRI-targeted prostate biopsies. Meta-analysis
